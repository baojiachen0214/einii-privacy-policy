<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="description" content="Einii Privacy Policy in multiple languages with browser language detection.">
  <title>Einii Privacy Policy</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-alt: #eef2f7;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: #ffffff;
      --text: #102033;
      --muted: #516072;
      --line: rgba(16, 32, 51, 0.12);
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.12);
      --shadow: 0 24px 60px rgba(16, 32, 51, 0.10);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, "Avenir Next", "Segoe UI", "Noto Sans", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15,118,110,0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(30,64,175,0.07), transparent 24%),
        linear-gradient(180deg, var(--bg), var(--bg-alt));
      color: var(--text);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(16,32,51,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(16,32,51,0.02) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.28), transparent 85%);
    }
    .shell { position: relative; max-width: 1100px; margin: 0 auto; padding: 24px 20px 72px; }
    .topbar {
      position: sticky; top: 14px; z-index: 20;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(16,32,51,0.10);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .brand { display: grid; gap: 4px; }
    .brand .eyebrow { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
    .brand h1 { margin: 0; font-size: clamp(24px, 3vw, 38px); line-height: 1.05; letter-spacing: -0.03em; }
    .lang-wrap { display: grid; gap: 8px; min-width: 200px; justify-items: end; }
    .lang-wrap label { font-size: 12px; color: var(--muted); }
    select {
      width: 100%;
      appearance: none;
      border: 1px solid rgba(16,32,51,0.14);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.94);
      color: var(--text);
      font: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .hero {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1.45fr 0.95fr;
      gap: 18px;
      align-items: stretch;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .hero-copy { padding: 28px; }
    .hero-copy .kicker {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent); font-size: 13px; font-weight: 700;
    }
    .hero-copy h2 { margin: 18px 0 12px; font-size: clamp(28px, 4vw, 54px); line-height: 0.98; letter-spacing: -0.04em; }
    .hero-copy p { margin: 0; color: var(--muted); line-height: 1.7; font-size: 16px; max-width: 62ch; }
    .meta-grid { padding: 20px; display: grid; gap: 14px; }
    .meta-card {
      background: var(--surface-strong);
      border-radius: 18px;
      border: 1px solid var(--line);
      padding: 16px;
      display: grid;
      gap: 4px;
    }
    .meta-card .label { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .meta-card .value { font-size: 18px; font-weight: 700; line-height: 1.35; }
    .layout { margin-top: 18px; display: grid; grid-template-columns: 300px minmax(0, 1fr); gap: 18px; align-items: start; }
    .toc { position: sticky; top: 98px; padding: 18px; }
    .toc h3 { margin: 0 0 14px; font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .toc nav { display: grid; gap: 8px; }
    .toc a {
      display: block;
      padding: 10px 12px;
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      border: 1px solid transparent;
      transition: 160ms ease;
      line-height: 1.35;
      font-size: 14px;
    }
    .toc a:hover { background: rgba(15,118,110,0.08); border-color: rgba(15,118,110,0.18); }
    .content { display: grid; gap: 18px; }
    section.policy-section, .table-panel { padding: 24px; }
    .section-title { margin: 0 0 12px; font-size: clamp(22px, 2.6vw, 30px); line-height: 1.15; letter-spacing: -0.03em; }
    .subsection-title { margin: 20px 0 10px; font-size: 18px; line-height: 1.25; color: #13253d; }
    .policy-section p { margin: 0 0 12px; color: #26364a; line-height: 1.8; font-size: 16px; }
    .table-panel h3 { margin: 0 0 14px; font-size: 20px; }
    .policy-table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 18px; background: rgba(255,255,255,0.94); }
    .policy-table th, .policy-table td { text-align: left; vertical-align: top; padding: 14px 14px; border-bottom: 1px solid rgba(16,32,51,0.10); }
    .policy-table th { background: rgba(15,118,110,0.08); color: #123; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
    .policy-table tr:last-child td { border-bottom: none; }
    .table-scroll { overflow-x: auto; border-radius: 18px; border: 1px solid var(--line); }
    .note { margin-top: 10px; font-size: 14px; color: var(--muted); line-height: 1.6; }
    .fade-in { animation: fade-in 420ms ease-out; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 920px) {
      .hero, .layout { grid-template-columns: 1fr; }
      .toc { position: static; }
      .topbar { flex-direction: column; align-items: stretch; }
      .lang-wrap { min-width: 0; justify-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar panel">
      <div class="brand">
        <div class="eyebrow">Einii</div>
        <h1 id="page-title"></h1>
      </div>
      <div class="lang-wrap">
        <label id="language-label" for="language-select"></label>
        <select id="language-select" aria-label="Language selector"></select>
      </div>
    </header>
    <main id="app"></main>
  </div>
  <script id="policy-data" type="application/json">{"zh-Hans": {"meta": {"title": "隐私政策", "policySummary": "本文档是同一份隐私政策的多语言版本。你可以在阅读前切换语言。", "effectiveDate": "2026 年 5 月 4 日", "lastUpdated": "2026 年 5 月 4 日", "appName": "Einii", "developer": "包家琛", "contactEmail": "thestein@foxmail.com"}, "summaryTable": [["App 名称", "Einii"], ["开发者", "包家琛"], ["联系邮箱", "thestein@foxmail.com"], ["生效日期", "2026 年 5 月 4 日"], ["最近更新日期", "2026 年 5 月 4 日"]], "localDataTable": [["本地数据类型", "用途", "是否默认上传给我们"], ["答题进度与选项", "记录已完成题目、避免重复题目、支持个性化题目路径", "否"], ["分数与维度结果", "生成综合得分、折线图、维度分析和报告内容", "否"], ["报告文本与历史记录", "供用户本地回看、对比不同阶段的关系反思结果", "否"], ["语言与界面设置", "展示用户选择的语言版本、界面偏好和基础体验设置", "否"], ["购买权限缓存", "在本地识别用户是否已解锁 40 题、60 题或升级权限", "否"], ["错误状态或本地调试信息（如存在）", "帮助 App 在本地恢复状态或提升稳定性", "否"]], "sections": [{"title": "1. 本政策的适用范围", "paras": ["本隐私政策适用于 Einii 产品及其在 Apple App Store 上发布的 iOS 版本，以及由同一开发者提供的与本 App 直接相关的本地化情感题库、亲密关系自测、关系得分展示、分析报告生成、历史记录展示、购买权限验证、用户反馈与客户支持服务。", "本产品定位为亲密关系自测、情绪支持、关系反思和内容阅读类应用。用户通过完成题目，获得基于本地算法、题库文本和选项映射生成的亲密关系分析报告。除本政策明确说明的少量例外情形外，用户的答题内容、选项、分数、报告和历史记录默认仅在用户设备本地处理和保存。", "本政策不适用于 Apple Inc.、App Store、iCloud、电子邮件服务商、运营商、设备厂商或其他第三方独立提供的服务。上述第三方会依据其自身隐私政策和适用法律处理数据。"], "subsections": []}, {"title": "2. 核心隐私承诺", "paras": ["我们将本产品设计为本地化优先、最小数据处理、低侵入式的情感支持工具。在当前版本中，我们的核心承诺如下：", "不建立用户账号系统；", "不要求用户提供真实姓名、手机号、身份证件、通讯录、精确位置、伴侣身份信息、聊天记录或社交账号；", "不主动收集、上传或保存用户的答题记录、选项、分数、报告内容、关系画像和历史分析结果；", "不通过我们的服务器处理用户题目、答案或报告；", "不出售用户数据，不进行广告追踪，不基于用户答题内容建立商业广告画像；", "不使用用户答题内容训练 AI 模型；", "不与第三方共享用户的本地答题数据或报告内容；", "不在当前版本中使用广告 SDK、跨 App 追踪 SDK 或需要识别用户身份的数据分析 SDK。", "如果未来版本因新增功能而需要收集、上传、共享或远程处理任何个人信息，我们将在相关功能上线前更新本政策，并在适用法律或平台规则要求的情况下取得用户同意或提供相应选择。"], "subsections": []}, {"title": "3. 产品本地化处理说明", "paras": [], "subsections": [{"title": "3.1 本地计算", "paras": ["本产品的题目选择、选项记录、分数计算、关系维度分析、卡通化类型映射、报告生成和历史展示，默认均在用户设备本地完成。我们不会将用户的答题过程上传至开发者服务器，也不会远程读取用户生成的报告。"]}, {"title": "3.2 本地存储", "paras": ["为实现连续使用、历史查看、报告回顾、购买权限展示等功能，本产品可能在用户设备本地保存必要数据。该等数据通常包括：已完成题目、用户选择的选项、题量进度、综合得分、维度得分、报告文本、历史记录、语言设置、界面偏好、购买权限缓存等。"]}, {"title": "3.3 本地数据的可见性", "paras": ["在默认情况下，只有持有该设备、能够打开本 App 或能够访问该设备本地备份的人，才可能看到本地保存的数据。我们无法远程查看、检索、恢复或删除用户设备中的本地数据。用户应妥善保管设备、设置锁屏密码，并避免将报告截图、导出内容或设备访问权限提供给不可信任的人。"]}]}, {"title": "4. 我们默认不会收集的信息", "paras": ["在当前版本中，我们不会主动收集下列信息：", "身份信息：真实姓名、身份证件号码、护照号码、住址、生日等；", "联系方式：手机号、通讯录、联系人列表、社交账号、伴侣联系方式等；", "位置数据：精确定位、常用地点、轨迹、地理围栏等；", "生物识别信息：面部、指纹、声纹、虹膜等；", "设备内容：照片、相册、聊天记录、短信、邮件、文件、浏览历史等；", "亲密关系敏感信息：我们不会要求用户输入伴侣真实姓名、聊天记录、争执细节、具体住址或其他可识别第三方身份的信息；", "广告追踪标识：我们不会为了广告追踪目的读取或使用 IDFA；", "服务器日志：由于当前版本不通过开发者服务器处理答题和报告，我们不会持有用户答题访问日志、服务器请求日志或远程报告记录。", "用户在使用过程中如主动将报告截图、答题内容、设备信息、购买记录截图或其他信息发送给我们，相关信息将按照本政策第 7 条处理。"], "subsections": []}, {"title": "5. 本地保存的数据类型", "paras": ["虽然我们默认不收集用户数据，但 App 为实现功能可能在设备本地保存以下数据。该等数据不上传至我们的服务器。"], "subsections": []}, {"title": "6. Apple 支付、App Store 与交易状态", "paras": ["本产品的付费项目通过 Apple App Store / StoreKit 完成。用户的付款方式、账单、退款、税务处理、Apple ID、银行卡号、支付账户密码等由 Apple 处理，我们不会获得用户的完整支付凭证或 Apple ID 密码。", "为判断用户是否拥有相应付费权限，App 可能在本地读取或验证由 Apple 提供的交易状态、产品标识、购买状态、退款状态或权限状态。该过程用于启用、恢复或关闭 App 内相应功能。除非未来政策另有明确说明，我们不会将该等交易状态上传至我们自有服务器。", "如果用户向 Apple 申请退款，App 可能根据 Apple 返回的交易状态关闭、调整或恢复对应付费权限。购买、退款和账单争议的处理以 Apple 及适用法律规则为准。"], "subsections": []}, {"title": "7. 用户主动联系我们时的信息", "paras": ["在默认使用 App 的过程中，我们不会看到用户的答题和报告。但如果用户主动通过邮件、表单、客服、App Store 评论、社交媒体私信或其他方式联系我们，用户可能会向我们提供某些信息。"], "subsections": [{"title": "7.1 可能包含的信息", "paras": ["邮箱地址、昵称或其他联系方式；", "问题描述、反馈内容、语言版本、系统版本、设备型号、App 版本；", "购买项目、交易状态截图、Apple 退款状态截图；", "用户主动发送的报告截图、题目截图、分数截图或其他 App 页面截图；", "用户为说明问题而自行提供的其他信息。"]}, {"title": "7.2 使用目的", "paras": ["我们仅会将用户主动提供的信息用于处理反馈、定位问题、提供客户支持、改进内容质量、核查购买权限异常、修复错误、回应用户请求或履行法律义务。我们不会将用户主动反馈中的报告内容用于广告画像，也不会出售给第三方。"]}, {"title": "7.3 请勿过度提供敏感信息", "paras": ["本产品不要求用户向我们发送伴侣真实身份、聊天记录、住址、联系方式、身份证件、财务信息、自伤细节或其他高度敏感信息。用户反馈问题时，请尽量使用必要、最少的信息。若截图中包含不希望被我们看到的内容，建议先自行遮挡或删除后再发送。"]}]}, {"title": "8. Apple 诊断、崩溃日志与系统分析", "paras": ["如果用户在 iOS 设置中选择向 Apple 或开发者共享诊断与使用数据，Apple 可能向开发者提供与 App 稳定性相关的崩溃日志、性能信息、设备型号、系统版本、App  版本等信息。该等信息通常用于定位崩溃、提升稳定性和修复兼容性问题。", "除非用户主动在崩溃反馈中加入报告截图或其他个人内容，常规崩溃日志通常不包含用户完整答题内容或完整报告文本。我们不会将 Apple 提供的诊断信息用于广告追踪或商业画像。用户可在 iOS 系统设置中管理诊断与分析数据共享选项。"], "subsections": []}, {"title": "9. iCloud、设备备份与系统迁移", "paras": ["本产品默认将用户数据保存在设备本地。但根据用户的 iOS 设置、设备备份策略、iCloud 设置、系统迁移方式或 Apple 的技术机制，部分 App 本地数据可能随设备备份、设备迁移或系统恢复而由 Apple 处理。", "我们不会通过 iCloud 或设备备份主动获取用户的答题记录和报告内容，也无法控制 Apple 对备份数据的处理方式。用户如不希望本地 App 数据进入设备备份，应根据 Apple 的系统设置自行管理 iCloud 备份、设备备份和数据迁移选项。"], "subsections": []}, {"title": "10. 第三方服务、SDK、广告与追踪", "paras": [], "subsections": [{"title": "10.1 当前版本", "paras": ["当前版本不使用广告 SDK，不进行跨 App 或跨网站追踪，不出售用户数据，不向广告网络共享用户答题、报告或设备行为。当前版本也不通过第三方云服务处理用户题目、选项或报告。"]}, {"title": "10.2 Apple 平台服务", "paras": ["用户下载、安装、购买、退款、恢复购买、查看 App Store 页面、提交 App Store 评论或使用 Apple 相关平台能力时，Apple 可能根据其自身规则处理数据。该等处理不由我们控制。"]}, {"title": "10.3 未来可能变化", "paras": ["若未来版本引入统计分析 SDK、广告 SDK、云同步、AI 云端分析、账号登录、推送通知、客服系统或其他第三方服务，我们将在功能上线前更新本隐私政策，并在适用法律或平台规则要求的情况下取得用户授权、提供退出选项或进行必要提示。"]}]}, {"title": "11. 设备权限说明", "paras": ["当前版本原则上不需要访问通讯录、精确定位、相册、相机、麦克风、日历、健康数据、文件系统或其他与亲密关系报告无关的敏感权限。", "若未来版本因新增功能需要申请任何系统权限，我们会在权限申请前说明用途，并仅在实现相应功能所必需的范围内使用。用户可以在 iOS 设置中管理或撤回相关权限。撤回权限可能导致对应功能无法使用，但不会影响无需该权限的其他本地功能。"], "subsections": []}, {"title": "12. 题库、多语言内容与 AI 翻译说明", "paras": ["本产品包含大规模题库、选项说明、分析文本和报告文本。题库与多语言内容属于预先制作、预先校对并内置在 App 中的内容资源。部分非中文语言版本可能在内容制作阶段使用机器翻译、AI 翻译或本地化工具辅助生成，并经过必要校对后发布。", "上述翻译和本地化过程发生在产品内容制作阶段，不代表我们会在用户使用 App 时将用户的答题内容、报告内容或个人信息发送给翻译模型或 AI 服务。当前版本的用户报告生成和文本展示均在本地完成。", "如果未来版本引入云端 AI 分析、云端翻译、在线客服机器人或其他需要上传用户输入内容的功能，我们将在功能上线前另行说明数据处理方式，并在适用法律或平台规则要求的情况下取得用户同意。"], "subsections": []}, {"title": "13. 自动化评分、画像与报告生成的隐私说明", "paras": ["本产品会根据用户已完成题目和选项，在本地计算综合得分、维度得分、关系类型、卡通化画像和分析报告。该过程属于 App 功能的一部分，用于向用户提供自我理解、情绪支持和关系反思内容。", "这些计算结果默认不会上传给我们，也不会用于广告投放、信用评估、就业、保险、信贷、公共服务、法律资格或其他对用户产生重大外部影响的决策。用户看到的报告仅在 App 内供本人参考。", "用户可以通过清除本地记录、删除历史报告或卸载 App 的方式停止保存相关结果。由于我们默认不持有用户本地报告，用户也不能要求我们远程导出或恢复设备内的完整答题数据。"], "subsections": []}, {"title": "14. 数据保存、删除与恢复", "paras": [], "subsections": [{"title": "14.1 本地数据保存期限", "paras": ["用户的本地答题记录、报告、历史分数和设置通常会保存在设备中，直至用户在 App 内主动清除、删除相关记录、卸载 App、清除设备数据或因系统原因导致数据丢失。"]}, {"title": "14.2 本地数据删除", "paras": ["用户可以通过以下方式删除本地数据：", "使用 App 内的“清除本地记录”“删除历史报告”或类似功能；", "在 iOS 系统中卸载 App；", "清除设备数据或恢复设备；", "按系统设置管理 iCloud 备份或设备备份中的 App 数据。"]}, {"title": "14.3 删除后的不可恢复性", "paras": ["由于我们默认不在服务器保存用户答题和报告，用户删除本地记录后，我们通常无法帮助用户远程恢复。请在删除前确认是否仍需要保留报告。"]}, {"title": "14.4 用户支持记录保存期限", "paras": ["用户主动发送给我们的客服邮件、反馈内容、截图或相关支持记录，我们将仅在实现支持目的所必需的期限内保存（不超过 24 个月，除非法律、争议处理或安全合规需要更长保留）。用户可通过本政策列明的联系方式请求删除相关支持记录。"]}]}, {"title": "15. 用户权利与行使方式", "paras": ["在适用法律允许的范围内，用户可能享有查询、访问、更正、复制、删除、撤回同意、限制处理、反对处理、注销账号、投诉等个人信息相关权利。由于当前版本默认不建立账号、不上传答题和报告，我们通常无法远程访问用户设备内的本地数据。", "用户可通过 App 内功能自行查看、修改或删除本地数据。对于用户主动提供给我们的客服信息、反馈邮件或截图，用户可以通过本政策列明的联系方式向我们提出访问、更正或删除请求。", "为保护用户信息安全，在处理相关请求前，我们可能需要核验请求人与相关信息之间的关系。我们会在适用法律要求的期限内回应合理请求。若我们无法满足请求，将说明原因。"], "subsections": []}, {"title": "16. 未成年人保护", "paras": ["本产品主要面向具有独立理解能力的亲密关系用户，不专门面向儿童设计。未成年人使用本产品前，应取得父母或其他监护人的同意，并在监护人指导下理解报告内容。", "我们不会主动收集未成年人的身份信息，也不要求用户提供年龄、学校、班级、监护人信息或其他儿童个人信息。若监护人认为未成年人主动向我们提供了个人信息，或希望删除相关支持记录，可通过本政策列明的联系方式联系我们。", "如果某一国家或地区法律对儿童或未成年人使用数字服务有更严格要求，我们将按照当地强制性法律要求处理。"], "subsections": []}, {"title": "17. 数据安全", "paras": ["我们采取与本地化产品特点相匹配的安全措施，尽量减少不必要的数据处理。由于用户答题和报告默认不上传至我们的服务器，服务器侧数据泄露风险被显著降低。", "但用户仍需注意以下风险：", "设备未设置锁屏密码、被他人借用、被盗或被越狱，可能导致本地数据被他人查看；", "用户主动截图、转发报告、通过社交软件分享内容后，接收方可能继续传播；", "用户开启 iCloud 或设备备份后，本地数据可能随系统备份由 Apple 处理；", "用户主动向客服发送截图或报告内容后，我们将能看到用户发送的内容；", "任何软件都无法保证绝对安全，系统漏洞、设备攻击或第三方服务异常可能带来风险。", "如果我们发现与用户主动提供的信息有关的安全事件，并且适用法律要求通知用户或监管机构，我们将按照法律要求采取通知、补救和风险降低措施。"], "subsections": []}, {"title": "18. 跨境与国际用户说明", "paras": ["由于当前版本默认不上传用户答题和报告，我们通常不会因 App 使用本身发生由我们发起的个人信息跨境传输。", "但在以下情况下，用户信息可能涉及跨境处理：", "用户通过国际电子邮件服务、客服渠道或社交媒体主动联系我们；", "用户通过 Apple App Store 下载、购买、退款或提交评论；", "用户使用 iCloud、设备备份、设备迁移或 Apple 平台服务；", "用户所在国家或地区与我们的开发者所在地、邮箱服务商所在地不同。", "对于用户主动提供给我们的支持信息，我们会在必要范围内处理，并尽力采取合理保护措施。用户所在国家或地区可能赋予其额外的数据保护权利；如用户希望行使相关权利，可通过本政策列明的联系方式联系我们。"], "subsections": []}, {"title": "19. 政策变更", "paras": ["我们可能因产品功能变化、法律法规变化、平台规则变化或运营需要更新本隐私政策。更新后的政策将在 App 内、App Store 页面、官方网站或其他适当位置公布，并标明最近更新日期。", "如果更新涉及个人信息处理方式的重大变化，例如从“不上传答题数据”变更为“支持云同步或云端 AI 分析”，我们将在功能上线前以显著方式提示用户，并在适用法律或平台规则要求的情况下取得用户同意。用户不同意相关变化的，可以停止使用对应功能，或删除本地数据并卸载 App。"], "subsections": []}, {"title": "20. 联系我们", "paras": ["如果用户对本隐私政策、个人信息处理、本地数据删除、客服记录删除、App Store 隐私标签或其他隐私相关事项有任何问题，可以通过以下方式联系我们：", "联系邮箱：thestein@foxmail.com", "开发者：包家琛", "请用户在联系我们时尽量避免发送不必要的敏感信息。为定位问题必须发送截图时，建议先遮挡真实姓名、联系方式、伴侣信息、聊天记录或其他不希望被看到的内容。"], "subsections": []}], "ui": {"page_title": "隐私政策", "policy_summary": "政策概览", "table_of_contents": "目录", "effective_date": "生效日期", "last_updated": "最近更新日期", "app_name": "App 名称", "developer": "开发者", "contact_email": "联系邮箱", "language": "语言", "language_note": "页面会优先使用你的浏览器语言，若不支持则默认显示 English。", "default_language": "默认语言：English", "local_data_title": "本地数据类型", "local_data_usage": "用途", "local_data_uploaded": "是否默认上传给我们"}}, "zh-Hant": {"meta": {"title": "隱私政策", "policySummary": "本文檔是同一份隱私政策的多語言版本。你可以在閱讀前切換語言。", "effectiveDate": "2026 年 5 月 4 日", "lastUpdated": "2026 年 5 月 4 日", "appName": "Einii", "developer": "包家琛", "contactEmail": "thestein@foxmail.com"}, "summaryTable": [["App 名稱", "Einii"], ["開發者", "包家琛"], ["聯繫郵箱", "thestein@foxmail.com"], ["生效日期", "2026 年 5 月 4 日"], ["最近更新日期", "2026 年 5 月 4 日"]], "localDataTable": [["本地數據類型", "用途", "是否默認上傳給我們"], ["答題進度與選項", "記錄已完成題目、避免重複題目、支持個性化題目路徑", "否"], ["分數與維度結果", "生成綜合得分、折線圖、維度分析和報告內容", "否"], ["報告文本與歷史記錄", "供用戶本地回看、對比不同階段的關係反思結果", "否"], ["語言與界面設置", "展示用戶選擇的語言版本、界面偏好和基礎體驗設置", "否"], ["購買權限緩存", "在本地識別用戶是否已解鎖 40 題、60 題或升級權限", "否"], ["錯誤狀態或本地調試信息（如存在）", "幫助 App 在本地恢復狀態或提升穩定性", "否"]], "sections": [{"title": "1. 本政策的適用範圍", "paras": ["本隱私政策適用於 Einii 產品及其在 Apple App Store 上發佈的 iOS 版本，以及由同一開發者提供的與本 App 直接相關的本地化情感題庫、親密關係自測、關係得分展示、分析報告生成、歷史記錄展示、購買權限驗證、用戶反饋與客戶支持服務。", "本產品定位為親密關係自測、情緒支持、關係反思和內容閱讀類應用。用戶通過完成題目，獲得基於本地算法、題庫文本和選項映射生成的親密關係分析報告。除本政策明確說明的少量例外情形外，用戶的答題內容、選項、分數、報告和歷史記錄默認僅在用戶設備本地處理和保存。", "本政策不適用於 Apple Inc.、App Store、iCloud、電子郵件服務商、運營商、設備廠商或其他第三方獨立提供的服務。上述第三方會依據其自身隱私政策和適用法律處理數據。"], "subsections": []}, {"title": "2. 核心隱私承諾", "paras": ["我們將本產品設計為本地化優先、最小數據處理、低侵入式的情感支持工具。在當前版本中，我們的核心承諾如下：", "不建立用戶賬號系統；", "不要求用戶提供真實姓名、手機號、身份證件、通訊錄、精確位置、伴侶身份信息、聊天記錄或社交賬號；", "不主動收集、上傳或保存用戶的答題記錄、選項、分數、報告內容、關係畫像和歷史分析結果；", "不通過我們的服務器處理用戶題目、答案或報告；", "不出售用戶數據，不進行廣告追蹤，不基於用戶答題內容建立商業廣告畫像；", "不使用用戶答題內容訓練 AI 模型；", "不與第三方共享用戶的本地答題數據或報告內容；", "不在當前版本中使用廣告 SDK、跨 App 追蹤 SDK 或需要識別用戶身份的數據分析 SDK。", "如果未來版本因新增功能而需要收集、上傳、共享或遠程處理任何個人信息，我們將在相關功能上線前更新本政策，並在適用法律或平臺規則要求的情況下取得用戶同意或提供相應選擇。"], "subsections": []}, {"title": "3. 產品本地化處理說明", "paras": [], "subsections": [{"title": "3.1 本地計算", "paras": ["本產品的題目選擇、選項記錄、分數計算、關係維度分析、卡通化類型映射、報告生成和歷史展示，默認均在用戶設備本地完成。我們不會將用戶的答題過程上傳至開發者服務器，也不會遠程讀取用戶生成的報告。"]}, {"title": "3.2 本地存儲", "paras": ["為實現連續使用、歷史查看、報告回顧、購買權限展示等功能，本產品可能在用戶設備本地保存必要數據。該等數據通常包括：已完成題目、用戶選擇的選項、題量進度、綜合得分、維度得分、報告文本、歷史記錄、語言設置、界面偏好、購買權限緩存等。"]}, {"title": "3.3 本地數據的可見性", "paras": ["在默認情況下，只有持有該設備、能夠打開本 App 或能夠訪問該設備本地備份的人，才可能看到本地保存的數據。我們無法遠程查看、檢索、恢復或刪除用戶設備中的本地數據。用戶應妥善保管設備、設置鎖屏密碼，並避免將報告截圖、導出內容或設備訪問權限提供給不可信任的人。"]}]}, {"title": "4. 我們默認不會收集的信息", "paras": ["在當前版本中，我們不會主動收集下列信息：", "身份信息：真實姓名、身份證件號碼、護照號碼、住址、生日等；", "聯繫方式：手機號、通訊錄、聯繫人列表、社交賬號、伴侶聯繫方式等；", "位置數據：精確定位、常用地點、軌跡、地理圍欄等；", "生物識別信息：面部、指紋、聲紋、虹膜等；", "設備內容：照片、相冊、聊天記錄、短信、郵件、文件、瀏覽歷史等；", "親密關係敏感信息：我們不會要求用戶輸入伴侶真實姓名、聊天記錄、爭執細節、具體住址或其他可識別第三方身份的信息；", "廣告追蹤標識：我們不會為了廣告追蹤目的讀取或使用 IDFA；", "服務器日誌：由於當前版本不通過開發者服務器處理答題和報告，我們不會持有用戶答題訪問日誌、服務器請求日誌或遠程報告記錄。", "用戶在使用過程中如主動將報告截圖、答題內容、設備信息、購買記錄截圖或其他信息發送給我們，相關信息將按照本政策第 7 條處理。"], "subsections": []}, {"title": "5. 本地保存的數據類型", "paras": ["雖然我們默認不收集用戶數據，但 App 為實現功能可能在設備本地保存以下數據。該等數據不上傳至我們的服務器。"], "subsections": []}, {"title": "6. Apple 支付、App Store 與交易狀態", "paras": ["本產品的付費項目通過 Apple App Store / StoreKit 完成。用戶的付款方式、賬單、退款、稅務處理、Apple ID、銀行卡號、支付賬戶密碼等由 Apple 處理，我們不會獲得用戶的完整支付憑證或 Apple ID 密碼。", "為判斷用戶是否擁有相應付費權限，App 可能在本地讀取或驗證由 Apple 提供的交易狀態、產品標識、購買狀態、退款狀態或權限狀態。該過程用於啟用、恢復或關閉 App 內相應功能。除非未來政策另有明確說明，我們不會將該等交易狀態上傳至我們自有服務器。", "如果用戶向 Apple 申請退款，App 可能根據 Apple 返回的交易狀態關閉、調整或恢復對應付費權限。購買、退款和賬單爭議的處理以 Apple 及適用法律規則為準。"], "subsections": []}, {"title": "7. 用戶主動聯繫我們時的信息", "paras": ["在默認使用 App 的過程中，我們不會看到用戶的答題和報告。但如果用戶主動通過郵件、表單、客服、App Store 評論、社交媒體私信或其他方式聯繫我們，用戶可能會向我們提供某些信息。"], "subsections": [{"title": "7.1 可能包含的信息", "paras": ["郵箱地址、暱稱或其他聯繫方式；", "問題描述、反饋內容、語言版本、系統版本、設備型號、App 版本；", "購買項目、交易狀態截圖、Apple 退款狀態截圖；", "用戶主動發送的報告截圖、題目截圖、分數截圖或其他 App 頁面截圖；", "用戶為說明問題而自行提供的其他信息。"]}, {"title": "7.2 使用目的", "paras": ["我們僅會將用戶主動提供的信息用於處理反饋、定位問題、提供客戶支持、改進內容質量、核查購買權限異常、修復錯誤、回應用戶請求或履行法律義務。我們不會將用戶主動反饋中的報告內容用於廣告畫像，也不會出售給第三方。"]}, {"title": "7.3 請勿過度提供敏感信息", "paras": ["本產品不要求用戶向我們發送伴侶真實身份、聊天記錄、住址、聯繫方式、身份證件、財務信息、自傷細節或其他高度敏感信息。用戶反饋問題時，請儘量使用必要、最少的信息。若截圖中包含不希望被我們看到的內容，建議先自行遮擋或刪除後再發送。"]}]}, {"title": "8. Apple 診斷、崩潰日誌與系統分析", "paras": ["如果用戶在 iOS 設置中選擇向 Apple 或開發者共享診斷與使用數據，Apple 可能向開發者提供與 App 穩定性相關的崩潰日誌、性能信息、設備型號、系統版本、App  版本等信息。該等信息通常用於定位崩潰、提升穩定性和修復兼容性問題。", "除非用戶主動在崩潰反饋中加入報告截圖或其他個人內容，常規崩潰日誌通常不包含用戶完整答題內容或完整報告文本。我們不會將 Apple 提供的診斷信息用於廣告追蹤或商業畫像。用戶可在 iOS 系統設置中管理診斷與分析數據共享選項。"], "subsections": []}, {"title": "9. iCloud、設備備份與系統遷移", "paras": ["本產品默認將用戶數據保存在設備本地。但根據用戶的 iOS 設置、設備備份策略、iCloud 設置、系統遷移方式或 Apple 的技術機制，部分 App 本地數據可能隨設備備份、設備遷移或系統恢復而由 Apple 處理。", "我們不會通過 iCloud 或設備備份主動獲取用戶的答題記錄和報告內容，也無法控制 Apple 對備份數據的處理方式。用戶如不希望本地 App 數據進入設備備份，應根據 Apple 的系統設置自行管理 iCloud 備份、設備備份和數據遷移選項。"], "subsections": []}, {"title": "10. 第三方服務、SDK、廣告與追蹤", "paras": [], "subsections": [{"title": "10.1 當前版本", "paras": ["當前版本不使用廣告 SDK，不進行跨 App 或跨網站追蹤，不出售用戶數據，不向廣告網絡共享用戶答題、報告或設備行為。當前版本也不通過第三方雲服務處理用戶題目、選項或報告。"]}, {"title": "10.2 Apple 平臺服務", "paras": ["用戶下載、安裝、購買、退款、恢復購買、查看 App Store 頁面、提交 App Store 評論或使用 Apple 相關平臺能力時，Apple 可能根據其自身規則處理數據。該等處理不由我們控制。"]}, {"title": "10.3 未來可能變化", "paras": ["若未來版本引入統計分析 SDK、廣告 SDK、雲同步、AI 雲端分析、賬號登錄、推送通知、客服系統或其他第三方服務，我們將在功能上線前更新本隱私政策，並在適用法律或平臺規則要求的情況下取得用戶授權、提供退出選項或進行必要提示。"]}]}, {"title": "11. 設備權限說明", "paras": ["當前版本原則上不需要訪問通訊錄、精確定位、相冊、相機、麥克風、日曆、健康數據、文件系統或其他與親密關係報告無關的敏感權限。", "若未來版本因新增功能需要申請任何系統權限，我們會在權限申請前說明用途，並僅在實現相應功能所必需的範圍內使用。用戶可以在 iOS 設置中管理或撤回相關權限。撤回權限可能導致對應功能無法使用，但不會影響無需該權限的其他本地功能。"], "subsections": []}, {"title": "12. 題庫、多語言內容與 AI 翻譯說明", "paras": ["本產品包含大規模題庫、選項說明、分析文本和報告文本。題庫與多語言內容屬於預先製作、預先校對並內置在 App 中的內容資源。部分非中文語言版本可能在內容製作階段使用機器翻譯、AI 翻譯或本地化工具輔助生成，並經過必要校對後發佈。", "上述翻譯和本地化過程發生在產品內容製作階段，不代表我們會在用戶使用 App 時將用戶的答題內容、報告內容或個人信息發送給翻譯模型或 AI 服務。當前版本的用戶報告生成和文本展示均在本地完成。", "如果未來版本引入雲端 AI 分析、雲端翻譯、在線客服機器人或其他需要上傳用戶輸入內容的功能，我們將在功能上線前另行說明數據處理方式，並在適用法律或平臺規則要求的情況下取得用戶同意。"], "subsections": []}, {"title": "13. 自動化評分、畫像與報告生成的隱私說明", "paras": ["本產品會根據用戶已完成題目和選項，在本地計算綜合得分、維度得分、關係類型、卡通化畫像和分析報告。該過程屬於 App 功能的一部分，用於向用戶提供自我理解、情緒支持和關係反思內容。", "這些計算結果默認不會上傳給我們，也不會用於廣告投放、信用評估、就業、保險、信貸、公共服務、法律資格或其他對用戶產生重大外部影響的決策。用戶看到的報告僅在 App 內供本人參考。", "用戶可以通過清除本地記錄、刪除歷史報告或卸載 App 的方式停止保存相關結果。由於我們默認不持有用戶本地報告，用戶也不能要求我們遠程導出或恢復設備內的完整答題數據。"], "subsections": []}, {"title": "14. 數據保存、刪除與恢復", "paras": [], "subsections": [{"title": "14.1 本地數據保存期限", "paras": ["用戶的本地答題記錄、報告、歷史分數和設置通常會保存在設備中，直至用戶在 App 內主動清除、刪除相關記錄、卸載 App、清除設備數據或因系統原因導致數據丟失。"]}, {"title": "14.2 本地數據刪除", "paras": ["用戶可以通過以下方式刪除本地數據：", "使用 App 內的“清除本地記錄”“刪除歷史報告”或類似功能；", "在 iOS 系統中卸載 App；", "清除設備數據或恢復設備；", "按系統設置管理 iCloud 備份或設備備份中的 App 數據。"]}, {"title": "14.3 刪除後的不可恢復性", "paras": ["由於我們默認不在服務器保存用戶答題和報告，用戶刪除本地記錄後，我們通常無法幫助用戶遠程恢復。請在刪除前確認是否仍需要保留報告。"]}, {"title": "14.4 用戶支持記錄保存期限", "paras": ["用戶主動發送給我們的客服郵件、反饋內容、截圖或相關支持記錄，我們將僅在實現支持目的所必需的期限內保存（不超過 24 個月，除非法律、爭議處理或安全合規需要更長保留）。用戶可通過本政策列明的聯繫方式請求刪除相關支持記錄。"]}]}, {"title": "15. 用戶權利與行使方式", "paras": ["在適用法律允許的範圍內，用戶可能享有查詢、訪問、更正、複製、刪除、撤回同意、限制處理、反對處理、註銷賬號、投訴等個人信息相關權利。由於當前版本默認不建立賬號、不上傳答題和報告，我們通常無法遠程訪問用戶設備內的本地數據。", "用戶可通過 App 內功能自行查看、修改或刪除本地數據。對於用戶主動提供給我們的客服信息、反饋郵件或截圖，用戶可以通過本政策列明的聯繫方式向我們提出訪問、更正或刪除請求。", "為保護用戶信息安全，在處理相關請求前，我們可能需要核驗請求人與相關信息之間的關係。我們會在適用法律要求的期限內回應合理請求。若我們無法滿足請求，將說明原因。"], "subsections": []}, {"title": "16. 未成年人保護", "paras": ["本產品主要面向具有獨立理解能力的親密關係用戶，不專門面向兒童設計。未成年人使用本產品前，應取得父母或其他監護人的同意，並在監護人指導下理解報告內容。", "我們不會主動收集未成年人的身份信息，也不要求用戶提供年齡、學校、班級、監護人信息或其他兒童個人信息。若監護人認為未成年人主動向我們提供了個人信息，或希望刪除相關支持記錄，可通過本政策列明的聯繫方式聯繫我們。", "如果某一國家或地區法律對兒童或未成年人使用數字服務有更嚴格要求，我們將按照當地強制性法律要求處理。"], "subsections": []}, {"title": "17. 數據安全", "paras": ["我們採取與本地化產品特點相匹配的安全措施，儘量減少不必要的數據處理。由於用戶答題和報告默認不上傳至我們的服務器，服務器側數據洩露風險被顯著降低。", "但用戶仍需注意以下風險：", "設備未設置鎖屏密碼、被他人借用、被盜或被越獄，可能導致本地數據被他人查看；", "用戶主動截圖、轉發報告、通過社交軟件分享內容後，接收方可能繼續傳播；", "用戶開啟 iCloud 或設備備份後，本地數據可能隨系統備份由 Apple 處理；", "用戶主動向客服發送截圖或報告內容後，我們將能看到用戶發送的內容；", "任何軟件都無法保證絕對安全，系統漏洞、設備攻擊或第三方服務異常可能帶來風險。", "如果我們發現與用戶主動提供的信息有關的安全事件，並且適用法律要求通知用戶或監管機構，我們將按照法律要求採取通知、補救和風險降低措施。"], "subsections": []}, {"title": "18. 跨境與國際用戶說明", "paras": ["由於當前版本默認不上傳用戶答題和報告，我們通常不會因 App 使用本身發生由我們發起的個人信息跨境傳輸。", "但在以下情況下，用戶信息可能涉及跨境處理：", "用戶通過國際電子郵件服務、客服渠道或社交媒體主動聯繫我們；", "用戶通過 Apple App Store 下載、購買、退款或提交評論；", "用戶使用 iCloud、設備備份、設備遷移或 Apple 平臺服務；", "用戶所在國家或地區與我們的開發者所在地、郵箱服務商所在地不同。", "對於用戶主動提供給我們的支持信息，我們會在必要範圍內處理，並盡力採取合理保護措施。用戶所在國家或地區可能賦予其額外的數據保護權利；如用戶希望行使相關權利，可通過本政策列明的聯繫方式聯繫我們。"], "subsections": []}, {"title": "19. 政策變更", "paras": ["我們可能因產品功能變化、法律法規變化、平臺規則變化或運營需要更新本隱私政策。更新後的政策將在 App 內、App Store 頁面、官方網站或其他適當位置公佈，並標明最近更新日期。", "如果更新涉及個人信息處理方式的重大變化，例如從“不上傳答題數據”變更為“支持雲同步或雲端 AI 分析”，我們將在功能上線前以顯著方式提示用戶，並在適用法律或平臺規則要求的情況下取得用戶同意。用戶不同意相關變化的，可以停止使用對應功能，或刪除本地數據並卸載 App。"], "subsections": []}, {"title": "20. 聯繫我們", "paras": ["如果用戶對本隱私政策、個人信息處理、本地數據刪除、客服記錄刪除、App Store 隱私標籤或其他隱私相關事項有任何問題，可以通過以下方式聯繫我們：", "聯繫郵箱：thestein@foxmail.com", "開發者：包家琛", "請用戶在聯繫我們時儘量避免發送不必要的敏感信息。為定位問題必須發送截圖時，建議先遮擋真實姓名、聯繫方式、伴侶信息、聊天記錄或其他不希望被看到的內容。"], "subsections": []}], "ui": {"page_title": "隱私政策", "policy_summary": "政策概覽", "table_of_contents": "目錄", "effective_date": "生效日期", "last_updated": "最近更新日期", "app_name": "App 名稱", "developer": "開發者", "contact_email": "聯繫郵箱", "language": "語言", "language_note": "頁面會優先使用你的瀏覽器語言，若不支持則默認顯示 English。", "default_language": "默認語言：English", "local_data_title": "本地數據類型", "local_data_usage": "用途", "local_data_uploaded": "是否默認上傳給我們"}}, "en": {"meta": {"title": "privacy policy", "policySummary": "This document is a multilingual version of the same privacy policy. You can switch languages ​​before reading.", "effectiveDate": "May 4, 2026", "lastUpdated": "May 4, 2026", "appName": "Einii", "developer": "Bao Jiachen", "contactEmail": "thestein@foxmail.com"}, "summaryTable": [["App name", "Einii"], ["Developer", "Bao Jiachen"], ["Contact email", "thestein@foxmail.com"], ["Effective date", "May 4, 2026"], ["last updated date", "May 4, 2026"]], "localDataTable": [["local data type", "use", "Whether to upload to us by default"], ["Answer progress and options", "Record completed questions, avoid duplicate questions, and support personalized question paths", "no"], ["Score and dimension results", "Generate composite scores, line charts, dimensional analysis and report content", "no"], ["Report text and history", "Allows users to review and compare relationship reflection results at different stages locally.", "no"], ["Language and interface settings", "Display the language version, interface preferences and basic experience settings selected by the user", "no"], ["Buy permission cache", "Locally identify if a user has unlocked 40 questions, 60 questions, or upgraded privileges", "no"], ["Error status or local debugging information (if present)", "Help the app restore its state locally or improve stability", "no"]], "sections": [{"title": "1. Scope of application of this policy", "paras": ["This privacy policy applies to Einii products and its iOS version released on the Apple App Store, as well as localized emotional question banks, intimacy self-tests, relationship score display, analysis report generation, history display, purchase permission verification, user feedback and customer support services provided by the same developer and directly related to this App.", "This product is positioned as an application for intimacy self-assessment, emotional support, relationship reflection and content reading. By completing the questions, users can obtain an intimacy analysis report generated based on local algorithms, question bank text and option mapping. Except for a few exceptions clearly stated in this policy, the user's answer content, options, scores, reports and history are only processed and saved locally on the user's device by default.", "This policy does not apply to services independently provided by Apple Inc., the App Store, iCloud, email providers, carriers, device manufacturers, or other third parties. The above third parties process data in accordance with their own privacy policies and applicable laws."], "subsections": []}, {"title": "2. Core Privacy Commitments", "paras": ["We designed this product to be a localization-first, minimal data processing, low-intrusive emotional support tool. In the current version, our core commitments are as follows:", "No user account system is established;", "Users are not required to provide their real names, mobile phone numbers, ID documents, address books, precise locations, partner identity information, chat records or social accounts;", "Do not actively collect, upload or save users’ answer records, options, scores, report content, relationship portraits and historical analysis results;", "User questions, answers or reports are not processed through our servers;", "Do not sell user data, do not conduct advertising tracking, and do not create commercial advertising portraits based on user answer content;", "Do not use user answer content to train the AI ​​model;", "Do not share users’ local answering data or report content with third parties;", "Do not use the advertising SDK, cross-app tracking SDK, or user-identified data analytics SDK in the current version.", "If future versions require the collection, uploading, sharing or remote processing of any personal information due to new features, we will update this policy before the relevant features are launched and obtain user consent or provide corresponding choices if required by applicable laws or platform rules."], "subsections": []}, {"title": "3. Product localization processing instructions", "paras": [], "subsections": [{"title": "3.1 Local computing", "paras": ["This product's question selection, option recording, score calculation, relationship dimension analysis, cartoon type mapping, report generation and historical display are all completed locally on the user's device by default. We will not upload the user's answer process to the developer server, nor will we remotely read user-generated reports."]}, {"title": "3.2 Local storage", "paras": ["In order to achieve functions such as continuous use, history viewing, report review, purchase permission display, etc., this product may save necessary data locally on the user's device. Such data usually includes: completed questions, user-selected options, question progress, comprehensive scores, dimension scores, report text, historical records, language settings, interface preferences, purchase permission cache, etc."]}, {"title": "3.3 Visibility of local data", "paras": ["By default, locally saved data is only visible to people who own the device, can open the app, or have access to the device's local backup. We cannot remotely view, retrieve, recover, or delete local data from a user's device. Users should take good care of their devices, set a lock screen password, and avoid providing screenshots of reports, exported content, or device access to untrustworthy people."]}]}, {"title": "4. Information we do not collect by default", "paras": ["In the current version, we do not actively collect the following information:", "Identity information: real name, ID number, passport number, address, birthday, etc.;", "Contact information: mobile phone number, address book, contact list, social account, partner contact information, etc.;", "Location data: precise positioning, frequently used locations, trajectories, geofences, etc.;", "Biometric information: face, fingerprint, voiceprint, iris, etc.;", "Device content: photos, albums, chat history, text messages, emails, files, browsing history, etc.;", "Sensitive intimate relationship information: We will not ask users to enter their partner’s real name, chat history, dispute details, specific address or other information that can identify a third party;", "Ad Tracking Identifiers: We do not read or use the IDFA for ad tracking purposes;", "Server logs: Since the current version does not handle answering questions and reports through the developer server, we will not hold user answering access logs, server request logs, or remote reporting records.", "If users take the initiative to send us report screenshots, answer content, device information, purchase record screenshots or other information during use, the relevant information will be processed in accordance with Article 7 of this policy."], "subsections": []}, {"title": "5. Locally saved data types", "paras": ["Although we do not collect user data by default, the App may save the following data locally on the device to implement its functions. This data is not uploaded to our servers."], "subsections": []}, {"title": "6. Apple Pay, App Store and Transaction Status", "paras": ["The paid items for this product are completed through Apple App Store / StoreKit. The user's payment method, billing, refunds, tax processing, Apple ID, bank card number, payment account password, etc. are processed by Apple, and we do not obtain the user's complete payment voucher or Apple ID password.", "To determine whether the user has the corresponding payment permissions, the App may locally read or verify the transaction status, product identification, purchase status, refund status, or permission status provided by Apple. This process is used to enable, restore or turn off the corresponding functions within the app. Unless otherwise explicitly stated in future policies, we will not upload such transaction status to our own servers.", "If the user applies for a refund from Apple, the App may close, adjust, or restore the corresponding paid permissions based on the transaction status returned by Apple. Purchase, refund, and billing disputes are governed by Apple and applicable legal rules."], "subsections": []}, {"title": "7. Information when users proactively contact us", "paras": ["During the default use of the app, we will not see the user's answers and reports. However, if users proactively contact us through email, forms, customer service, App Store reviews, social media private messages, or other methods, users may provide us with certain information."], "subsections": [{"title": "7.1 Information that may be included", "paras": ["Email address, nickname or other contact information;", "Problem description, feedback content, language version, system version, device model, App version;", "Screenshots of purchased items, transaction status, and Apple refund status;", "Screenshots of reports, questions, scores or other App pages proactively sent by users;", "Other information provided by the user to explain the problem."]}, {"title": "7.2 Purpose of use", "paras": ["We will only use information proactively provided by users to handle feedback, locate problems, provide customer support, improve content quality, check purchase permission anomalies, fix errors, respond to user requests or fulfill legal obligations. We will not use the report content in active user feedback for advertising portraits, nor will we sell it to third parties."]}, {"title": "7.3 Do not over-provide sensitive information", "paras": ["This product does not require users to send us their partner’s true identity, chat history, address, contact information, ID, financial information, details of self-injury or other highly sensitive information. When users report problems, please try to use the necessary and minimum information. If the screenshot contains content that you do not want us to see, it is recommended to block or delete it yourself before sending it."]}]}, {"title": "8. Apple Diagnostics, Crash Logs and System Analysis", "paras": ["If users choose to share diagnostic and usage data with Apple or developers in iOS settings, Apple may provide developers with crash logs, performance information, device models, system versions, App versions and other information related to App stability. This information is typically used to locate crashes, improve stability, and fix compatibility issues.", "Unless the user actively adds report screenshots or other personal content in the crash feedback, regular crash logs usually do not contain the user's complete answer content or complete report text. We do not use diagnostic information provided by Apple for ad tracking or commercial profiling. Users can manage diagnostic and analytical data sharing options in iOS system settings."], "subsections": []}, {"title": "9. iCloud, device backup and system migration", "paras": ["This product saves user data locally on the device by default. However, depending on the user's iOS settings, device backup policy, iCloud settings, system migration method, or Apple's technical mechanism, some App local data may be processed by Apple during device backup, device migration, or system recovery.", "We do not actively obtain users' answer records and report content through iCloud or device backups, and we have no control over how Apple handles backup data. If users do not want local App data to enter device backup, they should manage iCloud backup, device backup and data migration options by themselves according to Apple's system settings."], "subsections": []}, {"title": "10. Third-party services, SDK, advertising and tracking", "paras": [], "subsections": [{"title": "10.1 Current version", "paras": ["The current version does not use advertising SDKs, does no cross-app or cross-site tracking, does not sell user data, and does not share user answers, reports, or device behavior with ad networks. The current version also does not handle user questions, options or reports through third-party cloud services."]}, {"title": "10.2 Apple Platform Services", "paras": ["When users download, install, purchase, refund, restore purchases, view App Store pages, submit App Store reviews, or use Apple-related platform capabilities, Apple may process data in accordance with its own rules. This processing is beyond our control."]}, {"title": "10.3 Possible changes in the future", "paras": ["If future versions introduce statistical analysis SDK, advertising SDK, cloud synchronization, AI cloud analysis, account login, push notifications, customer service system or other third-party services, we will update this privacy policy before the function is launched, and obtain user authorization, provide exit options or provide necessary prompts when required by applicable laws or platform rules."]}]}, {"title": "11. Device permission description", "paras": ["The current version in principle does not require access to contacts, pinpointing, photo albums, cameras, microphones, calendars, health data, file systems, or other sensitive permissions unrelated to intimacy reporting.", "If future versions require application for any system permissions due to new features, we will explain the purpose before applying for permissions and use them only within the scope necessary to implement the corresponding functions. Users can manage or revoke relevant permissions in iOS settings. Withdrawing permission may cause the corresponding function to be unavailable, but it will not affect other local functions that do not require the permission."], "subsections": []}, {"title": "12. Question bank, multilingual content and AI translation instructions", "paras": ["This product contains a large-scale question bank, option descriptions, analysis text and report text. Question banks and multilingual content are pre-produced, pre-proofed and built-in content resources in the app. Some non-Chinese language versions may be generated using machine translation, AI translation or localization tools during the content production stage, and will be released after necessary proofreading.", "The above translation and localization process occurs during the product content production stage, which does not mean that we will send the user's answer content, report content or personal information to the translation model or AI service when the user uses the App. In the current version, user report generation and text presentation are done locally.", "If future versions introduce cloud AI analysis, cloud translation, online customer service robots or other functions that require uploading user input content, we will separately explain the data processing methods before the function is launched, and obtain user consent if required by applicable laws or platform rules."], "subsections": []}, {"title": "13. Privacy statement for automated scoring, profiling and report generation", "paras": ["This product will locally calculate comprehensive scores, dimension scores, relationship types, cartoon portraits and analysis reports based on the questions and options the user has completed. This process is part of the app’s functionality to provide users with self-understanding, emotional support, and relationship reflection content.", "The results of these calculations are not uploaded to us by default, nor are they used for advertising, credit assessment, employment, insurance, credit, public services, legal qualifications or other decisions that have a significant external impact on the user. The reports seen by users are only for their reference within the App.", "Users can stop saving relevant results by clearing local records, deleting historical reports, or uninstalling the app. Since we do not hold users' local reports by default, users cannot ask us to remotely export or restore the complete answer data in the device."], "subsections": []}, {"title": "14. Data preservation, deletion and recovery", "paras": [], "subsections": [{"title": "14.1 Local data retention period", "paras": ["The user's local answer records, reports, historical scores, and settings are usually saved in the device until the user actively clears them within the app, deletes related records, uninstalls the app, clears device data, or data is lost due to system reasons."]}, {"title": "14.2 Local data deletion", "paras": ["Users can delete local data in the following ways:", "Use the \"Clear Local Records\", \"Delete History Report\" or similar functions in the App;", "Uninstall the app on iOS;", "Clear device data or restore the device;", "Manage app data in iCloud backup or device backup by system settings."]}, {"title": "14.3 Non-recoverability after deletion", "paras": ["Since we do not save user answers and reports on the server by default, after users delete local records, we usually cannot help users restore them remotely. Please confirm whether you still want to keep the report before deleting it."]}, {"title": "14.4 User support record retention period", "paras": ["We will only keep customer service emails, feedback content, screenshots or related support records proactively sent to us by users for the period necessary to achieve support purposes (no more than 24 months, unless longer retention is required by law, dispute handling or security compliance). Users can request deletion of relevant support records through the contact information listed in this policy."]}]}, {"title": "15. User rights and how to exercise them", "paras": ["To the extent permitted by applicable laws, users may have rights related to personal information such as querying, accessing, correcting, copying, deleting, withdrawing consent, restricting processing, objecting to processing, canceling accounts, making complaints, etc. Since the current version does not create accounts or upload answers and reports by default, we usually cannot remotely access local data in user devices.", "Users can view, modify or delete local data by themselves through in-app functions. For customer service information, feedback emails or screenshots that users actively provide to us, users can make access, correction or deletion requests to us through the contact information listed in this policy.", "To protect the security of user information, we may need to verify the relationship between the requester and the relevant information before processing the relevant request. We will respond to reasonable requests within the time periods required by applicable law. If we are unable to fulfill a request, the reasons will be stated."], "subsections": []}, {"title": "16. Protection of minors", "paras": ["This product is mainly intended for intimate relationship users with independent understanding and is not specifically designed for children. Before using this product, minors should obtain the consent of their parents or other guardians, and understand the contents of the report under the guidance of their guardians.", "We do not actively collect identity information from minors, nor do we require users to provide age, school, class, guardian information or other personal information about children. If the guardian believes that a minor has proactively provided us with personal information, or wishes to delete relevant support records, he or she can contact us through the contact information listed in this policy.", "If the laws of a certain country or region have stricter requirements for children or minors to use digital services, we will handle it in accordance with the local mandatory legal requirements."], "subsections": []}, {"title": "17. Data security", "paras": ["We adopt security measures that match the characteristics of localized products to minimize unnecessary data processing. Since user answers and reports are not uploaded to our server by default, the risk of server-side data leakage is significantly reduced.", "However, users still need to pay attention to the following risks:", "If the device does not have a lock screen password, is borrowed by others, stolen or jailbroken, local data may be viewed by others;", "After users take screenshots, forward reports, and share content through social software, the recipient may continue to spread it;", "After the user turns on iCloud or device backup, local data may be processed by Apple along with the system backup;", "After the user actively sends screenshots or report content to customer service, we will be able to see the content sent by the user;", "No software can guarantee absolute security, and system vulnerabilities, device attacks, or abnormalities in third-party services may bring risks.", "If we become aware of a security incident related to information voluntarily provided by users, and applicable law requires notification to users or regulators, we will take notification, remediation and risk reduction measures as required by law."], "subsections": []}, {"title": "18. Instructions for cross-border and international users", "paras": ["Since the current version does not upload user answers and reports by default, we usually do not initiate cross-border transfer of personal information due to the use of the App itself.", "However, user information may involve cross-border processing under the following circumstances:", "Users actively contact us through international email services, customer service channels or social media;", "Users download, purchase, refund or submit reviews through the Apple App Store;", "User's use of iCloud, device backup, device migration, or Apple platform services;", "The country or region where the user is located is different from where our developers and email service providers are located.", "We will process the support information voluntarily provided to us by users to the extent necessary and try our best to take reasonable protective measures. The country or region where users are located may grant them additional data protection rights; if users wish to exercise relevant rights, they can contact us through the contact information listed in this policy."], "subsections": []}, {"title": "19. Policy changes", "paras": ["We may update this privacy policy due to changes in product functions, changes in laws and regulations, changes in platform rules, or operational needs. The updated policy will be posted within the app, on the App Store page, on the official website, or other appropriate location, and will indicate the date of the last update.", "If the update involves a major change in the way personal information is processed, such as changing from \"not uploading answer data\" to \"supporting cloud synchronization or cloud AI analysis\", we will prominently remind users before the function is launched and obtain user consent if required by applicable laws or platform rules. If users do not agree to the relevant changes, they can stop using the corresponding functions, or delete local data and uninstall the App."], "subsections": []}, {"title": "20. Contact us", "paras": ["If users have any questions about this privacy policy, personal information processing, local data deletion, customer service record deletion, App Store privacy labels or other privacy-related matters, you can contact us through the following methods:", "Contact email: thestein@foxmail.com", "Developer: Bao Jiachen", "Users are asked to try to avoid sending unnecessary sensitive information when contacting us. When you must send a screenshot to locate a problem, it is recommended to first block your real name, contact information, partner information, chat history or other content you do not want to see."], "subsections": []}], "ui": {"page_title": "privacy policy", "policy_summary": "Policy overview", "table_of_contents": "Table of contents", "effective_date": "Effective date", "last_updated": "last updated date", "app_name": "App name", "developer": "Developer", "contact_email": "Contact email", "language": "language", "language_note": "The page will give priority to your browser language. If it is not supported, English will be displayed by default.", "default_language": "Default language: English", "local_data_title": "local data type", "local_data_usage": "use", "local_data_uploaded": "Whether to upload to us by default"}}, "ja": {"meta": {"title": "プライバシーポリシー", "policySummary": "この文書は、同じプライバシー ポリシーの多言語版です。読む前に言語を切り替えることができます。", "effectiveDate": "2026 年 5 月 4 日", "lastUpdated": "2026 年 5 月 4 日", "appName": "エイニイ", "developer": "バオ・ジアチェン", "contactEmail": "thestein@foxmail.com"}, "summaryTable": [["アプリ名", "エイニイ"], ["開発者", "バオ・ジアチェン"], ["連絡先メールアドレス", "thestein@foxmail.com"], ["発効日", "2026 年 5 月 4 日"], ["最終更新日", "2026 年 5 月 4 日"]], "localDataTable": [["ローカルデータ型", "使用", "デフォルトでアップロードするかどうか"], ["回答の進行状況とオプション", "完了した質問を記録し、重複した質問を回避し、パーソナライズされた質問パスをサポートします", "いいえ"], ["スコアとディメンションの結果", "複合スコア、折れ線グラフ、次元分析、レポートコンテンツを生成", "いいえ"], ["レポートのテキストと履歴", "ユーザーは、さまざまな段階での関係反映結果をローカルで確認および比較できます。", "いいえ"], ["言語とインターフェースの設定", "ユーザーが選択した言語バージョン、インターフェース設定、および基本的なエクスペリエンス設定を表示します。", "いいえ"], ["パーミッションキャッシュを購入する", "ユーザーが 40 個の質問、60 個の質問のロックを解除したか、または権限をアップグレードしたかをローカルで識別します", "いいえ"], ["エラーステータスまたはローカルデバッグ情報 (存在する場合)", "アプリの状態をローカルに復元したり、安定性を向上させたりするのに役立ちます", "いいえ"]], "sections": [{"title": "1.本ポリシーの適用範囲", "paras": ["このプライバシー ポリシーは、Apple App Store でリリースされる Einii 製品およびその iOS バージョン、ならびに同じ開発者によって提供され、このアプリに直接関連するローカライズされた感情質問バンク、親密さセルフテスト、関係スコア表示、分析レポート生成、履歴表示、購入許可の確認、ユーザー フィードバックおよびカスタマー サポート サービスに適用されます。", "この製品は、親密さの自己評価、感情的なサポート、関係の振り返り、コンテンツの読み取りのためのアプリケーションとして位置付けられています。質問に回答することで、ユーザーはローカル アルゴリズム、質問バンク テキスト、およびオプション マッピングに基づいて生成された親密さ分析レポートを取得できます。このポリシーに明確に記載されているいくつかの例外を除き、ユーザーの回答内容、オプション、スコア、レポートおよび履歴は、デフォルトでユーザーのデバイス上でローカルにのみ処理および保存されます。", "このポリシーは、Apple Inc.、App Store、iCloud、電子メールプロバイダー、通信事業者、デバイスメーカー、またはその他の第三者が独自に提供するサービスには適用されません。上記の第三者は、独自のプライバシー ポリシーおよび適用法に従ってデータを処理します。"], "subsections": []}, {"title": "2. 主要なプライバシーへの取り組み", "paras": ["私たちはこの製品を、ローカリゼーション優先、最小限のデータ処理、低侵襲性の感情サポート ツールとして設計しました。現在のバージョンにおける主な取り組みは次のとおりです。", "ユーザーアカウントシステムは確立されていません。", "ユーザーは、実名、携帯電話番号、身分証明書、アドレス帳、正確な位置情報、パートナーの身元情報、チャット記録、ソーシャル アカウントを提供する必要はありません。", "ユーザーの解答記録、オプション、スコア、レポートの内容、人間関係のポートレート、および履歴分析結果を積極的に収集、アップロード、または保存しないでください。", "ユーザーの質問、回答、レポートは当社のサーバーを通じて処理されません。", "ユーザーデータを販売したり、広告追跡を行ったり、ユーザーの回答内容に基づいて商業広告のポートレートを作成したりしないでください。", "ユーザーの回答コンテンツを AI モデルのトレーニングに使用しないでください。", "ユーザーのローカル応答データやレポート内容を第三者と共有しないでください。", "現在のバージョンでは、広告 SDK、クロスアプリ トラッキング SDK、またはユーザー識別データ分析 SDK を使用しないでください。", "将来のバージョンで新機能により個人情報の収集、アップロード、共有、またはリモート処理が必要な場合は、関連する機能が開始される前にこのポリシーを更新し、適用される法律またはプラットフォーム規則で必要な場合はユーザーの同意を得るか、対応する選択肢を提供します。"], "subsections": []}, {"title": "3. 製品ローカリゼーション処理命令", "paras": [], "subsections": [{"title": "3.1 ローカルコンピューティング", "paras": ["この製品の質問の選択、オプションの記録、スコア計算、関係次元分析、漫画タイプのマッピング、レポートの生成、および履歴表示は、デフォルトですべてユーザーのデバイス上でローカルに完了します。ユーザーの回答プロセスを開発者サーバーにアップロードしたり、ユーザーが作成したレポートをリモートで読み取ることはありません。"]}, {"title": "3.2 ローカルストレージ", "paras": ["本製品は、継続使用、履歴閲覧、レポート確認、購入許可表示などの機能を実現するために、必要なデータをユーザーの端末にローカルに保存する場合があります。このようなデータには通常、完了した質問、ユーザーが選択したオプション、質問の進行状況、総合スコア、ディメンション スコア、レポート テキスト、履歴記録、言語設定、インターフェイス設定、購入許可キャッシュなどが含まれます。"]}, {"title": "3.3 ローカルデータの可視性", "paras": ["デフォルトでは、ローカルに保存されたデータは、デバイスを所有しているユーザー、アプリを開くことができるユーザー、またはデバイスのローカル バックアップにアクセスできるユーザーのみに表示されます。ユーザーのデバイスからローカル データをリモートで表示、取得、回復、または削除することはできません。ユーザーはデバイスを十分に管理し、ロック画面のパスワードを設定し、レポートのスクリーンショット、エクスポートされたコンテンツ、またはデバイスへのアクセスを信頼できない人に提供しないようにする必要があります。"]}]}, {"title": "4. デフォルトでは収集されない情報", "paras": ["現在のバージョンでは、次の情報は積極的に収集されません。", "本人確認情報：本名、ID番号、パスポート番号、住所、生年月日等", "連絡先情報: 携帯電話番号、アドレス帳、連絡先リスト、ソーシャルアカウント、パートナーの連絡先情報など。", "位置データ: 正確な位置、頻繁に使用される位置、軌道、ジオフェンスなど。", "生体情報：顔、指紋、声紋、虹彩など。", "デバイスコンテンツ: 写真、アルバム、チャット履歴、テキストメッセージ、電子メール、ファイル、閲覧履歴など。", "親密な関係に関する機密情報: 当社はユーザーに対し、パートナーの実名、チャット履歴、紛争の詳細、特定の住所、または第三者を特定できるその他の情報の入力を求めません。", "広告追跡識別子: 当社は広告追跡目的で IDFA を読んだり使用したりしません。", "サーバー ログ: 現在のバージョンでは、開発者サーバーを介して質問への回答やレポートを処理できないため、ユーザーの回答アクセス ログ、サーバー リクエスト ログ、またはリモート レポート記録は保持されません。", "ユーザーが使用中にレポートのスクリーンショット、回答内容、デバイス情報、購入記録のスクリーンショット、またはその他の情報を率先して当社に送信した場合、関連する情報は本ポリシーの第 7 条に従って処理されます。"], "subsections": []}, {"title": "5. ローカルに保存されたデータ型", "paras": ["デフォルトではユーザーデータを収集しませんが、アプリは機能を実装するために次のデータをデバイス上にローカルに保存する場合があります。このデータは当社のサーバーにはアップロードされません。"], "subsections": []}, {"title": "6. Apple Pay、App Store、および取引ステータス", "paras": ["この製品の有料アイテムはApple App Store / StoreKitを通じて完了します。ユーザーの支払い方法、請求、返金、税務処理、Apple ID、銀行カード番号、支払いアカウントのパスワードなどは Apple によって処理され、当社はユーザーの完全な支払い伝票や Apple ID パスワードを取得しません。", "ユーザーが対応する支払い権限を持っているかどうかを判断するために、アプリは、Apple が提供する取引ステータス、製品 ID、購入ステータス、返金ステータス、または権限ステータスをローカルで読み取るか検証する場合があります。このプロセスは、アプリ内の対応する機能を有効化、復元、またはオフにするために使用されます。今後のポリシーで明示的に明記されていない限り、当社はそのような取引ステータスを当社のサーバーにアップロードすることはありません。", "ユーザーが Apple に返金を申請した場合、アプリは Apple から返された取引ステータスに基づいて、対応する有料アクセス許可を終了、調整、または復元することがあります。購入、返金、請求に関する紛争には、Apple および適用される法的規則が適用されます。"], "subsections": []}, {"title": "7. ユーザーから積極的に問い合わせがあった場合の情報", "paras": ["アプリのデフォルトの使用中は、ユーザーの回答やレポートは表示されません。ただし、ユーザーが電子メール、フォーム、カスタマーサービス、App Store レビュー、ソーシャルメディアのプライベートメッセージ、またはその他の方法を通じて積極的に当社に連絡した場合、ユーザーは特定の情報を当社に提供することがあります。"], "subsections": [{"title": "7.1 含まれる可能性のある情報", "paras": ["電子メールアドレス、ニックネームまたはその他の連絡先情報。", "問題の説明、フィードバックの内容、言語バージョン、システム バージョン、デバイス モデル、アプリのバージョン。", "購入したアイテム、取引ステータス、Apple 返金ステータスのスクリーンショット。", "ユーザーが積極的に送信したレポート、質問、スコア、またはその他のアプリ ページのスクリーンショット。", "問題を説明するためにユーザーが提供したその他の情報。"]}, {"title": "7.2 利用目的", "paras": ["当社は、ユーザーから積極的に提供された情報を、フィードバックの処理、問題の特定、カスタマーサポートの提供、コンテンツの品質の向上、購入許可の異常の確認、エラーの修正、ユーザーのリクエストへの対応、または法的義務の履行のためにのみ使用します。当社は、レポートの内容をポートレート広告のアクティブなユーザー フィードバックに使用したり、第三者に販売したりすることはありません。"]}, {"title": "7.3 機密情報を過剰に提供しない", "paras": ["この製品では、ユーザーがパートナーの本当の身元、チャット履歴、住所、連絡先情報、ID、財務情報、自傷行為の詳細、またはその他の非常に機密情報を当社に送信する必要はありません。ユーザーが問題を報告する場合は、必要最小限の情報を使用するようにしてください。スクリーンショットに見られたくないコンテンツが含まれている場合は、送信する前に自分でブロックまたは削除することをお勧めします。"]}]}, {"title": "8. Apple の診断、クラッシュ ログ、システム分析", "paras": ["ユーザーが iOS 設定で診断および使用状況データを Apple または開発者と共有することを選択した場合、Apple はクラッシュ ログ、パフォーマンス情報、デバイス モデル、システム バージョン、アプリのバージョン、およびアプリの安定性に関連するその他の情報を開発者に提供することがあります。この情報は通常、クラッシュの特定、安定性の向上、互換性の問題の修正に使用されます。", "ユーザーがクラッシュ フィードバックにレポートのスクリーンショットやその他の個人的なコンテンツを積極的に追加しない限り、通常のクラッシュ ログにはユーザーの完全な回答内容や完全なレポート テキストは含まれません。 Apple が提供する診断情報は、広告追跡や商用プロファイリングに使用しません。ユーザーは、iOS システム設定で診断および分析データの共有オプションを管理できます。"], "subsections": []}, {"title": "9. iCloud、デバイスのバックアップとシステムの移行", "paras": ["この製品は、デフォルトでユーザー データをデバイス上にローカルに保存します。ただし、ユーザーの iOS 設定、デバイスのバックアップ ポリシー、iCloud の設定、システム移行方法、または Apple の技術メカニズムによっては、一部のアプリのローカル データが、デバイスのバックアップ、デバイスの移行、またはシステムの回復中に Apple によって処理される場合があります。", "当社は、iCloud やデバイスのバックアップを通じてユーザーのアンサー レコードやレポートの内容を積極的に取得することはなく、Apple がバックアップ データをどのように処理するかを制御することはできません。ユーザーがローカルのアプリデータをデバイスのバックアップに入れたくない場合は、Apple のシステム設定に従って、iCloud バックアップ、デバイスのバックアップ、データ移行のオプションを自分で管理する必要があります。"], "subsections": []}, {"title": "10. サードパーティのサービス、SDK、広告および追跡", "paras": [], "subsections": [{"title": "10.1 現在のバージョン", "paras": ["現在のバージョンでは、広告 SDK は使用されておらず、クロスアプリまたはクロスサイトのトラッキングは行われず、ユーザー データの販売も行われず、ユーザーの回答、レポート、デバイスの動作を広告ネットワークと共有することもありません。現在のバージョンでは、サードパーティのクラウド サービスを介したユーザーの質問、オプション、レポートも処理できません。"]}, {"title": "10.2 Apple プラットフォーム サービス", "paras": ["ユーザーがダウンロード、インストール、購入、返金、購入の復元、App Store ページの表示、App Store レビューの送信、または Apple 関連のプラットフォーム機能を使用する場合、Apple は独自のルールに従ってデータを処理する場合があります。この処理は当社の制御の範囲を超えています。"]}, {"title": "10.3 将来の変更の可能性", "paras": ["将来のバージョンで統計分析 SDK、広告 SDK、クラウド同期、AI クラウド分析、アカウント ログイン、プッシュ通知、カスタマー サービス システム、またはその他のサードパーティ サービスが導入される場合、当社はその機能が開始される前にこのプライバシー ポリシーを更新し、適用される法律やプラットフォームの規則で要求される場合にはユーザーの承認を取得し、終了オプションを提供するか、必要なプロンプトを提供します。"]}]}, {"title": "11. デバイスの許可の説明", "paras": ["現在のバージョンでは原則として、連絡先、ピンポイント、フォトアルバム、カメラ、マイク、カレンダー、健康データ、ファイルシステム、または親密さの報告に関係のないその他の機密性の高い権限へのアクセスは必要ありません。", "今後のバージョンアップで新機能によりシステム権限の申請が必要となる場合には、申請前に目的をご説明し、当該機能の実現に必要な範囲内でのみ利用させていただきます。ユーザーは、iOS 設定で関連する権限を管理または取り消すことができます。許可を取り消すと、対応する機能が使用できなくなる可能性がありますが、許可を必要としない他のローカル機能には影響しません。"], "subsections": []}, {"title": "12. クエスチョンバンク、多言語コンテンツ、AI翻訳指示", "paras": ["この製品には、大規模な問題バンク、オプションの説明、分析テキスト、レポートテキストが含まれています。質問バンクと多言語コンテンツは、事前に作成され、事前に校正され、アプリにコンテンツ リソースが組み込まれています。一部の中国語以外の言語バージョンは、コンテンツ制作段階で機械翻訳、AI 翻訳、ローカリゼーション ツールを使用して生成される場合があり、必要な校正後にリリースされます。", "上記の翻訳およびローカライゼーションのプロセスは、製品コンテンツの制作段階で行われます。これは、ユーザーがアプリを使用するときに、当社がユーザーの回答コンテンツ、レポートコンテンツ、または個人情報を翻訳モデルまたは AI サービスに送信することを意味するものではありません。現在のバージョンでは、ユーザー レポートの生成とテキストの表示はローカルで行われます。", "将来のバージョンでクラウドAI分析、クラウド翻訳、オンライン接客ロボット、その他ユーザー入力内容のアップロードが必要な機能を導入する場合には、機能開始前にデータ処理方法を別途説明し、適用される法律やプラットフォームのルールで必要な場合にはユーザーの同意を取得します。"], "subsections": []}, {"title": "13. 自動スコアリング、プロファイリング、レポート生成のためのプライバシーに関する声明", "paras": ["この製品は、ユーザーが完了した質問とオプションに基づいて、総合スコア、ディメンション スコア、関係タイプ、漫画のポートレート、および分析レポートをローカルで計算します。このプロセスは、ユーザーに自己理解、感情的なサポート、人間関係を反映したコンテンツを提供するアプリの機能の一部です。", "これらの計算結果は、デフォルトでは当社にアップロードされず、広告、信用評価、雇用、保険、信用、公共サービス、法的資格、またはユーザーに外部に重大な影響を与えるその他の決定に使用されることもありません。ユーザーが閲覧するレポートは、アプリ内での参照のみを目的としています。", "ユーザーは、ローカル記録をクリアするか、履歴レポートを削除するか、アプリをアンインストールすることで、関連する結果の保存を停止できます。デフォルトではユーザーのローカル レポートは保持されないため、ユーザーはデバイス内の完全な回答データをリモートでエクスポートまたは復元するよう当社に依頼することはできません。"], "subsections": []}, {"title": "14. データの保存、削除、回復", "paras": [], "subsections": [{"title": "14.1 ローカルデータの保存期間", "paras": ["ユーザーのローカルの解答レコード、レポート、履歴スコア、設定は通常、ユーザーがアプリ内で積極的にクリアするか、関連レコードを削除するか、アプリをアンインストールするか、デバイス データをクリアするか、システム上の理由でデータが失われるまで、デバイスに保存されます。"]}, {"title": "14.2 ローカルデータの削除", "paras": ["ユーザーは次の方法でローカル データを削除できます。", "アプリ内の「ローカル記録のクリア」、「履歴レポートの削除」、または同様の機能を使用します。", "iOS でアプリをアンインストールします。", "デバイスのデータをクリアするか、デバイスを復元します。", "システム設定により、iCloud バックアップまたはデバイスバックアップのアプリデータを管理します。"]}, {"title": "14.3 削除後の復元不可能性", "paras": ["デフォルトではユーザーの回答とレポートはサーバーに保存されないため、ユーザーがローカル レコードを削除した後は、通常、ユーザーがそれらをリモートで復元するのを支援することはできません。レポートを削除する前に、レポートを保持するかどうかを確認してください。"]}, {"title": "14.4 ユーザーサポート記録の保存期間", "paras": ["当社は、ユーザーから積極的に送信されたカスタマー サービスの電子メール、フィードバック コンテンツ、スクリーンショット、または関連するサポート記録を、サポート目的を達成するために必要な期間のみ保管します (法律、紛争処理、またはセキュリティ コンプライアンスにより長期間の保存が要求されない限り、24 か月以内)。ユーザーは、このポリシーに記載されている連絡先情報を通じて、関連するサポート記録の削除をリクエストできます。"]}]}, {"title": "15. ユーザーの権利とその行使方法", "paras": ["適用法で認められる範囲で、ユーザーは、個人情報の照会、アクセス、修正、コピー、削除、同意の撤回、処理の制限、処理への異議、アカウントのキャンセル、苦情の申し立てなどの権利を有する場合があります。現在のバージョンでは、デフォルトでアカウントの作成や回答やレポートのアップロードが行われないため、通常、ユーザーのデバイス内のローカル データにリモートでアクセスすることはできません。", "ユーザーはアプリ内の機能を通じて、ローカルデータを自分で閲覧、変更、削除できます。ユーザーが当社に積極的に提供した顧客サービス情報、フィードバック電子メール、またはスクリーンショットについて、ユーザーは、本ポリシーに記載されている連絡先情報を通じて、当社にアクセス、修正、または削除のリクエストを行うことができます。", "ユーザー情報のセキュリティを保護するため、関連するリクエストを処理する前に、リクエスト者と関連情報との関係を確認する必要がある場合があります。当社は、適用される法律で要求される期間内に合理的な要求に対応します。ご要望に応じられない場合は、その理由を記載させていただきます。"], "subsections": []}, {"title": "16. 未成年者の保護", "paras": ["この製品は主に、独立した理解のある親密な関係を持つユーザーを対象としており、子供向けに特別に設計されたものではありません。未成年者が本製品を使用する場合は、保護者の同意を得て、保護者の指導の下、レポートの内容を理解してください。", "当社は未成年者から身元情報を積極的に収集することはなく、ユーザーに年齢、学校、クラス、保護者情報、またはその他の子供に関する個人情報の提供を要求することもありません。保護者が、未成年者が当社に個人情報を積極的に提供したと考える場合、または関連するサポート記録の削除を希望する場合は、本ポリシーに記載されている連絡先情報を通じて当社に連絡することができます。", "特定の国または地域の法律により、子供または未成年者によるデジタル サービスの使用に対する厳しい要件が定められている場合、当社は現地の強制的な法的要件に従って対応します。"], "subsections": []}, {"title": "17. データのセキュリティ", "paras": ["ローカライズ製品の特性に合わせたセキュリティ対策を施し、無駄なデータ処理を最小限に抑えます。デフォルトではユーザーの回答とレポートはサーバーにアップロードされないため、サーバー側のデータ漏洩のリスクが大幅に軽減されます。", "ただし、ユーザーは次のリスクに注意する必要があります。", "デバイスにロック画面パスワードがない場合、他人から借りた場合、盗難された場合、またはジェイルブレイクされた場合、ローカル データが他人に閲覧される可能性があります。", "ユーザーがスクリーンショットを撮り、レポートを転送し、ソーシャル ソフトウェアを通じてコン​​テンツを共有した後も、受信者はコンテンツを拡散し続ける可能性があります。", "ユーザーが iCloud またはデバイスのバックアップをオンにすると、ローカル データはシステム バックアップとともに Apple によって処理される場合があります。", "ユーザーが積極的にスクリーンショットを送信したり、コンテンツをカスタマー サービスに報告したりすると、当社はユーザーが送信したコンテンツを確認できるようになります。", "絶対的なセキュリティを保証できるソフトウェアはなく、システムの脆弱性、デバイスの攻撃、サードパーティのサービスの異常などがリスクを引き起こす可能性があります。", "ユーザーが自発的に提供した情報に関連するセキュリティインシデントを当社が認識し、適用法によりユーザーまたは規制当局への通知が義務付けられている場合、当社は法律の要求に応じて通知、修復およびリスク軽減措置を講じます。"], "subsections": []}, {"title": "18. 国境を越えたユーザーおよび海外ユーザー向けの指示", "paras": ["現在のバージョンではデフォルトでユーザーの回答やレポートがアップロードされないため、アプリ自体の使用による個人情報の国境を越えた転送は通常は開始されません。", "ただし、以下の状況では、ユーザー情報が国境を越えて処理される可能性があります。", "ユーザーは、国際電子メール サービス、カスタマー サービス チャネル、またはソーシャル メディアを通じて積極的に当社に問い合わせます。", "ユーザーは Apple App Store を通じてダウンロード、購入、返金、またはレビューの送信を行います。", "ユーザーによる iCloud、デバイスのバックアップ、デバイスの移行、または Apple プラットフォーム サービスの使用。", "ユーザーが所在する国または地域は、当社の開発者および電子メール サービス プロバイダーが所在する国または地域とは異なります。", "当社は、ユーザーから自発的に提供されたサポート情報を必要な範囲で処理し、合理的な保護措置を講じるよう最善を尽くします。ユーザーが所在する国または地域は、追加のデータ保護権利をユーザーに付与する場合があります。ユーザーが関連する権利を行使したい場合は、このポリシーに記載されている連絡先情報を通じて当社に連絡することができます。"], "subsections": []}, {"title": "19. ポリシーの変更", "paras": ["当社は、製品の機能の変更、法令の変更、プラットフォームのルールの変更、運用上の必要などにより、本プライバシーポリシーを更新する場合があります。更新されたポリシーは、アプリ内、App Store ページ、公式 Web サイト、またはその他の適切な場所に掲載され、最終更新日が示されます。", "「回答データをアップロードしない」から「クラウド同期やクラウドAI分析に対応する」への変更など、個人情報の処理方法に大きな変更を伴うアップデートの場合は、機能開始前に目立つようにユーザーに注意喚起し、適用される法律やプラットフォームのルールで必要な場合にはユーザーの同意を取得します。ユーザーが該当する変更に同意しない場合は、該当する機能の使用を停止したり、ローカルデータを削除してアプリをアンインストールしたりすることができます。"], "subsections": []}, {"title": "20. お問い合わせ", "paras": ["ユーザーがこのプライバシー ポリシー、個人情報の処理、ローカル データの削除、カスタマー サービス記録の削除、App Store のプライバシー ラベル、またはその他のプライバシー関連事項について質問がある場合は、次の方法で当社にお問い合わせください。", "連絡先メールアドレス: thestein@foxmail.com", "開発者: Bao Jiachen", "ユーザーは、当社に連絡する際に、不必要な機密情報を送信しないようにするよう求められます。問題を特定するためにスクリーンショットを送信する必要がある場合は、最初に本名、連絡先情報、パートナー情報、チャット履歴、またはその他の見たくないコンテンツをブロックすることをお勧めします。"], "subsections": []}], "ui": {"page_title": "プライバシーポリシー", "policy_summary": "ポリシーの概要", "table_of_contents": "目次", "effective_date": "発効日", "last_updated": "最終更新日", "app_name": "アプリ名", "developer": "開発者", "contact_email": "連絡先メールアドレス", "language": "言語", "language_note": "ページではブラウザの言語が優先されます。サポートされていない場合はデフォルトで英語が表示されます。", "default_language": "デフォルトの言語: 英語", "local_data_title": "ローカルデータ型", "local_data_usage": "使用", "local_data_uploaded": "デフォルトでアップロードするかどうか"}}, "de": {"meta": {"title": "Datenschutzrichtlinie", "policySummary": "Dieses Dokument ist eine mehrsprachige Version derselben Datenschutzrichtlinie. Sie können vor dem Lesen die Sprache wechseln.", "effectiveDate": "4. Mai 2026", "lastUpdated": "4. Mai 2026", "appName": "Einii", "developer": "Bao Jiachen", "contactEmail": "thestein@foxmail.com"}, "summaryTable": [["App-Name", "Einii"], ["Entwickler", "Bao Jiachen"], ["Kontakt-E-Mail", "thestein@foxmail.com"], ["Datum des Inkrafttretens", "4. Mai 2026"], ["Datum der letzten Aktualisierung", "4. Mai 2026"]], "localDataTable": [["lokaler Datentyp", "verwenden", "Ob standardmäßig zu uns hochgeladen werden soll"], ["Beantworten Sie den Fortschritt und die Optionen", "Erfassen Sie abgeschlossene Fragen, vermeiden Sie doppelte Fragen und unterstützen Sie personalisierte Fragenpfade", "NEIN"], ["Ergebnisse bewerten und dimensionieren", "Generieren Sie zusammengesetzte Bewertungen, Liniendiagramme, Dimensionsanalysen und Berichtsinhalte", "NEIN"], ["Melden Sie Text und Verlauf", "Ermöglicht Benutzern, die Ergebnisse der Beziehungsreflexion in verschiedenen Phasen lokal zu überprüfen und zu vergleichen.", "NEIN"], ["Sprach- und Schnittstelleneinstellungen", "Zeigt die vom Benutzer ausgewählte Sprachversion, Benutzeroberflächenpräferenzen und grundlegende Erlebniseinstellungen an", "NEIN"], ["Berechtigungscache kaufen", "Identifizieren Sie lokal, ob ein Benutzer 40 Fragen, 60 Fragen oder erweiterte Berechtigungen freigeschaltet hat", "NEIN"], ["Fehlerstatus oder lokale Debugging-Informationen (falls vorhanden)", "Helfen Sie der App, ihren Zustand lokal wiederherzustellen oder die Stabilität zu verbessern", "NEIN"]], "sections": [{"title": "1. Geltungsbereich dieser Richtlinie", "paras": ["Diese Datenschutzrichtlinie gilt für Einii-Produkte und ihre iOS-Version, die im Apple App Store veröffentlicht werden, sowie für lokalisierte emotionale Fragendatenbanken, Intimitäts-Selbsttests, Anzeige von Beziehungswerten, Erstellung von Analyseberichten, Verlaufsanzeige, Überprüfung der Kaufberechtigung, Benutzerfeedback und Kundensupportdienste, die vom selben Entwickler bereitgestellt werden und in direktem Zusammenhang mit dieser App stehen.", "Dieses Produkt ist als Anwendung zur Selbsteinschätzung der Intimität, zur emotionalen Unterstützung, zur Beziehungsreflexion und zum Lesen von Inhalten positioniert. Durch das Ausfüllen der Fragen können Benutzer einen Intimitätsanalysebericht erhalten, der auf der Grundlage lokaler Algorithmen, Fragendatenbanktext und Optionszuordnung erstellt wird. Mit Ausnahme einiger in dieser Richtlinie klar dargelegter Ausnahmen werden die Antwortinhalte, Optionen, Ergebnisse, Berichte und der Verlauf des Benutzers standardmäßig nur verarbeitet und lokal auf dem Gerät des Benutzers gespeichert.", "Diese Richtlinie gilt nicht für Dienste, die unabhängig von Apple Inc., dem App Store, iCloud, E-Mail-Anbietern, Mobilfunkanbietern, Geräteherstellern oder anderen Dritten bereitgestellt werden. Die oben genannten Dritten verarbeiten Daten in Übereinstimmung mit ihren eigenen Datenschutzrichtlinien und geltenden Gesetzen."], "subsections": []}, {"title": "2. Grundlegende Datenschutzverpflichtungen", "paras": ["Wir haben dieses Produkt als ein Tool zur emotionalen Unterstützung konzipiert, bei dem die Lokalisierung an erster Stelle steht und die Datenverarbeitung minimal ist. In der aktuellen Fassung lauten unsere Kernverpflichtungen wie folgt:", "Es ist kein Benutzerkontosystem eingerichtet.", "Benutzer sind nicht verpflichtet, ihre echten Namen, Mobiltelefonnummern, Ausweisdokumente, Adressbücher, genauen Standorte, Partneridentitätsinformationen, Chat-Aufzeichnungen oder soziale Konten anzugeben;", "Sammeln, hochladen oder speichern Sie die Antwortdatensätze, Optionen, Ergebnisse, Berichtsinhalte, Beziehungsporträts und historischen Analyseergebnisse der Benutzer nicht aktiv.", "Benutzerfragen, Antworten oder Berichte werden nicht über unsere Server verarbeitet;", "Verkaufen Sie keine Benutzerdaten, führen Sie kein Werbe-Tracking durch und erstellen Sie keine kommerziellen Werbeporträts basierend auf den Antwortinhalten der Benutzer.", "Verwenden Sie keine Benutzerantwortinhalte, um das KI-Modell zu trainieren.", "Geben Sie die lokalen Antwortdaten der Benutzer nicht an Dritte weiter und melden Sie keine Inhalte.", "Verwenden Sie nicht das Werbe-SDK, das Cross-App-Tracking-SDK oder das benutzeridentifizierte Datenanalyse-SDK in der aktuellen Version.", "Wenn zukünftige Versionen aufgrund neuer Funktionen das Sammeln, Hochladen, Teilen oder Fernverarbeiten personenbezogener Daten erfordern, werden wir diese Richtlinie vor der Einführung der entsprechenden Funktionen aktualisieren und die Zustimmung des Benutzers einholen oder entsprechende Optionen bereitstellen, sofern dies aufgrund geltender Gesetze oder Plattformregeln erforderlich ist."], "subsections": []}, {"title": "3. Verarbeitungsanweisungen für die Produktlokalisierung", "paras": [], "subsections": [{"title": "3.1 Lokales Rechnen", "paras": ["Die Fragenauswahl, Optionsaufzeichnung, Punkteberechnung, Beziehungsdimensionsanalyse, Cartoontypzuordnung, Berichtserstellung und Verlaufsanzeige dieses Produkts werden standardmäßig lokal auf dem Gerät des Benutzers durchgeführt. Wir werden den Antwortprozess des Benutzers weder auf den Entwicklerserver hochladen noch benutzergenerierte Berichte aus der Ferne lesen."]}, {"title": "3.2 Lokaler Speicher", "paras": ["Um Funktionen wie kontinuierliche Nutzung, Verlaufsanzeige, Berichtsüberprüfung, Kaufgenehmigungsanzeige usw. zu erreichen, speichert dieses Produkt möglicherweise notwendige Daten lokal auf dem Gerät des Benutzers. Zu diesen Daten gehören normalerweise: abgeschlossene Fragen, vom Benutzer ausgewählte Optionen, Fragenfortschritt, umfassende Bewertungen, Dimensionsbewertungen, Berichtstext, historische Aufzeichnungen, Spracheinstellungen, Benutzeroberflächeneinstellungen, Kaufgenehmigungs-Cache usw."]}, {"title": "3.3 Sichtbarkeit lokaler Daten", "paras": ["Standardmäßig sind lokal gespeicherte Daten nur für Personen sichtbar, die das Gerät besitzen, die App öffnen können oder Zugriff auf die lokale Sicherung des Geräts haben. Wir können lokale Daten nicht aus der Ferne vom Gerät eines Benutzers anzeigen, abrufen, wiederherstellen oder löschen. Benutzer sollten gut auf ihre Geräte aufpassen, ein Passwort für den Sperrbildschirm festlegen und es vermeiden, Screenshots von Berichten, exportierten Inhalten oder Gerätezugriffen an nicht vertrauenswürdige Personen weiterzugeben."]}]}, {"title": "4. Informationen, die wir standardmäßig nicht erfassen", "paras": ["In der aktuellen Version erfassen wir folgende Informationen nicht aktiv:", "Identitätsinformationen: richtiger Name, Ausweisnummer, Passnummer, Adresse, Geburtstag usw.;", "Kontaktinformationen: Mobiltelefonnummer, Adressbuch, Kontaktliste, soziales Konto, Partnerkontaktinformationen usw.;", "Standortdaten: genaue Positionierung, häufig genutzte Standorte, Flugbahnen, Geofences usw.;", "Biometrische Informationen: Gesicht, Fingerabdruck, Stimmabdruck, Iris usw.;", "Geräteinhalt: Fotos, Alben, Chatverlauf, Textnachrichten, E-Mails, Dateien, Browserverlauf usw.;", "Sensible Informationen zu intimen Beziehungen: Wir werden Benutzer nicht dazu auffordern, den echten Namen ihres Partners, den Chat-Verlauf, Streitdetails, eine bestimmte Adresse oder andere Informationen anzugeben, die einen Dritten identifizieren könnten;", "Anzeigenverfolgungskennungen: Wir lesen oder verwenden die IDFA nicht für Zwecke der Anzeigenverfolgung.", "Serverprotokolle: Da die aktuelle Version die Beantwortung von Fragen und Berichten nicht über den Entwicklerserver verarbeitet, speichern wir keine Benutzerantwortzugriffsprotokolle, Serveranfrageprotokolle oder Remote-Berichtsdatensätze.", "Wenn Benutzer die Initiative ergreifen, uns während der Nutzung Berichts-Screenshots, Antwortinhalte, Geräteinformationen, Kaufaufzeichnungs-Screenshots oder andere Informationen zu senden, werden die relevanten Informationen gemäß Artikel 7 dieser Richtlinie verarbeitet."], "subsections": []}, {"title": "5. Lokal gespeicherte Datentypen", "paras": ["Obwohl wir standardmäßig keine Benutzerdaten erfassen, kann die App zur Umsetzung ihrer Funktionen die folgenden Daten lokal auf dem Gerät speichern. Diese Daten werden nicht auf unsere Server hochgeladen."], "subsections": []}, {"title": "6. Apple Pay, App Store und Transaktionsstatus", "paras": ["Die kostenpflichtigen Artikel für dieses Produkt werden über den Apple App Store / StoreKit vervollständigt. Die Zahlungsmethode, Abrechnung, Rückerstattungen, Steuerabwicklung, Apple-ID, Bankkartennummer, das Passwort des Zahlungskontos usw. des Benutzers werden von Apple verarbeitet und wir erhalten nicht den vollständigen Zahlungsbeleg oder das Apple-ID-Passwort des Benutzers.", "Um festzustellen, ob der Benutzer über die entsprechenden Zahlungsberechtigungen verfügt, kann die App den von Apple bereitgestellten Transaktionsstatus, die Produktidentifizierung, den Kaufstatus, den Rückerstattungsstatus oder den Berechtigungsstatus lokal lesen oder überprüfen. Dieser Vorgang dient dazu, die entsprechenden Funktionen innerhalb der App zu aktivieren, wiederherzustellen oder abzuschalten. Sofern in zukünftigen Richtlinien nicht ausdrücklich anders angegeben, werden wir einen solchen Transaktionsstatus nicht auf unsere eigenen Server hochladen.", "Wenn der Benutzer eine Rückerstattung von Apple beantragt, kann die App die entsprechenden bezahlten Berechtigungen basierend auf dem von Apple zurückgegebenen Transaktionsstatus schließen, anpassen oder wiederherstellen. Kauf-, Rückerstattungs- und Rechnungsstreitigkeiten unterliegen Apple und den geltenden gesetzlichen Bestimmungen."], "subsections": []}, {"title": "7. Informationen bei proaktiver Kontaktaufnahme durch Nutzer", "paras": ["Während der Standardnutzung der App sehen wir die Antworten und Berichte des Benutzers nicht. Wenn Benutzer uns jedoch proaktiv über E-Mail, Formulare, Kundenservice, App Store-Bewertungen, private Nachrichten in sozialen Medien oder auf andere Weise kontaktieren, können Benutzer uns bestimmte Informationen übermitteln."], "subsections": [{"title": "7.1 Informationen, die enthalten sein können", "paras": ["E-Mail-Adresse, Spitzname oder andere Kontaktinformationen;", "Problembeschreibung, Feedbackinhalt, Sprachversion, Systemversion, Gerätemodell, App-Version;", "Screenshots von gekauften Artikeln, Transaktionsstatus und Apple-Rückerstattungsstatus;", "Screenshots von Berichten, Fragen, Ergebnissen oder anderen App-Seiten, die proaktiv von Benutzern gesendet werden;", "Weitere vom Benutzer bereitgestellte Informationen zur Erläuterung des Problems."]}, {"title": "7.2 Verwendungszweck", "paras": ["Wir werden von Benutzern proaktiv bereitgestellte Informationen nur verwenden, um Feedback zu bearbeiten, Probleme zu lokalisieren, Kundensupport bereitzustellen, die Inhaltsqualität zu verbessern, Anomalien bei Kaufgenehmigungen zu überprüfen, Fehler zu beheben, auf Benutzeranfragen zu reagieren oder rechtliche Verpflichtungen zu erfüllen. Wir werden die Berichtsinhalte nicht im aktiven User-Feedback für Werbeporträts verwenden und auch nicht an Dritte verkaufen."]}, {"title": "7.3 Geben Sie nicht zu viele vertrauliche Informationen an", "paras": ["Für dieses Produkt ist es nicht erforderlich, dass Benutzer uns die wahre Identität, den Chatverlauf, die Adresse, die Kontaktinformationen, den Ausweis, die Finanzinformationen, Angaben zu Selbstverletzungen oder andere hochsensible Informationen ihres Partners übermitteln. Wenn Benutzer Probleme melden, versuchen Sie bitte, die notwendigen und minimalen Informationen zu verwenden. Wenn der Screenshot Inhalte enthält, die wir nicht sehen sollen, empfiehlt es sich, ihn vor dem Versenden selbst zu sperren oder zu löschen."]}]}, {"title": "8. Apple-Diagnose, Absturzprotokolle und Systemanalyse", "paras": ["Wenn Benutzer in den iOS-Einstellungen Diagnose- und Nutzungsdaten mit Apple oder Entwicklern teilen, kann Apple den Entwicklern Absturzprotokolle, Leistungsinformationen, Gerätemodelle, Systemversionen, App-Versionen und andere Informationen im Zusammenhang mit der App-Stabilität zur Verfügung stellen. Diese Informationen werden normalerweise verwendet, um Abstürze zu lokalisieren, die Stabilität zu verbessern und Kompatibilitätsprobleme zu beheben.", "Sofern der Benutzer nicht aktiv Berichts-Screenshots oder andere persönliche Inhalte in das Absturz-Feedback einfügt, enthalten reguläre Absturzprotokolle normalerweise nicht den vollständigen Antwortinhalt oder den vollständigen Berichtstext des Benutzers. Wir verwenden von Apple bereitgestellte Diagnoseinformationen nicht für die Anzeigenverfolgung oder kommerzielle Profilerstellung. Benutzer können Optionen für die gemeinsame Nutzung diagnostischer und analytischer Daten in den iOS-Systemeinstellungen verwalten."], "subsections": []}, {"title": "9. iCloud, Gerätesicherung und Systemmigration", "paras": ["Dieses Produkt speichert Benutzerdaten standardmäßig lokal auf dem Gerät. Abhängig von den iOS-Einstellungen des Benutzers, der Gerätesicherungsrichtlinie, den iCloud-Einstellungen, der Systemmigrationsmethode oder dem technischen Mechanismus von Apple können jedoch einige lokale App-Daten von Apple während der Gerätesicherung, Gerätemigration oder Systemwiederherstellung verarbeitet werden.", "Wir erhalten die Antwortaufzeichnungen und Berichtsinhalte der Benutzer nicht aktiv über iCloud oder Gerätesicherungen und wir haben keine Kontrolle darüber, wie Apple mit Sicherungsdaten umgeht. Wenn Benutzer nicht möchten, dass lokale App-Daten in die Gerätesicherung übernommen werden, sollten sie die Optionen für iCloud-Sicherung, Gerätesicherung und Datenmigration gemäß den Systemeinstellungen von Apple selbst verwalten."], "subsections": []}, {"title": "10. Dienste von Drittanbietern, SDK, Werbung und Tracking", "paras": [], "subsections": [{"title": "10.1 Aktuelle Version", "paras": ["Die aktuelle Version verwendet keine Werbe-SDKs, führt kein Cross-App- oder Cross-Site-Tracking durch, verkauft keine Benutzerdaten und gibt keine Benutzerantworten, Berichte oder Geräteverhalten an Werbenetzwerke weiter. Die aktuelle Version verarbeitet auch keine Benutzerfragen, Optionen oder Berichte über Cloud-Dienste von Drittanbietern."]}, {"title": "10.2 Apple-Plattformdienste", "paras": ["Wenn Benutzer Käufe herunterladen, installieren, kaufen, erstatten, wiederherstellen, App-Store-Seiten ansehen, App-Store-Rezensionen abgeben oder Apple-bezogene Plattformfunktionen nutzen, kann Apple Daten gemäß seinen eigenen Regeln verarbeiten. Diese Verarbeitung liegt außerhalb unseres Einflussbereichs."]}, {"title": "10.3 Mögliche Änderungen in der Zukunft", "paras": ["Wenn in zukünftigen Versionen ein statistisches Analyse-SDK, ein Werbe-SDK, eine Cloud-Synchronisierung, eine KI-Cloud-Analyse, eine Kontoanmeldung, Push-Benachrichtigungen, ein Kundendienstsystem oder andere Dienste von Drittanbietern eingeführt werden, werden wir diese Datenschutzrichtlinie vor dem Start der Funktion aktualisieren und die Benutzerautorisierung einholen, Exit-Optionen bereitstellen oder notwendige Eingabeaufforderungen bereitstellen, wenn dies durch geltende Gesetze oder Plattformregeln erforderlich ist."]}]}, {"title": "11. Beschreibung der Geräteberechtigungen", "paras": ["Die aktuelle Version erfordert grundsätzlich keinen Zugriff auf Kontakte, Ortung, Fotoalben, Kameras, Mikrofone, Kalender, Gesundheitsdaten, Dateisysteme oder andere sensible Berechtigungen, die nichts mit der Meldung von Intimität zu tun haben.", "Sollten künftige Versionen aufgrund neuer Funktionen die Beantragung von Systemberechtigungen erfordern, erläutern wir den Zweck vor der Beantragung von Berechtigungen und nutzen diese nur in dem für die Umsetzung der entsprechenden Funktionen erforderlichen Umfang. Benutzer können relevante Berechtigungen in den iOS-Einstellungen verwalten oder widerrufen. Der Entzug der Berechtigung kann dazu führen, dass die entsprechende Funktion nicht verfügbar ist, hat jedoch keine Auswirkungen auf andere lokale Funktionen, für die die Berechtigung nicht erforderlich ist."], "subsections": []}, {"title": "12. Fragendatenbank, mehrsprachige Inhalte und KI-Übersetzungsanweisungen", "paras": ["Dieses Produkt enthält eine umfangreiche Fragendatenbank, Optionsbeschreibungen, Analysetexte und Berichtstexte. Fragendatenbanken und mehrsprachige Inhalte sind vorproduzierte, vorgeprüfte und integrierte Inhaltsressourcen in der App. Einige nicht-chinesische Sprachversionen können während der Inhaltsproduktionsphase mithilfe maschineller Übersetzung, KI-Übersetzung oder Lokalisierungstools erstellt werden und werden nach dem erforderlichen Korrekturlesen veröffentlicht.", "Der obige Übersetzungs- und Lokalisierungsprozess findet während der Produktionsphase des Produktinhalts statt. Dies bedeutet nicht, dass wir den Antwortinhalt, den B
