erichtsinhalt oder die persönlichen Informationen des Benutzers an das Übersetzungsmodell oder den KI-Dienst senden, wenn der Benutzer die App nutzt. In der aktuellen Version erfolgen die Erstellung von Benutzerberichten und die Textpräsentation lokal.", "Wenn zukünftige Versionen Cloud-KI-Analyse, Cloud-Übersetzung, Online-Kundenservice-Roboter oder andere Funktionen einführen, die das Hochladen von Benutzereingabeinhalten erfordern, werden wir die Datenverarbeitungsmethoden vor dem Start der Funktion separat erläutern und die Zustimmung des Benutzers einholen, sofern dies aufgrund geltender Gesetze oder Plattformregeln erforderlich ist."], "subsections": []}, {"title": "13. Datenschutzerklärung für automatisiertes Scoring, Profiling und Reporterstellung", "paras": ["Dieses Produkt berechnet lokal umfassende Bewertungen, Dimensionsbewertungen, Beziehungstypen, Cartoon-Porträts und Analyseberichte basierend auf den Fragen und Optionen, die der Benutzer ausgefüllt hat. Dieser Prozess ist Teil der Funktionalität der App, um Benutzern Selbstverständnis, emotionale Unterstützung und Inhalte zur Beziehungsreflexion zu bieten.", "Die Ergebnisse dieser Berechnungen werden standardmäßig nicht bei uns hochgeladen und auch nicht für Werbung, Bonitätsprüfung, Beschäftigung, Versicherung, Kredit, öffentliche Dienste, Rechtsqualifikation oder andere Entscheidungen, die erhebliche Außenwirkung auf den Nutzer haben, verwendet. Die von Benutzern angezeigten Berichte dienen nur zu Referenzzwecken innerhalb der App.", "Benutzer können das Speichern relevanter Ergebnisse beenden, indem sie lokale Datensätze löschen, historische Berichte löschen oder die App deinstallieren. Da wir die lokalen Berichte der Benutzer nicht standardmäßig speichern, können Benutzer uns nicht auffordern, die vollständigen Antwortdaten aus der Ferne auf dem Gerät zu exportieren oder wiederherzustellen."], "subsections": []}, {"title": "14. Aufbewahrung, Löschung und Wiederherstellung von Daten", "paras": [], "subsections": [{"title": "14.1 Aufbewahrungsfrist für lokale Daten", "paras": ["Die lokalen Antwortdatensätze, Berichte, historischen Ergebnisse und Einstellungen des Benutzers werden normalerweise auf dem Gerät gespeichert, bis der Benutzer sie aktiv in der App löscht, zugehörige Datensätze löscht, die App deinstalliert, Gerätedaten löscht oder Daten aus Systemgründen verloren gehen."]}, {"title": "14.2 Lokale Datenlöschung", "paras": ["Benutzer können lokale Daten auf folgende Weise löschen:", "Nutzen Sie die Funktionen „Lokale Datensätze löschen“, „Verlaufsbericht löschen“ oder ähnliche Funktionen in der App;", "Deinstallieren Sie die App unter iOS;", "Gerätedaten löschen oder das Gerät wiederherstellen;", "Verwalten Sie App-Daten im iCloud-Backup oder Geräte-Backup über die Systemeinstellungen."]}, {"title": "14.3 Unwiederherstellbarkeit nach Löschung", "paras": ["Da wir Benutzerantworten und -berichte standardmäßig nicht auf dem Server speichern, können wir Benutzern nach dem Löschen lokaler Datensätze normalerweise nicht dabei helfen, sie aus der Ferne wiederherzustellen. Bitte bestätigen Sie vor dem Löschen, ob Sie den Bericht weiterhin behalten möchten."]}, {"title": "14.4 Aufbewahrungsfrist für Benutzer-Supportdatensätze", "paras": ["Wir bewahren Kundendienst-E-Mails, Feedback-Inhalte, Screenshots oder zugehörige Support-Aufzeichnungen, die uns von Benutzern proaktiv gesendet werden, nur für den Zeitraum auf, der zur Erreichung von Support-Zwecken erforderlich ist (nicht länger als 24 Monate, es sei denn, eine längere Aufbewahrung ist gesetzlich, zur Streitbeilegung oder zur Einhaltung von Sicherheitsbestimmungen erforderlich). Benutzer können die Löschung relevanter Support-Datensätze über die in dieser Richtlinie aufgeführten Kontaktinformationen beantragen."]}]}, {"title": "15. Benutzerrechte und deren Ausübung", "paras": ["Soweit gesetzlich zulässig, haben Benutzer möglicherweise Rechte in Bezug auf personenbezogene Daten wie Abfrage, Zugriff, Berichtigung, Kopieren, Löschen, Widerruf der Einwilligung, Einschränkung der Verarbeitung, Einspruch gegen die Verarbeitung, Löschung von Konten, Einreichen von Beschwerden usw. Da in der aktuellen Version standardmäßig keine Konten erstellt oder Antworten und Berichte hochgeladen werden, können wir in der Regel nicht aus der Ferne auf lokale Daten auf Benutzergeräten zugreifen.", "Benutzer können lokale Daten über In-App-Funktionen selbst anzeigen, ändern oder löschen. Für Kundendienstinformationen, Feedback-E-Mails oder Screenshots, die uns Benutzer aktiv zur Verfügung stellen, können Benutzer über die in dieser Richtlinie aufgeführten Kontaktinformationen Zugriffs-, Korrektur- oder Löschanfragen an uns richten.", "Um die Sicherheit der Benutzerinformationen zu schützen, müssen wir möglicherweise die Beziehung zwischen dem Antragsteller und den relevanten Informationen überprüfen, bevor wir die entsprechende Anfrage bearbeiten. Wir werden auf angemessene Anfragen innerhalb der gesetzlich vorgeschriebenen Fristen reagieren. Sollten wir einer Anfrage nicht nachkommen können, werden wir Ihnen die Gründe nennen."], "subsections": []}, {"title": "16. Jugendschutz", "paras": ["Dieses Produkt ist hauptsächlich für Benutzer intimer Beziehungen mit eigenständigem Verständnis gedacht und nicht speziell für Kinder konzipiert. Vor der Verwendung dieses Produkts sollten Minderjährige die Zustimmung ihrer Eltern oder anderer Erziehungsberechtigten einholen und unter Anleitung ihrer Erziehungsberechtigten den Inhalt des Berichts verstehen.", "Wir erfassen nicht aktiv Identitätsinformationen von Minderjährigen und verlangen von Benutzern auch nicht die Angabe von Informationen zu Alter, Schule, Klasse, Erziehungsberechtigten oder anderen persönlichen Informationen über Kinder. Wenn der Vormund der Meinung ist, dass ein Minderjähriger uns proaktiv personenbezogene Daten zur Verfügung gestellt hat oder relevante Supportdaten löschen möchte, kann er oder sie uns über die in dieser Richtlinie aufgeführten Kontaktinformationen kontaktieren.", "Wenn die Gesetze eines bestimmten Landes oder einer bestimmten Region strengere Anforderungen für die Nutzung digitaler Dienste durch Kinder oder Minderjährige vorsehen, werden wir dies in Übereinstimmung mit den lokalen zwingenden gesetzlichen Anforderungen handhaben."], "subsections": []}, {"title": "17. Datensicherheit", "paras": ["Wir ergreifen Sicherheitsmaßnahmen, die den Eigenschaften lokalisierter Produkte entsprechen, um unnötige Datenverarbeitung zu minimieren. Da Benutzerantworten und -berichte standardmäßig nicht auf unseren Server hochgeladen werden, wird das Risiko eines serverseitigen Datenlecks erheblich verringert.", "Allerdings müssen Anwender dennoch auf die folgenden Risiken achten:", "Wenn das Gerät kein Passwort für den Sperrbildschirm hat, von anderen geliehen wird, gestohlen wird oder einen Jailbreak aufweist, können lokale Daten von anderen eingesehen werden;", "Nachdem Benutzer Screenshots gemacht, Berichte weitergeleitet und Inhalte über soziale Software geteilt haben, kann der Empfänger diese weiterhin verbreiten;", "Nachdem der Benutzer iCloud oder die Gerätesicherung aktiviert hat, werden lokale Daten möglicherweise von Apple zusammen mit der Systemsicherung verarbeitet.", "Nachdem der Benutzer aktiv Screenshots sendet oder Inhalte an den Kundendienst meldet, können wir die vom Benutzer gesendeten Inhalte sehen.", "Keine Software kann absolute Sicherheit garantieren und Systemschwachstellen, Geräteangriffe oder Anomalien bei Diensten Dritter können Risiken mit sich bringen.", "Wenn uns ein Sicherheitsvorfall im Zusammenhang mit von Benutzern freiwillig bereitgestellten Informationen bekannt wird und das geltende Recht eine Benachrichtigung der Benutzer oder Aufsichtsbehörden erfordert, werden wir die gesetzlich vorgeschriebenen Benachrichtigungs-, Abhilfe- und Risikominderungsmaßnahmen ergreifen."], "subsections": []}, {"title": "18. Hinweise für grenzüberschreitende und internationale Nutzer", "paras": ["Da die aktuelle Version standardmäßig keine Benutzerantworten und -berichte hochlädt, veranlassen wir aufgrund der Nutzung der App selbst in der Regel keine grenzüberschreitende Übermittlung personenbezogener Daten.", "Allerdings kann es unter folgenden Umständen zu einer grenzüberschreitenden Verarbeitung der Nutzerdaten kommen:", "Benutzer kontaktieren uns aktiv über internationale E-Mail-Dienste, Kundendienstkanäle oder soziale Medien;", "Benutzer können über den Apple App Store Bewertungen herunterladen, kaufen, erstatten oder Bewertungen abgeben.", "Nutzung von iCloud, Gerätesicherung, Gerätemigration oder Apple-Plattformdiensten durch den Benutzer;", "Das Land oder die Region, in der sich der Benutzer befindet, unterscheidet sich von dem Land oder der Region, in dem sich unsere Entwickler und E-Mail-Dienstanbieter befinden.", "Wir werden die uns von Nutzern freiwillig zur Verfügung gestellten Supportinformationen im erforderlichen Umfang verarbeiten und unser Bestes tun, um angemessene Schutzmaßnahmen zu ergreifen. Das Land oder die Region, in der sich Benutzer befinden, kann ihnen zusätzliche Datenschutzrechte einräumen; Wenn Benutzer entsprechende Rechte ausüben möchten, können sie uns über die in dieser Richtlinie aufgeführten Kontaktinformationen kontaktieren."], "subsections": []}, {"title": "19. Richtlinienänderungen", "paras": ["Wir können diese Datenschutzrichtlinie aufgrund von Änderungen der Produktfunktionen, Änderungen der Gesetze und Vorschriften, Änderungen der Plattformregeln oder betrieblicher Anforderungen aktualisieren. Die aktualisierten Richtlinien werden in der App, auf der App Store-Seite, auf der offiziellen Website oder an einem anderen geeigneten Ort veröffentlicht und geben das Datum der letzten Aktualisierung an.", "Wenn das Update eine wesentliche Änderung in der Art und Weise mit sich bringt, wie personenbezogene Daten verarbeitet werden, wie z. B. der Wechsel von „kein Hochladen von Antwortdaten“ zu „Unterstützung von Cloud-Synchronisierung oder Cloud-KI-Analyse“, werden wir Benutzer vor dem Start der Funktion deutlich darauf hinweisen und die Zustimmung des Benutzers einholen, sofern dies aufgrund geltender Gesetze oder Plattformregeln erforderlich ist. Wenn Nutzer mit den entsprechenden Änderungen nicht einverstanden sind, können sie die Nutzung der entsprechenden Funktionen einstellen oder lokale Daten löschen und die App deinstallieren."], "subsections": []}, {"title": "20. Kontaktieren Sie uns", "paras": ["Wenn Benutzer Fragen zu dieser Datenschutzrichtlinie, der Verarbeitung personenbezogener Daten, der Löschung lokaler Daten, der Löschung von Kundendienstdatensätzen, den Datenschutzkennzeichnungen im App Store oder anderen datenschutzbezogenen Angelegenheiten haben, können Sie uns über die folgenden Methoden kontaktieren:", "Kontakt-E-Mail: thestein@foxmail.com", "Entwickler: Bao Jiachen", "Benutzer werden gebeten, bei der Kontaktaufnahme mit uns die Übermittlung unnötiger vertraulicher Informationen zu vermeiden. Wenn Sie einen Screenshot senden müssen, um ein Problem zu lokalisieren, wird empfohlen, zunächst Ihren echten Namen, Ihre Kontaktinformationen, Partnerinformationen, Ihren Chatverlauf oder andere Inhalte zu blockieren, die Sie nicht sehen möchten."], "subsections": []}], "ui": {"page_title": "Datenschutzrichtlinie", "policy_summary": "Richtlinienübersicht", "table_of_contents": "Inhaltsverzeichnis", "effective_date": "Datum des Inkrafttretens", "last_updated": "Datum der letzten Aktualisierung", "app_name": "App-Name", "developer": "Entwickler", "contact_email": "Kontakt-E-Mail", "language": "Sprache", "language_note": "Die Seite gibt Ihrer Browsersprache Vorrang. Wenn es nicht unterstützt wird, wird standardmäßig Englisch angezeigt.", "default_language": "Standardsprache: Englisch", "local_data_title": "lokaler Datentyp", "local_data_usage": "verwenden", "local_data_uploaded": "Ob standardmäßig zu uns hochgeladen werden soll"}}, "fr": {"meta": {"title": "politique de confidentialité", "policySummary": "Ce document est une version multilingue de la même politique de confidentialité. Vous pouvez changer de langue avant de lire.", "effectiveDate": "4 mai 2026", "lastUpdated": "4 mai 2026", "appName": "Einii", "developer": "Bao Jiachen", "contactEmail": "thestein@foxmail.com"}, "summaryTable": [["Nom de l'application", "Einii"], ["Promoteur", "Bao Jiachen"], ["E-mail de contact", "thestein@foxmail.com"], ["Date d'entrée en vigueur", "4 mai 2026"], ["date de la dernière mise à jour", "4 mai 2026"]], "localDataTable": [["type de données locales", "utiliser", "S'il faut nous télécharger par défaut"], ["Progression des réponses et options", "Enregistrez les questions complétées, évitez les questions en double et prenez en charge les chemins de questions personnalisés", "Non"], ["Résultats des scores et des dimensions", "Générez des scores composites, des graphiques linéaires, des analyses dimensionnelles et du contenu de rapport", "Non"], ["Texte et historique du rapport", "Permet aux utilisateurs d’examiner et de comparer localement les résultats de la réflexion relationnelle à différentes étapes.", "Non"], ["Paramètres de langue et d'interface", "Afficher la version linguistique, les préférences d'interface et les paramètres d'expérience de base sélectionnés par l'utilisateur", "Non"], ["Acheter le cache d'autorisations", "Identifiez localement si un utilisateur a débloqué 40 questions, 60 questions ou des privilèges améliorés", "Non"], ["Statut d'erreur ou informations de débogage local (le cas échéant)", "Aidez l'application à restaurer son état localement ou à améliorer sa stabilité", "Non"]], "sections": [{"title": "1. Champ d'application de cette politique", "paras": ["Cette politique de confidentialité s'applique aux produits Einii et à sa version iOS publiée sur l'App Store d'Apple, ainsi qu'aux banques de questions émotionnelles localisées, aux autotests d'intimité, à l'affichage du score relationnel, à la génération de rapports d'analyse, à l'affichage de l'historique, à la vérification des autorisations d'achat, aux commentaires des utilisateurs et aux services d'assistance client fournis par le même développeur et directement liés à cette application.", "Ce produit se positionne comme une application d'auto-évaluation de l'intimité, de soutien émotionnel, de réflexion relationnelle et de lecture de contenu. En répondant aux questions, les utilisateurs peuvent obtenir un rapport d'analyse d'intimité généré sur la base d'algorithmes locaux, du texte de la banque de questions et de la cartographie des options. À l'exception de quelques exceptions clairement indiquées dans cette politique, le contenu des réponses, les options, les scores, les rapports et l'historique de l'utilisateur ne sont traités et enregistrés que localement sur l'appareil de l'utilisateur par défaut.", "Cette politique ne s'applique pas aux services fournis indépendamment par Apple Inc., l'App Store, iCloud, les fournisseurs de messagerie, les opérateurs, les fabricants d'appareils ou d'autres tiers. Les tiers ci-dessus traitent les données conformément à leurs propres politiques de confidentialité et aux lois applicables."], "subsections": []}, {"title": "2. Engagements fondamentaux en matière de confidentialité", "paras": ["Nous avons conçu ce produit pour être un outil de soutien émotionnel peu intrusif, axé sur la localisation, avec un traitement minimal des données. Dans la version actuelle, nos principaux engagements sont les suivants :", "Aucun système de compte utilisateur n'est établi ;", "Les utilisateurs ne sont pas tenus de fournir leurs vrais noms, numéros de téléphone portable, documents d'identité, carnets d'adresses, emplacements précis, informations d'identité de partenaire, enregistrements de chat ou comptes sociaux ;", "Ne pas collecter, télécharger ou sauvegarder activement les enregistrements de réponses, les options, les scores, le contenu des rapports, les portraits relationnels et les résultats d’analyses historiques des utilisateurs ;", "Les questions, réponses ou rapports des utilisateurs ne sont pas traités via nos serveurs ;", "Ne vendez pas de données utilisateur, n'effectuez pas de suivi publicitaire et ne créez pas de portraits publicitaires commerciaux basés sur le contenu des réponses des utilisateurs ;", "N'utilisez pas le contenu des réponses des utilisateurs pour entraîner le modèle d'IA ;", "Ne partagez pas les données de réponse locales des utilisateurs et ne signalez pas le contenu avec des tiers ;", "N'utilisez pas le SDK publicitaire, le SDK de suivi inter-applications ou le SDK d'analyse de données identifiées par l'utilisateur dans la version actuelle.", "Si les versions futures nécessitent la collecte, le téléchargement, le partage ou le traitement à distance de toute information personnelle en raison de nouvelles fonctionnalités, nous mettrons à jour cette politique avant le lancement des fonctionnalités concernées et obtiendrons le consentement de l'utilisateur ou proposerons des choix correspondants si les lois applicables ou les règles de la plateforme l'exigent."], "subsections": []}, {"title": "3. Instructions de traitement de la localisation du produit", "paras": [], "subsections": [{"title": "3.1 Informatique locale", "paras": ["La sélection des questions de ce produit, l'enregistrement des options, le calcul du score, l'analyse des dimensions relationnelles, la cartographie des types de dessins animés, la génération de rapports et l'affichage de l'historique sont tous effectués localement sur l'appareil de l'utilisateur par défaut. Nous ne téléchargerons pas le processus de réponse de l'utilisateur sur le serveur du développeur et nous ne lirons pas non plus à distance les rapports générés par l'utilisateur."]}, {"title": "3.2 Stockage local", "paras": ["Afin de réaliser des fonctions telles que l'utilisation continue, l'affichage de l'historique, l'examen des rapports, l'affichage des autorisations d'achat, etc., ce produit peut enregistrer les données nécessaires localement sur l'appareil de l'utilisateur. Ces données comprennent généralement : les questions complétées, les options sélectionnées par l'utilisateur, la progression des questions, les scores complets, les scores des dimensions, le texte du rapport, les enregistrements historiques, les paramètres de langue, les préférences d'interface, le cache des autorisations d'achat, etc."]}, {"title": "3.3 Visibilité des données locales", "paras": ["Par défaut, les données enregistrées localement ne sont visibles que par les personnes possédant l'appareil, pouvant ouvrir l'application ou ayant accès à la sauvegarde locale de l'appareil. Nous ne pouvons pas visualiser, récupérer, récupérer ou supprimer à distance les données locales de l'appareil d'un utilisateur. Les utilisateurs doivent prendre soin de leurs appareils, définir un mot de passe pour l'écran de verrouillage et éviter de fournir des captures d'écran de rapports, de contenu exporté ou d'accès à l'appareil à des personnes non fiables."]}]}, {"title": "4. Informations que nous ne collectons pas par défaut", "paras": ["Dans la version actuelle, nous ne collectons pas activement les informations suivantes :", "Informations d'identité : vrai nom, numéro d'identification, numéro de passeport, adresse, anniversaire, etc. ;", "Informations de contact : numéro de téléphone portable, carnet d'adresses, liste de contacts, compte social, coordonnées du partenaire, etc. ;", "Données de localisation : positionnement précis, emplacements fréquemment utilisés, trajectoires, géofences, etc. ;", "Informations biométriques : visage, empreinte digitale, empreinte vocale, iris, etc. ;", "Contenu de l'appareil : photos, albums, historique des discussions, messages texte, e-mails, fichiers, historique de navigation, etc. ;", "Informations sensibles sur les relations intimes : nous ne demanderons pas aux utilisateurs de saisir le vrai nom de leur partenaire, l'historique des discussions, les détails du litige, l'adresse spécifique ou d'autres informations permettant d'identifier un tiers ;", "Identifiants de suivi des publicités : nous ne lisons ni n'utilisons l'IDFA à des fins de suivi des publicités ;", "Journaux du serveur : étant donné que la version actuelle ne gère pas les réponses aux questions et aux rapports via le serveur du développeur, nous ne conserverons pas les journaux d'accès des réponses des utilisateurs, les journaux de requêtes du serveur ou les enregistrements de rapports à distance.", "Si les utilisateurs prennent l'initiative de nous envoyer des captures d'écran de rapport, du contenu de réponse, des informations sur l'appareil, des captures d'écran d'enregistrement d'achat ou d'autres informations pendant l'utilisation, les informations pertinentes seront traitées conformément à l'article 7 de cette politique."], "subsections": []}, {"title": "5. Types de données enregistrés localement", "paras": ["Bien que nous ne collections pas de données utilisateur par défaut, l'application peut enregistrer les données suivantes localement sur l'appareil pour mettre en œuvre ses fonctions. Ces données ne sont pas téléchargées sur nos serveurs."], "subsections": []}, {"title": "6. Apple Pay, App Store et statut des transactions", "paras": ["Les articles payants pour ce produit sont complétés via Apple App Store / StoreKit. Le mode de paiement, la facturation, les remboursements, le traitement fiscal, l'identifiant Apple, le numéro de carte bancaire, le mot de passe du compte de paiement, etc. de l'utilisateur sont traités par Apple, et nous n'obtenons pas le bon de paiement complet ni le mot de passe de l'identifiant Apple de l'utilisateur.", "Pour déterminer si l'utilisateur dispose des autorisations de paiement correspondantes, l'application peut lire ou vérifier localement le statut de la transaction, l'identification du produit, le statut d'achat, le statut de remboursement ou le statut d'autorisation fourni par Apple. Ce processus est utilisé pour activer, restaurer ou désactiver les fonctions correspondantes dans l'application. Sauf indication contraire explicite dans les politiques futures, nous ne téléchargerons pas ce statut de transaction sur nos propres serveurs.", "Si l'utilisateur demande un remboursement à Apple, l'application peut fermer, ajuster ou restaurer les autorisations payantes correspondantes en fonction du statut de la transaction renvoyé par Apple. Les litiges d’achat, de remboursement et de facturation sont régis par Apple et les règles juridiques applicables."], "subsections": []}, {"title": "7. Informations lorsque les utilisateurs nous contactent de manière proactive", "paras": ["Lors de l'utilisation par défaut de l'application, nous ne verrons pas les réponses et les rapports de l'utilisateur. Cependant, si les utilisateurs nous contactent de manière proactive par e-mail, formulaires, service client, avis sur l'App Store, messages privés sur les réseaux sociaux ou par d'autres méthodes, les utilisateurs peuvent nous fournir certaines informations."], "subsections": [{"title": "7.1 Informations pouvant être incluses", "paras": ["Adresse e-mail, pseudo ou autres informations de contact ;", "Description du problème, contenu des commentaires, version linguistique, version du système, modèle de l'appareil, version de l'application ;", "Captures d'écran des articles achetés, de l'état de la transaction et de l'état du remboursement Apple ;", "Captures d'écran de rapports, questions, scores ou autres pages d'application envoyées de manière proactive par les utilisateurs ;", "Autres informations fournies par l'utilisateur pour expliquer le problème."]}, {"title": "7.2 Objectif d'utilisation", "paras": ["Nous utiliserons uniquement les informations fournies de manière proactive par les utilisateurs pour traiter les commentaires, localiser les problèmes, fournir une assistance client, améliorer la qualité du contenu, vérifier les anomalies d'autorisation d'achat, corriger les erreurs, répondre aux demandes des utilisateurs ou remplir les obligations légales. Nous n'utiliserons pas le contenu du rapport dans les commentaires d'utilisateurs actifs pour des portraits publicitaires, et nous ne le vendrons pas non plus à des tiers."]}, {"title": "7.3 Ne pas fournir trop d'informations sensibles", "paras": ["Ce produit n'exige pas que les utilisateurs nous envoient la véritable identité de leur partenaire, son historique de discussion, son adresse, ses coordonnées, sa pièce d'identité, ses informations financières, ses détails sur l'automutilation ou d'autres informations hautement sensibles. Lorsque les utilisateurs signalent des problèmes, essayez d’utiliser les informations nécessaires et minimales. Si la capture d'écran contient du contenu que vous ne souhaitez pas que nous voyions, il est recommandé de la bloquer ou de la supprimer vous-même avant de l'envoyer."]}]}, {"title": "8. Diagnostics Apple, journaux de crash et analyse du système", "paras": ["Si les utilisateurs choisissent de partager des données de diagnostic et d'utilisation avec Apple ou des développeurs dans les paramètres iOS, Apple peut fournir aux développeurs des journaux de crash, des informations sur les performances, des modèles d'appareils, des versions du système, des versions d'applications et d'autres informations liées à la stabilité de l'application. Ces informations sont généralement utilisées pour localiser les plantages, améliorer la stabilité et résoudre les problèmes de compatibilité.", "À moins que l'utilisateur n'ajoute activement des captures d'écran du rapport ou tout autre contenu personnel dans les commentaires sur les incidents, les journaux d'incidents classiques ne contiennent généralement pas le contenu complet des réponses de l'utilisateur ni le texte complet du rapport. Nous n'utilisons pas les informations de diagnostic fournies par Apple pour le suivi des publicités ou le profilage commercial. Les utilisateurs peuvent gérer les options de partage de données de diagnostic et d'analyse dans les paramètres du système iOS."], "subsections": []}, {"title": "9. iCloud, sauvegarde d'appareil et migration du système", "paras": ["Ce produit enregistre les données utilisateur localement sur l'appareil par défaut. Cependant, en fonction des paramètres iOS de l'utilisateur, de la politique de sauvegarde de l'appareil, des paramètres iCloud, de la méthode de migration du système ou du mécanisme technique d'Apple, certaines données locales de l'application peuvent être traitées par Apple lors de la sauvegarde de l'appareil, de la migration de l'appareil ou de la récupération du système.", "Nous n'obtenons pas activement les enregistrements de réponses des utilisateurs et ne signalons pas le contenu via iCloud ou les sauvegardes des appareils, et nous n'avons aucun contrôle sur la façon dont Apple gère les données de sauvegarde. Si les utilisateurs ne souhaitent pas que les données de l'application locale entrent dans la sauvegarde de l'appareil, ils doivent gérer eux-mêmes les options de sauvegarde iCloud, de sauvegarde de l'appareil et de migration des données en fonction des paramètres système d'Apple."], "subsections": []}, {"title": "10. Services tiers, SDK, publicité et suivi", "paras": [], "subsections": [{"title": "10.1 Version actuelle", "paras": ["La version actuelle n'utilise pas de SDK publicitaires, n'effectue aucun suivi inter-applications ou inter-sites, ne vend pas de données utilisateur et ne partage pas les réponses, rapports ou comportements des appareils des utilisateurs avec les réseaux publicitaires. La version actuelle ne gère pas non plus les questions, options ou rapports des utilisateurs via des services cloud tiers."]}, {"title": "10.2 Services de plateforme Apple", "paras": ["Lorsque les utilisateurs téléchargent, installent, achètent, remboursent, restaurent des achats, consultent les pages de l'App Store, soumettent des avis sur l'App Store ou utilisent les fonctionnalités de la plateforme liée à Apple, Apple peut traiter les données conformément à ses propres règles. Ce traitement est indépendant de notre volonté."]}, {"title": "10.3 Modifications possibles à l'avenir", "paras": ["Si les versions futures introduisent un SDK d'analyse statistique, un SDK publicitaire, la synchronisation cloud, l'analyse cloud IA, la connexion au compte, les notifications push, le système de service client ou d'autres services tiers, nous mettrons à jour cette politique de confidentialité avant le lancement de la fonction et obtiendrons l'autorisation de l'utilisateur, fournirons des options de sortie ou fournirons les invites nécessaires lorsque les lois applicables ou les règles de la plateforme l'exigent."]}]}, {"title": "11. Description des autorisations de l'appareil", "paras": ["La version actuelle ne nécessite en principe pas d'accès aux contacts, au repérage, aux albums photos, aux caméras, aux microphones, aux calendriers, aux données de santé, aux systèmes de fichiers ou à d'autres autorisations sensibles sans rapport avec les rapports d'intimité.", "Si les versions futures nécessitent l'application d'autorisations système en raison de nouvelles fonctionnalités, nous expliquerons le but avant de demander des autorisations et les utiliserons uniquement dans le cadre nécessaire à la mise en œuvre des fonctions correspondantes. Les utilisateurs peuvent gérer ou révoquer les autorisations pertinentes dans les paramètres iOS. Le retrait de l'autorisation peut entraîner l'indisponibilité de la fonction correspondante, mais cela n'affectera pas les autres fonctions locales qui ne nécessitent pas l'autorisation."], "subsections": []}, {"title": "12. Banque de questions, contenu multilingue et instructions de traduction IA", "paras": ["Ce produit contient une banque de questions à grande échelle, des descriptions d'options, un texte d'analyse et un texte de rapport. Les banques de questions et le contenu multilingue sont des ressources de contenu préproduites, pré-vérifiées et intégrées à l'application. Certaines versions en langues autres que le chinois peuvent être générées à l'aide d'outils de traduction automatique, de traduction d'IA ou de localisation pendant la phase de production du contenu, et seront publiées après la relecture nécessaire.", "Le processus de traduction et de localisation ci-dessus se produit pendant la phase de production du contenu du produit, ce qui ne signifie pas que nous enverrons le contenu de la réponse de l'utilisateur, le contenu du rapport ou les informations personnelles au modèle de traduction ou au service d'IA lorsque l'utilisateur utilise l'Application. Dans la version actuelle, la génération des rapports utilisateur et la présentation du texte se font localement.", "Si les versions futures introduisent l'analyse de l'IA dans le cloud, la traduction dans le cloud, les robots du service client en ligne ou d'autres fonctions nécessitant le téléchargement du contenu saisi par l'utilisateur, nous expliquerons séparément les méthodes de traitement des données avant le lancement de la fonction et obtiendrons le consentement de l'utilisateur si les lois applicables ou les règles de la plateforme l'exigent."], "subsections": []}, {"title": "13. Déclaration de confidentialité pour la notation, le profilage et la génération de rapports automatisés", "paras": ["Ce produit calculera localement des scores complets, des scores dimensionnels, des types de relations, des portraits de dessins animés et des rapports d'analyse en fonction des questions et des options complétées par l'utilisateur. Ce processus fait partie de la fonctionnalité de l’application pour fournir aux utilisateurs un contenu de compréhension de soi, de soutien émotionnel et de réflexion relationnelle.", "Les résultats de ces calculs ne nous sont pas téléchargés par défaut et ne sont pas utilisés à des fins de publicité, d'évaluation du crédit, d'emploi, d'assurance, de crédit, de services publics, de qualifications juridiques ou d'autres décisions ayant un impact externe significatif sur l'utilisateur. Les rapports consultés par les utilisateurs sont uniquement destinés à leur référence dans l'application.", "Les utilisateurs peuvent arrêter d'enregistrer les résultats pertinents en effaçant les enregistrements locaux, en supprimant les rapports historiques ou en désinstallant l'application. Étant donné que nous ne conservons pas les rapports locaux des utilisateurs par défaut, les utilisateurs ne peuvent pas nous demander d'exporter ou de restaurer à distance les données de réponse complètes dans l'appareil."], "subsections": []}, {"title": "14. Conservation, suppression et récupération des données", "paras": [], "subsections": [{"title": "14.1 Durée de conservation des données locales", "paras": ["Les enregistrements de réponses locales, les rapports, les scores historiques et les paramètres de l'utilisateur sont généralement enregistrés dans l'appareil jusqu'à ce que l'utilisateur les efface activement dans l'application, supprime les enregistrements associés, désinstalle l'application, efface les données de l'appareil ou jusqu'à ce que les données soient perdues pour des raisons système."]}, {"title": "14.2 Suppression des données locales", "paras": ["Les utilisateurs peuvent supprimer les données locales des manières suivantes :", "Utilisez les fonctions « Effacer les enregistrements locaux », « Supprimer le rapport d'historique » ou des fonctions similaires dans l'application ;", "Désinstallez l'application sur iOS ;", "Effacer les données de l'appareil ou restaurer l'appareil ;", "Gérez les données de l'application dans la sauvegarde iCloud ou la sauvegarde de l'appareil par les paramètres système."]}, {"title": "14.3 Irrécupérabilité après suppression", "paras": ["Étant donné que nous n'enregistrons pas par défaut les réponses et les rapports des utilisateurs sur le serveur, une fois que les utilisateurs ont supprimé les enregistrements locaux, nous ne pouvons généralement pas aider les utilisateurs à les restaurer à distance. Veuillez confirmer si vous souhaitez toujours conserver le rapport avant de le supprimer."]}, {"title": "14.4 Période de conservation des enregistrements d'assistance utilisateur", "paras": ["Nous ne conserverons les e-mails du service client, le contenu des commentaires, les captures d'écran ou les enregistrements d'assistance associés qui nous sont envoyés de manière proactive par les utilisateurs que pendant la période nécessaire pour atteindre les objectifs d'assistance (pas plus de 24 mois, à moins qu'une conservation plus longue ne soit requise par la loi, la gestion des litiges ou la conformité en matière de sécurité). Les utilisateurs peuvent demander la suppression des enregistrements d'assistance pertinents via les informations de contact répertoriées dans cette politique."]}]}, {"title": "15. Droits des utilisateurs et modalités de les exercer", "paras": ["Dans la mesure permise par les lois applicables, les utilisateurs peuvent avoir des droits liés aux informations personnelles tels que l'interrogation, l'accès, la correction, la copie, la suppression, le retrait du consentement, la restriction du traitement, l'opposition au traitement, l'annulation des comptes, le dépôt de plaintes, etc. Étant donné que la version actuelle ne crée pas de comptes ni ne télécharge de réponses et de rapports par défaut, nous ne pouvons généralement pas accéder à distance aux données locales sur les appareils des utilisateurs.", "Les utilisateurs peuvent afficher, modifier ou supprimer eux-mêmes les données locales via les fonctions intégrées à l'application. Pour les informations du service client, les e-mails de commentaires ou les captures d'écran que les utilisateurs nous fournissent activement, les utilisateurs peuvent nous adresser des demandes d'accès, de correction ou de suppression via les informations de contact répertoriées dans cette politique.", "Pour protéger la sécurité des informations des utilisateurs, nous devrons peut-être vérifier la relation entre le demandeur et les informations pertinentes avant de traiter la demande concernée. Nous répondrons aux demandes raisonnables dans les délais requis par la loi applicable. Si nous ne sommes pas en mesure de répondre à une demande, les raisons seront indiquées."], "subsections": []}, {"title": "16. Protection des mineurs", "paras": ["Ce produit est principalement destiné aux utilisateurs de relations intimes ayant une compréhension indépendante et n'est pas spécifiquement conçu pour les enfants. Avant d'utiliser ce produit, les mineurs doivent obtenir le consentement de leurs parents ou autres tuteurs et comprendre le contenu du rapport sous la direction de leurs tuteurs.", "Nous ne collectons pas activement d'informations d'identité auprès des mineurs et nous n'exigeons pas non plus que les utilisateurs fournissent des informations sur l'âge, l'école, la classe, le tuteur ou d'autres informations personnelles sur les enfants. Si le tuteur estime qu'un mineur nous a fourni de manière proactive des informations personnelles ou souhaite supprimer les enregistrements de support pertinents, il peut nous contacter via les informations de contact indiquées dans cette politique.", "Si les lois d'un certain pays ou d'une région imposent des exigences plus strictes concernant l'utilisation des services numériques par les enfants ou les mineurs, nous les traiterons conformément aux exigences légales obligatoires locales."], "subsections": []}, {"title": "17. Sécurité des données", "paras": ["Nous adoptons des mesures de sécurité adaptées aux caractéristiques des produits localisés afin de minimiser le traitement inutile des données. Étant donné que les réponses et les rapports des utilisateurs ne sont pas téléchargés par défaut sur notre serveur, le risque de fuite de données côté serveur est considérablement réduit.", "Cependant, les utilisateurs doivent toujours prêter attention aux risques suivants :", "Si l'appareil ne dispose pas d'un mot de passe d'écran de verrouillage, est emprunté par d'autres, volé ou jailbreaké, les données locales peuvent être consultées par d'autres ;", "Une fois que les utilisateurs ont pris des captures d'écran, transmis des rapports et partagé du contenu via un logiciel social, le destinataire peut continuer à le diffuser ;", "Une fois que l'utilisateur a activé iCloud ou la sauvegarde de l'appareil, les données locales peuvent être traitées par Apple avec la sauvegarde du système ;", "Une fois que l'utilisateur a activement envoyé des captures d'écran ou signalé du contenu au service client, nous pourrons voir le contenu envoyé par l'utilisateur ;", "Aucun logiciel ne peut garantir une sécurité absolue, et les vulnérabilités du système, les attaques d'appareils ou les anomalies dans les services tiers peuvent comporter des risques.", "Si nous prenons connaissance d'un incident de sécurité lié aux informations fournies volontairement par les utilisateurs et que la loi applicable exige une notification aux utilisateurs ou aux régulateurs, nous prendrons des mesures de notification, de correction et de réduction des risques comme l'exige la loi."], "subsections": []}, {"title": "18. Instructions pour les utilisateurs transfrontaliers et internationaux", "paras": ["Étant donné que la version actuelle ne télécharge pas par défaut les réponses et les rapports des utilisateurs, nous n'initions généralement pas de transfert transfrontalier d'informations personnelles en raison de l'utilisation de l'application elle-même.", "Toutefois, les informations des utilisateurs peuvent impliquer un traitement transfrontalier dans les circonstances suivantes :", "Les utilisateurs nous contactent activement via les services de messagerie internationaux, les canaux de service client ou les réseaux sociaux ;", "Les utilisateurs téléchargent, achètent, remboursent ou soumettent des avis via l'App Store d'Apple ;", "Utilisation par l'utilisateur d'iCloud, de la sauvegarde d'appareil, de la migration d'appareil ou des services de plateforme Apple ;", "Le pays ou la région où se trouve l'utilisateur est différent de celui où se trouvent nos développeurs et fournisseurs de services de messagerie.", "Nous traiterons les informations d'assistance qui nous sont volontairement fournies par les utilisateurs dans la mesure nécessaire et ferons de notre mieux pour prendre des mesures de protection raisonnables. Le pays ou la région où se trouvent les utilisateurs peut leur accorder des droits supplémentaires en matière de protection des données ; si les utilisateurs souhaitent exercer les droits pertinents, ils peuvent nous contacter via les coordonnées indiquées dans cette politique."], "subsections": []}, {"title": "19. Changements de politique", "paras": ["Nous pouvons mettre à jour cette politique de confidentialité en raison de changements dans les fonctions du produit, de changements dans les lois et réglementations, de changements dans les règles de la plateforme ou de besoins opérationnels. La politique mise à jour sera publiée dans l'application, sur la page App Store, sur le site officiel ou à tout autre endroit approprié, et indiquera la date de la dernière mise à jour.", "Si la mise à jour implique un changement majeur dans la manière dont les informations personnelles sont traitées, par exemple le passage de « ne pas télécharger les données de réponse » à « prise en charge de la synchronisation dans le cloud ou de l'analyse de l'IA dans le cloud », nous le rappellerons clairement aux utilisateurs avant le lancement de la fonction et obtiendrons le consentement de l'utilisateur si les lois applicables ou les règles de la plateforme l'exigent. Si les utilisateurs n'acceptent pas les modifications concernées, ils peuvent cesser d'utiliser les fonctions correspondantes ou supprimer les données locales et désinstaller l'application."], "subsections": []}, {"title": "20. Contactez-nous", "paras": ["Si les utilisateurs ont des questions sur cette politique de confidentialité, le traitement des informations personnelles, la suppression des données locales, la suppression des enregistrements du service client, les étiquettes de confidentialité de l'App Store ou d'autres questions liées à la confidentialité, vous pouvez nous contacter via les méthodes suivantes :", "E-mail de contact : thestein@foxmail.com", "Développeur : Bao Jiachen", "Les utilisateurs sont priés d'essayer d'éviter d'envoyer des informations sensibles inutiles lorsqu'ils nous contactent. Lorsque vous devez envoyer une capture d'écran pour localiser un problème, il est recommandé de bloquer d'abord votre vrai nom, vos coordonnées, vos informations sur votre partenaire, votre historique de discussion ou tout autre contenu que vous ne souhaitez pas voir."], "subsections": []}], "ui": {"page_title": "politique de confidentialité", "policy_summary": "Aperçu de la politique", "table_of_contents": "Table des matières", "effective_date": "Date d'entrée en vigueur", "last_updated": "date de la dernière mise à jour", "app_name": "Nom de l'application", "developer": "Promoteur", "contact_email": "E-mail de contact", "language": "langue", "language_note": "La page donnera la priorité à la langue de votre navigateur. S'il n'est pas pris en charge, l'anglais sera affiché par défaut.", "default_language": "Langue par défaut : anglais", "local_data_title": "type de données locales", "local_data_usage": "utiliser", "local_data_uploaded": "S'il faut nous télécharger par défaut"}}, "es": {"meta": {"title": "política de privacidad", "policySummary": "Este documento es una versión multilingüe de la misma política de privacidad. Puedes cambiar de idioma antes de leer.", "effectiveDate": "4 de mayo de 2026", "lastUpdated": "4 de mayo de 2026", "appName": "Eini", "developer": "Bao Jia Chen", "contactEmail": "thestein@foxmail.com"}, "summaryTable": [["Nombre de la aplicación", "Eini"], ["Revelador", "Bao Jia Chen"], ["Correo electrónico de contacto", "thestein@foxmail.com"], ["Fecha de vigencia", "4 de mayo de 2026"], ["última fecha de actualización", "4 de mayo de 2026"]], "localDataTable": [["tipo de datos locales", "usar", "Si subir a nosotros de forma predeterminada"], ["Progreso de la respuesta y opciones.", "Registre las preguntas completadas, evite preguntas duplicadas y admita rutas de preguntas personalizadas", "No"], ["Resultados de puntuación y dimensión", "Genere puntuaciones compuestas, gráficos de líneas, análisis dimensionales y contenido de informes.", "No"], ["Informe de texto e historial.", "Permite a los usuarios revisar y comparar los resultados de la reflexión de relaciones en diferentes etapas a nivel local.", "No"], ["Configuración de idioma e interfaz", "Mostrar la versión de idioma, las preferencias de interfaz y la configuración de experiencia básica seleccionada por el usuario.", "No"], ["Comprar caché de permisos", "Identifique localmente si un usuario ha desbloqueado 40 preguntas, 60 preguntas o ha actualizado privilegios", "No"], ["Estado de error o información de depuración local (si está presente)", "Ayude a la aplicación a restaurar su estado localmente o mejorar la estabilidad", "No"]], "sections": [{"title": "1. Ámbito de aplicación de esta política", "paras": ["Esta política de privacidad se aplica a los productos Einii y su versión de iOS lanzada en la App Store de Apple, así como a los bancos de preguntas emocionales localizados, las autopruebas de intimidad, la visualización de la puntuación de las relaciones, la generación de informes de análisis, la visualización del historial, la verificación de permisos de compra, los comentarios de los usuarios y los servicios de atención al cliente proporcionados por el mismo desarrollador y directamente relacionados con esta aplicación.", "Este producto se posiciona como una aplicación para la autoevaluación de la intimidad, el apoyo emocional, la reflexión sobre las relaciones y la lectura de contenidos. Al completar las preguntas, los usuarios pueden obtener un informe de análisis de intimidad generado en base a algoritmos locales, texto del banco de preguntas y mapeo de opciones. Excepto por algunas excepciones claramente establecidas en esta política, el contenido de las respuestas, las opciones, las puntuaciones, los informes y el historial del usuario solo se procesan y guardan localmente en el dispositivo del usuario de forma predeterminada.", "Esta política no se aplica a los servicios proporcionados de forma independiente por Apple Inc., App Store, iCloud, proveedores de correo electrónico, operadores, fabricantes de dispositivos u otros terceros. Los terceros mencionados procesan datos de acuerdo con sus propias políticas de privacidad y leyes aplicables."], "subsections": []}, {"title": "2. Compromisos básicos de privacidad", "paras": ["Diseñamos este producto para que sea una herramienta de apoyo emocional poco intrusiva, con procesamiento mínimo de datos y prioridad en la localización. En la versión actual, nuestros compromisos principales son los siguientes:", "No se establece ningún sistema de cuentas de usuario;", "Los usuarios no están obligados a proporcionar sus nombres reales, números de teléfono móvil, documentos de identificación, libretas de direcciones, ubicaciones precisas, información de identidad de socios, registros de chat o cuentas sociales;", "No recopile, cargue ni guarde activamente los registros de respuestas, opciones, puntuaciones, contenido de informes, retratos de relaciones y resultados de análisis históricos de los usuarios;", "Las preguntas, respuestas o informes de los usuarios no se procesan a través de nuestros servidores;", "No vender datos de usuarios, no realizar seguimiento publicitario y no crear retratos publicitarios comerciales basados ​​en el contenido de las respuestas de los usuarios;", "No utilice el contenido de las respuestas del usuario para entrenar el modelo de IA;", "No comparta los datos de respuestas locales de los usuarios ni informe el contenido con terceros;", "No utilice el SDK de publicidad, el SDK de seguimiento entre aplicaciones ni el SDK de análisis de datos identificados por el usuario en la versión actual.", "Si las versiones futuras requieren la recopilación, carga, intercambio o procesamiento remoto de cualquier información personal debido a nuevas funciones, actualizaremos esta política antes de que se lancen las funciones relevantes y obtendremos el consentimiento del usuario o brindaremos las opciones correspondientes si así lo exigen las leyes aplicables o las reglas de la plataforma."], "subsections": []}, {"title": "3. Instrucciones de procesamiento de localización del producto.", "paras": [], "subsections": [{"title": "3.1 Computación local", "paras": ["La selección de preguntas, el registro de opciones, el cálculo de puntuación, el análisis de dimensiones de relación, el mapeo de tipos de dibujos animados, la generación de informes y la visualización histórica de este producto se completan localmente en el dispositivo del usuario de forma predeterminada. No cargaremos el proceso de respuesta del usuario al servidor del desarrollador ni leeremos de forma remota los informes generados por el usuario."]}, {"title": "3.2 Almacenamiento local", "paras": ["Para lograr funciones como uso continuo, visualización de historial, revisión de informes, visualización de permisos de compra, etc., este producto puede guardar los datos necesarios localmente en el dispositivo del usuario. Dichos datos generalmente incluyen: preguntas completadas, opciones seleccionadas por el usuario, progreso de la pregunta, puntajes completos, puntajes de dimensiones, texto del informe, registros históricos, configuración de idioma, preferencias de interfaz, caché de permisos de compra, etc."]}, {"title": "3.3 Visibilidad de los datos locales", "paras": ["De forma predeterminada, los datos guardados localmente solo son visibles para las personas que poseen el dispositivo, pueden abrir la aplicación o tener acceso a la copia de seguridad local del dispositivo. No podemos ver, recuperar, recuperar o eliminar de forma remota datos locales del dispositivo de un usuario. Los usuarios deben cuidar bien sus dispositivos, establecer una contraseña para la pantalla de bloqueo y evitar proporcionar capturas de pantalla de informes, contenido exportado o acceso a dispositivos a personas no confiables."]}]}, {"title": "4. Información que no recopilamos por defecto", "paras": ["En la versión actual, no recopilamos activamente la siguiente información:", "Información de identidad: nombre real, número de DNI, número de pasaporte, dirección, fecha de nacimiento, etc.;", "Información de contacto: número de teléfono móvil, libreta de direcciones, lista de contactos, cuenta social, información de contacto del socio, etc.;", "Datos de ubicación: posicionamiento preciso, ubicaciones de uso frecuente, trayectorias, geocercas, etc.;", "Información biométrica: rostro, huella dactilar, huella de voz, iris, etc.;", "Contenido del dispositivo: fotos, álbumes, historial de chat, mensajes de texto, correos electrónicos, archivos, historial de navegación, etc.;", "Información confidencial sobre relaciones íntimas: no pediremos a los usuarios que ingresen el nombre real de su pareja, su historial de chat, detalles de disputas, direcciones específicas u otra información que pueda identificar a un tercero;", "Identificadores de seguimiento de anuncios: no leemos ni utilizamos el IDFA con fines de seguimiento de anuncios;", "Registros del servidor: dado que la versión actual no permite responder preguntas e informes a través del servidor del desarrollador, no mantendremos registros de acceso de respuestas de usuarios, registros de solicitudes del servidor ni registros de informes remotos.", "Si los usuarios toman la iniciativa de enviarnos capturas de pantalla de informes, contenido de respuestas, información del dispositivo, capturas de pantalla de registros de compras u otra información durante el uso, la información relevante se procesará de acuerdo con el Artículo 7 de esta política."], "subsections": []}, {"title": "5. Tipos de datos guardados localmente", "paras": ["Aunque no recopilamos datos del usuario de forma predeterminada, la aplicación puede guardar los siguientes datos localmente en el dispositivo para implementar sus funciones. Estos datos no se cargan en nuestros servidores."], "subsections": []}, {"title": "6. Apple Pay, App Store y estado de las transacciones", "paras": ["Los artículos pagos de este producto se completan a través de Apple App Store/StoreKit. Apple procesa el método de pago del usuario, la facturación, los reembolsos, el procesamiento de impuestos, el ID de Apple, el número de tarjeta bancaria, la contraseña de la cuenta de pago, etc., y no obtenemos el comprobante de pago completo del usuario ni la contraseña del ID de Apple.", "Para determinar si el usuario tiene los permisos de pago correspondientes, la Aplicación puede leer o verificar localmente el estado de la transacción, la identificación del producto, el estado de la compra, el estado del reembolso o el estado del permiso proporcionado por Apple. Este proceso se utiliza para habilitar, restaurar o desactivar las funciones correspondientes dentro de la aplicación. A menos que se indique explícitamente lo contrario en políticas futuras, no cargaremos dicho estado de transacción en nuestros propios servidores.", "Si el usuario solicita un reembolso de Apple, la Aplicación puede cerrar, ajustar o restaurar los permisos pagados correspondientes según el estado de la transacción devuelto por Apple. Las disputas sobre compras, reembolsos y facturación se rigen por Apple y las normas legales aplicables."], "subsections": []}, {"title": "7. Información cuando los usuarios nos contactan de forma proactiva", "paras": ["Durante el uso predeterminado de la aplicación, no veremos las respuestas ni los informes del usuario. Sin embargo, si los usuarios se comunican con nosotros de manera proactiva a través de correo electrónico, formularios, servicio al cliente, reseñas de la App Store, mensajes privados de redes sociales u otros métodos, los usuarios pueden proporcionarnos cierta información."], "subsections": [{"title": "7.1 Información que puede incluirse", "paras": ["Dirección de correo electrónico, apodo u otra información de contacto;", "Descripción del problema, contenido de los comentarios, versión de idioma, versión del sistema, modelo de dispositivo, versión de la aplicación;", "Capturas de pantalla de artículos comprados, estado de transacción y estado de reembolso de Apple;", "Capturas de pantalla de informes, preguntas, puntuaciones u otras páginas de la aplicación enviadas proactivamente por los usuarios;", "Otra información proporcionada por el usuario para explicar el problema."]}, {"title": "7.2 Propósito de uso", "paras": ["Solo usaremos la información proporcionada de manera proactiva por los usuarios para manejar comentarios, localizar problemas, brindar atención al cliente, mejorar la calidad del contenido, verificar anomalías en los permisos de compra, corregir errores, responder a las solicitudes de los usuarios o cumplir con obligaciones legales. No utilizaremos el contenido del informe en los comentarios de los usuarios activos para retratos publicitarios ni los venderemos a terceros."]}, {"title": "7.3 No proporciones demasiada información confidencial", "paras": ["Este producto no requiere que los usuarios nos envíen la verdadera identidad de su pareja, historial de chat, dirección, información de contacto, identificación, información financiera, detalles de autolesiones u otra información altamente confidencial. Cuando los usuarios reporten problemas, intente utilizar la información mínima y necesaria. Si la captura de pantalla contiene contenido que no quieres que veamos, se recomienda bloquearla o eliminarla tú mismo antes de enviarla."]}]}, {"title": "8. Diagnóstico de Apple, registros de fallos y análisis del sistema", "paras": ["Si los usuarios eligen compartir datos de diagnóstico y uso con Apple o desarrolladores en la configuración de iOS, Apple puede proporcionar a los desarrolladores registros de fallos, información de rendimiento, modelos de dispositivos, versiones del sistema, versiones de la aplicación y otra información relacionada con la estabilidad de la aplicación. Esta información se utiliza normalmente para localizar fallos, mejorar la estabilidad y solucionar problemas de compatibilidad.", "A menos que el usuario agregue activamente capturas de pantalla del informe u otro contenido personal en los comentarios sobre fallas, los registros de fallas regulares generalmente no contienen el contenido completo de las respuestas del usuario ni el texto completo del informe. No utilizamos información de diagnóstico proporcionada por Apple para el seguimiento de anuncios o la elaboración de perfiles comerciales. Los usuarios pueden administrar las opciones para compartir datos analíticos y de diagnóstico en la configuración del sistema iOS."], "subsections": []}, {"title": "9. iCloud, copia de seguridad del dispositivo y migración del sistema", "paras": ["Este producto guarda los datos del usuario localmente en el dispositivo de forma predeterminada. Sin embargo, dependiendo de la configuración de iOS del usuario, la política de copia de seguridad del dispositivo, la configuración de iCloud, el método de migración del sistema o el mecanismo técnico de Apple, Apple puede procesar algunos datos locales de la aplicación durante la copia de seguridad del dispositivo, la migración del dispositivo o la recuperación del sistema.", "No obtenemos activamente los registros de respuestas de los usuarios ni reportamos contenido a través de iCloud o copias de seguridad del dispositivo, y no tenemos control sobre cómo Apple maneja los datos de las copias de seguridad. Si los usuarios no desean que los datos de la aplicación local ingresen a la copia de seguridad del dispositivo, deben administrar la copia de seguridad de iCloud, la copia de seguridad del dispositivo y las opciones de migración de datos por sí mismos de acuerdo con la configuración del sistema de Apple."], "subsections": []}, {"title": "10. Servicios de terceros, SDK, publicidad y seguimiento", "paras": [], "subsections": [{"title": "10.1 Versión actual", "paras": ["La versión actual no utiliza SDK de publicidad, no realiza seguimiento entre aplicaciones o sitios, no vende datos de usuarios y no comparte respuestas, informes o comportamiento de dispositivos de usuarios con redes publicitarias. La versión actual tampoco maneja preguntas, opciones o informes de los usuarios a través de servicios en la nube de terceros."]}, {"title": "10.2 Servicios de la plataforma Apple", "paras": ["Cuando los usuarios descargan, instalan, compran, reembolsan, restauran compras, ven páginas de la App Store, envían reseñas de la App Store o utilizan capacidades de la plataforma relacionadas con Apple, Apple puede procesar datos de acuerdo con sus propias reglas. Este procesamiento está fuera de nuestro control."]}, {"title": "10.3 Posibles cambios en el futuro", "paras": ["Si las versiones futuras introducen SDK de análisis estadístico, SDK de publicidad, sincronización en la nube, análisis de IA en la nube, inicio de sesión de cuenta, notificaciones automáticas, sistema de servicio al cliente u otros servicios de terceros, actualizaremos esta política de privacidad antes de que se lance la función y obtendremos la autorización del usuario, brindaremos opciones de salida o brindaremos las indicaciones necesarias cuando lo requieran las leyes o reglas de la plataforma aplicables."]}]}, {"title": "11. Descripción del permiso del dispositivo", "paras": ["En principio, la versión actual no requiere acceso a contactos, localización, álbumes de fotos, cámaras, micrófonos, calendarios, datos de salud, sistemas de archivos u otros permisos confidenciales no relacionados con los informes de intimidad.", "Si las versiones futuras requieren la solicitud de permisos del sistema debido a nuevas características, explicaremos el propósito antes de solicitar permisos y los usaremos solo dentro del alcance necesario para implementar las funciones correspondientes. Los usuarios pueden administrar o revocar permisos relevantes en la configuración de iOS. Retirar el permiso puede hacer que la función correspondiente no esté disponible, pero no afectará otras funciones locales que no requieran el permiso."], "subsections": []}, {"title": "12. Banco de preguntas, contenido multilingüe e instrucciones de traducción mediante IA", "paras": ["Este producto contiene un banco de preguntas a gran escala, descripciones de opciones, texto de análisis y texto de informe. Los bancos de preguntas y el contenido multilingüe son recursos de contenido preproducidos, revisados ​​previamente e integrados en la aplicación. Algunas versiones en idiomas distintos del chino pueden generarse mediante traducción automática, traducción de IA o herramientas de localización durante la etapa de producción del contenido, y se publicarán después de la revisión necesaria.", "El proceso de traducción y localización anterior ocurre durante la etapa de producción del contenido del producto, lo que no significa que enviaremos el contenido de la respuesta del usuario, el contenido del informe o la información personal al modelo de traducción o al servicio de IA cuando el usuario use la Aplicación. En la versión actual, la generación de informes de usuario y la presentación de texto se realizan localmente.", "Si las versiones futuras introducen análisis de IA en la nube, traducción en la nube, robots de servicio al cliente en línea u otras funciones que requieren cargar contenido ingresado por el usuario, explicaremos por separado los métodos de procesamiento de datos antes de lanzar la función y obtendremos el consentimiento del usuario si así lo exigen las leyes aplicables o las reglas de la plataforma."], "subsections": []}, {"title": "13. Declaración de privacidad para puntuación, elaboración de perfiles y generación de informes automatizados", "paras": ["Este producto calculará localmente puntuaciones integrales, puntuaciones de dimensiones, tipos de relaciones, retratos de dibujos animados e informes de análisis en función de las preguntas y opciones que el usuario haya completado. Este proceso es parte de la funcionalidad de la aplicación para brindar a los usuarios contenido de autocomprensión, apoyo emocional y reflexión sobre las relaciones.", "Los resultados de estos cálculos no se cargan en nosotros de forma predeterminada, ni se utilizan para publicidad, evaluación crediticia, empleo, seguros, crédito, servicios públicos, calificaciones legales u otras decisiones que tengan un impacto externo significativo en el usuario. Los informes vistos por los usuarios son sólo para su referencia dentro de la App.", "Los usuarios pueden dejar de guardar resultados relevantes borrando registros locales, eliminando informes históricos o desinstalando la aplicación. Dado que no mantenemos los informes locales de los usuarios de forma predeterminada, los usuarios no pueden pedirnos que exportemos o restablezcamos de forma remota los datos de respuesta completos en el dispositivo."], "subsections": []}, {"title": "14. Conservación, eliminación y recuperación de datos", "paras": [], "subsections": [{"title": "14.1 Período de retención de datos locales", "paras": ["Los registros de respuestas locales, informes, puntuaciones históricas y configuraciones del usuario generalmente se guardan en el dispositivo hasta que el usuario los borra activamente dentro de la aplicación, elimina registros relacionados, desinstala la aplicación, borra los datos del dispositivo o se pierden datos por razones del sistema."]}, {"title": "14.2 Eliminación de datos locales", "paras": ["Los usuarios pueden eliminar datos locales de las siguientes maneras:", "Utilice \"Borrar registros locales\", \"Eliminar informe de historial\" o funciones similares en la aplicación;", "Desinstale la aplicación en iOS;", "Borrar datos del dispositivo o restaurar el dispositivo;", "Administre los datos de la aplicación en la copia de seguridad de iCloud o en la copia de seguridad del dispositivo mediante la configuración del sistema."]}, {"title": "14.3 Irrecuperabilidad tras la eliminación", "paras": ["Dado que no guardamos las respuestas ni los informes de los usuarios en el servidor de forma predeterminada, después de que los usuarios eliminan registros locales, generalmente no podemos ayudarlos a restaurarlos de forma remota. Confirme si aún desea conservar el informe antes de eliminarlo."]}, {"title": "14.4 Período de retención de registros de soporte al usuario", "paras": ["Solo conservaremos los correos electrónicos de servicio al cliente, el contenido de comentarios, las capturas de pantalla o los registros de soporte relacionados que nos envíen proactivamente los usuarios durante el período necesario para lograr los fines de soporte (no más de 24 meses, a menos que la ley, el manejo de disputas o el cumplimiento de la seguridad exijan una retención más prolongada). Los usuarios pueden solicitar la eliminación de registros de soporte relevantes a través de la información de contacto que figura en esta política."]}]}, {"title": "15. Derechos de los usuarios y cómo ejercerlos", "paras": ["En la medida en que lo permitan las leyes aplicables, los usuarios pueden tener derechos relacionados con la información personal, como consultar, acceder, corregir, copiar, eliminar, retirar el consentimiento, restringir el procesamiento, oponerse al procesamiento, cancelar cuentas, presentar quejas, etc. Dado que la versión actual no crea cuentas ni carga respuestas e informes de forma predeterminada, generalmente no podemos acceder de forma remota a los datos locales en los dispositivos de los usuarios.", "Los usuarios pueden ver, modificar o eliminar datos locales por sí mismos a través de funciones dentro de la aplicación. Para obtener información de servicio al cliente, correos electrónicos de comentarios o capturas de pantalla que los usuarios nos proporcionen activamente, los usuarios pueden realizarnos solicitudes de acceso, corrección o eliminación a través de la información de contacto que figura en esta política.", "Para proteger la seguridad de la información del usuario, es posible que necesitemos verificar la relación entre el solicitante y la información relevante antes de procesar la solicitud correspondiente. Responderemos a las solicitudes razonables dentro de los plazos requeridos por la ley aplicable. Si no podemos cumplir con una solicitud, se indicarán los motivos."], "subsections": []}, {"title": "16. Protección de menores", "paras": ["Este producto está destinado principalmente a usuarios de relaciones íntimas con comprensión independiente y no está diseñado específicamente para niños. Antes de utilizar este producto, los menores deben obtener el consentimiento de sus padres u otros tutores y comprender el contenido del informe bajo la guía de sus tutores.", "No recopilamos activamente información de identidad de menores, ni exigimos a los usuarios que proporcionen información sobre la edad, la escuela, la clase, el tutor u otra información personal sobre los niños. Si el tutor cree que un menor nos ha proporcionado información personal de manera proactiva o desea eliminar registros de soporte relevantes, puede comunicarse con nosotros a través de la información de contacto que figura en esta política.", "Si las leyes de un determinado país o región tienen requisitos más estrictos para que niños o menores utilicen servicios digitales, lo manejaremos de acuerdo con los requisitos legales obligatorios locales."], "subsections": []}, {"title": "17. Seguridad de los datos", "paras": ["Adoptamos medidas de seguridad que coinciden con las características de los productos localizados para minimizar el procesamiento de datos innecesario. Dado que las respuestas y los informes de los usuarios no se cargan en nuestro servidor de forma predeterminada, el riesgo de fuga de datos del lado del servidor se reduce significativamente.", "Sin embargo, los usuarios aún deben prestar atención a los siguientes riesgos:", "Si el dispositivo no tiene una contraseña de pantalla de bloqueo, otros lo toman prestado, lo roban o lo liberan, otros pueden ver los datos locales;", "Después de que los usuarios tomen capturas de pantalla, envíen informes y compartan contenido a través de software social, el destinatario puede continuar difundiéndolo;", "Después de que el usuario activa iCloud o la copia de seguridad del dispositivo, Apple puede procesar los datos locales junto con la copia de seguridad del sistema;", "Después de que el usuario envíe activamente capturas de pantalla o informe contenido al servicio de atención al cliente, podremos ver el contenido enviado por el usuario;", "Ningún software puede garantizar una seguridad absoluta y las vulnerabilidades del sistema, los ataques a los dispositivos o las anomalías en los servicios de terceros pueden conllevar riesgos.", "Si tenemos conocimiento de un incidente de seguridad relacionado con la información proporcionada voluntariamente por los usuarios, y la ley aplicable requiere notificación a los usuarios o reguladores, tomaremos medidas de notificación, remediación y reducción de riesgos según lo exige la ley."], "subsections": []}, {"title": "18. Instrucciones para usuarios transfronterizos e internacionales", "paras": ["Dado que la versión actual no carga respuestas e informes de los usuarios de forma predeterminada, normalmente no iniciamos transferencias transfronterizas de información personal debido al uso de la aplicación en sí.", "Sin embargo, la información del usuario puede implicar un procesamiento transfronterizo en las siguientes circunstancias:", "Los usuarios nos contactan activamente a través de servicios de correo electrónico internacionales, canales de atención al cliente o redes sociales;", "Los usuarios descargan, compran, reembolsan o envían reseñas a través de la App Store de Apple;", "El uso por parte del usuario de iCloud, copia de seguridad del dispositivo, migración de dispositivos o servicios de la plataforma Apple;", "El país o región donde se encuentra el usuario es diferente de donde se encuentran nuestros desarrolladores y proveedores de servicios de correo electrónico.", "Procesaremos la información de soporte que nos proporcionen voluntariamente los usuarios en la medida necesaria y haremos todo lo posible para tomar medidas de protección razonables. El país o región donde se encuentren los usuarios podrá otorgarles derechos adicionales de protección de datos; Si los usuarios desean ejercer los derechos pertinentes, pueden contactarnos a través de la información de contacto que figura en esta política."], "subsections": []}, {"title": "19. Cambios de política", "paras": ["Es posible que actualicemos esta política de privacidad debido a cambios en las funciones del producto, cambios en las leyes y regulaciones, cambios en las reglas de la plataforma o necesidades operativas. La política actualizada se publicará dentro de la aplicación, en la página de la App Store, en el sitio web oficial u otra ubicación apropiada, e indicará la fecha de la última actualización.", "Si la actualización implica un cambio importante en la forma en que se procesa la información personal, como cambiar de \"no cargar datos de respuesta\" a \"soportar sincronización en la nube o análisis de IA en la nube\", recordaremos de manera destacada a los usuarios antes de lanzar la función y obtendremos el consentimiento del usuario si así lo exigen las leyes aplicables o las reglas de la plataforma. Si los usuarios no están de acuerdo con los cambios relevantes, pueden dejar de usar las funciones correspondientes o eliminar datos locales y desinstalar la Aplicación."], "subsections": []}, {"title": "20. Contáctanos", "paras": ["Si los usuarios tienen alguna pregunta sobre esta política de privacidad, el procesamiento de información personal, la eliminación de datos locales, la eliminación de registros de servicio al cliente, las etiquetas de privacidad de la App Store u otros asuntos relacionados con la privacidad, pueden contactarnos a través de los siguientes métodos:", "Correo electrónico de contacto: thestein@foxmail.com", "Desarrollador: Bao Jiachen", "Se solicita a los usuarios que intenten evitar enviar información confidencial innecesaria cuando se comuniquen con nosotros. Cuando debas enviar una captura de pantalla para localizar un problema, se recomienda bloquear primero tu nombre real, información de contacto, información de socio, historial de chat u otro contenido que no quieras ver."], "subsections": []}], "ui": {"page_title": "política de privacidad", "policy_summary": "Descripción general de la política", "table_of_contents": "Tabla de contenido", "effective_date": "Fecha de vigencia", "last_updated": "última fecha de actualización", "app_name": "Nombre de la aplicación", "developer": "Revelador", "contact_email": "Correo electrónico de contacto", "language": "idioma", "language_note": "La página dará prioridad al idioma de su navegador. Si no es compatible, se mostrará inglés de forma predeterminada.", "default_language": "Idioma predeterminado: inglés", "local_data_title": "tipo de datos locales", "local_data_usage": "usar", "local_data_uploaded": "Si subir a nosotros de forma predeterminada"}}, "ko": {"meta": {"title": "개인 정보 보호 정책", "policySummary": "이 문서는 동일한 개인 정보 보호 정책의 다국어 버전입니다. 읽기 전에 언어를 전환할 수 있습니다.", "effectiveDate": "2026년 5월 4일", "lastUpdated": "2026년 5월 4일", "appName": "에이니이", "developer": "바오 지아첸", "contactEmail": "thestein@foxmail.com"}, "summaryTable": [["앱 이름", "에이니이"], ["개발자", "바오 지아첸"], ["연락처 이메일", "thestein@foxmail.com"], ["발효일", "2026년 5월 4일"], ["마지막 업데이트 날짜", "2026년 5월 4일"]], "localDataTable": [["로컬 데이터 유형", "사용", "기본적으로 당사에 업로드할지 여부"], ["답변 진행 상황 및 옵션", "완료된 질문을 기록하고 중복 질문을 방지하며 개인화된 질문 경로를 지원합니다.", "아니요"], ["점수 및 차원 결과", "종합 점수, 선 차트, 차원 분석 및 보고서 콘텐츠 생성", "아니요"], ["보고서 텍스트 및 기록", "사용자가 로컬에서 여러 단계의 관계 반영 결과를 검토하고 비교할 수 있습니다.", "아니요"], ["언어 및 인터페이스 설정", "사용자가 선택한 언어 버전, 인터페이스 기본 설정 및 기본 경험 설정을 표시합니다.", "아니요"], ["권한 캐시 구매", "사용자가 40개 질문, 60개 질문 또는 업그레이드된 권한을 잠금 해제했는지 로컬에서 식별", "아니요"], ["오류 상태 또는 로컬 디버깅 정보(있는 경우)", "앱이 로컬에서 상태를 복원하거나 안정성을 향상하도록 돕습니다.", "아니요"]], "sections": [{"title": "1. 본 정책의 적용 범위", "paras": ["본 개인정보 보호정책은 Apple App Store에 출시된 Einii 제품 및 해당 iOS 버전뿐만 아니라 이 앱과 직접 관련되고 동일한 개발자가 제공하는 현지화된 감정 질문 은행, 친밀도 자가 테스트, 관계 점수 표시, 분석 보고서 생성, 이력 표시, 구매 권한 확인, 사용자 피드백 및 고객 지원 서비스에 적용됩니다.", "이 제품은 친밀감 자기 평가, 정서적 지원, 관계 성찰 및 콘텐츠 읽기를 위한 애플리케이션으로 자리잡고 있습니다. 질문을 완성하면 사용자는 로컬 알고리즘, 질문 은행 텍스트 및 옵션 매핑을 기반으로 생성된 친밀감 분석 보고서를 얻을 수 있습니다. 본 정책에 명확하게 명시된 몇 가지 예외를 제외하고 사용자의 답변 내용, 옵션, 점수, 보고서 및 기록은 기본적으로 사용자의 장치에 로컬로만 처리되고 저장됩니다.", "이 정책은 Apple Inc., App Store, iCloud, 이메일 제공업체, 이동통신사, 기기 제조업체 또는 기타 제3자가 독립적으로 제공하는 서비스에는 적용되지 않습니다. 위의 제3자는 자체 개인정보 보호정책 및 해당 법률에 따라 데이터를 처리합니다."], "subsections": []}, {"title": "2. 핵심 개인정보 보호 약속", "paras": ["우리는 이 제품을 현지화 우선, 최소한의 데이터 처리, 방해가 적은 정서적 지원 도구로 설계했습니다. 현재 버전에서 우리의 핵심 약속은 ​​다음과 같습니다.", "사용자 계정 시스템이 설정되어 있지 않습니다.", "사용자는 실명, 휴대폰 번호, 신분증, 주소록, 정확한 위치, 파트너 신원 정보, 채팅 기록 또는 소셜 계정을 제공할 필요가 없습니다.", "사용자의 답변 기록, 옵션, 점수, 보고서 내용, 관계 초상화 및 이력 분석 결과를 적극적으로 수집, 업로드 또는 저장하지 마십시오.", "사용자 질문, 답변 또는 보고서는 당사 서버를 통해 처리되지 않습니다.", "사용자 데이터를 판매하지 않고, 광고 추적을 수행하지 않으며, 사용자 답변 내용을 기반으로 상업 광고 초상화를 생성하지 않습니다.", "AI 모델을 훈련하기 위해 사용자 답변 콘텐츠를 사용하지 마십시오.", "사용자의 현지 응답 데이터를 공유하거나 콘텐츠를 제3자와 공유하지 마세요.", "현재 버전에서는 광고 SDK, 앱 간 추적 SDK, 사용자 식별 데이터 분석 SDK를 사용하지 마세요.", "향후 버전에서 새로운 기능으로 인해 개인 정보의 수집, 업로드, 공유 또는 원격 처리가 필요한 경우, 당사는 관련 기능이 출시되기 전에 이 정책을 업데이트하고 사용자 동의를 얻거나 해당 법률 또는 플랫폼 규칙에서 요구하는 경우 해당 선택권을 제공합니다."], "subsections": []}, {"title": "3. 제품 국산화 처리 지침", "paras": [], "subsections": [{"title": "3.1 로컬 컴퓨팅", "paras": ["본 제품의 질문 선택, 옵션 기록, 점수 계산, 관계 차원 분석, 만화 유형 매핑, 보고서 생성 및 기록 표시는 모두 기본적으로 사용자 장치에서 로컬로 완료됩니다. 우리는 사용자의 답변 프로세스를 개발자 서버에 업로드하지 않으며 사용자가 생성한 보고서를 원격으로 읽지도 않습니다."]}, {"title": "3.2 로컬 저장소", "paras": ["본 제품은 지속적인 사용, 이력 보기, 보고서 검토, 구매 권한 표시 등의 기능을 구현하기 위해 필요한 데이터를 사용자 장치에 로컬로 저장할 수 있습니다. 이러한 데이터에는 일반적으로 완료된 질문, 사용자가 선택한 옵션, 질문 진행 상황, 종합 점수, 차원 점수, 보고서 텍스트, 기록 기록, 언어 설정, 인터페이스 기본 설정, 구매 권한 캐시 등이 포함됩니다."]}, {"title": "3.3 로컬 데이터의 가시성", "paras": ["기본적으로 로컬에 저장된 데이터는 기기를 소유한 사람, 앱을 열 수 있는 사람, 기기의 로컬 백업에 액세스할 수 있는 사람에게만 표시됩니다. 사용자 장치의 로컬 데이터를 원격으로 보거나, 검색하거나, 복구하거나 삭제할 수 없습니다. 사용자는 장치를 잘 관리하고, 잠금 화면 암호를 설정해야 하며, 신뢰할 수 없는 사람에게 보고서 스크린샷, 내보낸 콘텐츠 또는 장치 액세스 권한을 제공하지 않아야 합니다."]}]}, {"title": "4. 기본적으로 수집하지 않는 정보", "paras": ["현재 버전에서는 다음 정보를 적극적으로 수집하지 않습니다.", "신원정보 : 실명, 주민등록번호, 여권번호, 주소, 생일 등", "연락처 정보: 휴대폰 번호, 주소록, 연락처 목록, 소셜 계정, 파트너 연락처 정보 등", "위치 데이터: 정확한 위치, 자주 사용되는 위치, 궤적, 지오펜스 등", "생체정보: 얼굴, 지문, 성문, 홍채 등", "장치 콘텐츠: 사진, 앨범, 채팅 기록, 문자 메시지, 이메일, 파일, 검색 기록 등", "민감한 친밀한 관계 정보: 당사는 사용자에게 파트너의 실명, 채팅 기록, 분쟁 세부 정보, 특정 주소 또는 제3자를 식별할 수 있는 기타 정보를 입력하도록 요청하지 않습니다.", "광고 추적 식별자: 당사는 광고 추적 목적으로 IDFA를 읽거나 사용하지 않습니다.", "서버 로그 : 현 버전에서는 개발자 서버를 통한 답변 문의 및 신고 처리가 되지 않으므로, 사용자 답변 접속 로그, 서버 요청 로그, 원격 신고 기록 등을 보관하지 않습니다.", "사용자가 사용 중에 신고 스크린샷, 답변 내용, 기기 정보, 구매 기록 스크린샷 또는 기타 정보를 자발적으로 당사에 보내는 경우 관련 정보는 본 정책 제7조에 따라 처리됩니다."], "subsections": []}, {"title": "5. 로컬에 저장된 데이터 유형", "paras": ["당사는 기본적으로 사용자 데이터를 수집하지 않지만 앱은 해당 기능을 구현하기 위해 다음 데이터를 장치에 로컬로 저장할 수 있습니다. 이 데이터는 당사 서버에 업로드되지 않습니다."], "subsections": []}, {"title": "6. Apple Pay, App Store 및 거래현황", "paras": ["본 상품의 유료 아이템은 Apple App Store/StoreKit을 통해 완성됩니다. 사용자의 결제 방법, 청구, 환불, 세금 처리, Apple ID, 은행 카드 번호, 결제 계좌 비밀번호 등은 Apple에서 처리하며 사용자의 완전한 결제 바우처 또는 Apple ID 비밀번호를 얻지 않습니다.", "사용자에게 해당 결제 권한이 있는지 확인하기 위해 앱은 Apple에서 제공하는 거래 상태, 제품 식별, 구매 상태, 환불 상태 또는 권한 상태를 로컬에서 읽거나 확인할 수 있습니다. 이 프로세스는 앱 내에서 해당 기능을 활성화, 복원 또는 끄는 데 사용됩니다. 향후 정책에서 달리 명시하지 않는 한 당사는 해당 거래 상태를 자체 서버에 업로드하지 않습니다.", "사용자가 Apple에 환불을 신청하는 경우 앱은 Apple이 반환한 거래 상태에 따라 해당 유료 권한을 종료, 조정 또는 복원할 수 있습니다. 구매, 환불 및 청구 관련 분쟁은 Apple 및 해당 법률 규칙의 적용을 받습니다."], "subsections": []}, {"title": "7. 이용자가 당사에 적극적으로 연락할 때의 정보", "paras": ["앱 기본 사용 중에는 사용자의 답변 및 보고서가 표시되지 않습니다. 그러나 사용자가 이메일, 양식, 고객 서비스, App Store 리뷰, 소셜 미디어 비공개 메시지 또는 기타 방법을 통해 적극적으로 당사에 연락하는 경우 사용자는 당사에 특정 정보를 제공할 수 있습니다."], "subsections": [{"title": "7.1 포함될 수 있는 정보", "paras": ["이메일 주소, 별명 또는 기타 연락처 정보", "문제 설명, 피드백 내용, 언어 버전, 시스템 버전, 장치 모델, 앱 버전", "구매한 품목, 거래 상태 및 Apple 환불 상태의 스크린샷", "사용자가 적극적으로 보낸 보고서, 질문, 점수 또는 기타 앱 페이지의 스크린샷", "문제를 설명하기 위해 사용자가 제공한 기타 정보입니다."]}, {"title": "7.2 이용 목적", "paras": ["당사는 피드백 처리, 문제 파악, 고객 지원 제공, 콘텐츠 품질 개선, 구매 권한 변칙 확인, 오류 수정, 사용자 요청 응답 또는 법적 의무 이행을 위해 사용자가 적극적으로 제공한 정보만 사용합니다. 당사는 광고 초상화에 대한 활성 사용자 피드백에 신고 내용을 사용하지 않으며 이를 제3자에게 판매하지도 않습니다."]}, {"title": "7.3 민감한 정보를 과도하게 제공하지 마십시오", "paras": ["이 제품은 사용자에게 파트너의 실제 신원, 채팅 기록, 주소, 연락처 정보, ID, 금융 정보, 자해 세부 정보 또는 기타 매우 민감한 정보를 보내도록 요구하지 않습니다. 사용자가 문제를 신고할 때 꼭 필요하고 최소한의 정보를 사용하도록 노력하십시오. 스크린샷에 당사가 보고 싶지 않은 내용이 포함되어 있는 경우, 전송하기 전에 직접 차단하거나 삭제하는 것이 좋습니다."]}]}, {"title": "8. Apple 진단, 충돌 로그 및 시스템 분석", "paras": ["사용자가 iOS 설정에서 Apple 또는 개발자와 진단 및 사용 데이터를 공유하기로 선택한 경우 Apple은 개발자에게 충돌 로그, 성능 정보, 장치 모델, 시스템 버전, 앱 버전 및 앱 안정성과 관련된 기타 정보를 제공할 수 있습니다. 이 정보는 일반적으로 충돌을 찾고, 안정성을 개선하고, 호환성 문제를 해결하는 데 사용됩니다.", "사용자가 충돌 피드백에 보고서 스크린샷이나 기타 개인 콘텐츠를 적극적으로 추가하지 않는 한, 일반 충돌 로그에는 일반적으로 사용자의 전체 답변 콘텐츠나 전체 보고서 텍스트가 포함되지 않습니다. 우리는 광고 추적이나 상업적 프로파일링을 위해 Apple이 제공한 진단 정보를 사용하지 않습니다. 사용자는 iOS 시스템 설정에서 진단 및 분석 데이터 공유 옵션을 관리할 수 있습니다."], "subsections": []}, {"title": "9. iCloud, 기기 백업 및 시스템 마이그레이션", "paras": ["이 제품은 기본적으로 사용자 데이터를 장치에 로컬로 저장합니다. 그러나 사용자의 iOS 설정, 기기 백업 정책, iCloud 설정, 시스템 마이그레이션 방법 또는 Apple의 기술적 메커니즘에 따라 기기 백업, 기기 마이그레이션 또는 시스템 복구 중에 일부 앱 로컬 데이터가 Apple에서 처리될 수 있습니다.", "당사는 iCloud 또는 기기 백업을 통해 사용자의 답변 기록 및 신고 내용을 적극적으로 확보하지 않으며, Apple이 백업 데이터를 처리하는 방법을 통제할 수 없습니다. 사용자가 로컬 앱 데이터가 기기 백업에 들어가는 것을 원하지 않는 경우 Apple 시스템 설정에 따라 iCloud 백업, 기기 백업 및 데이터 마이그레이션 옵션을 직접 관리해야 합니다."], "subsections": []}, {"title": "10. 제3자 서비스, SDK, 광고 및 추적", "paras": [], "subsections": [{"title": "10.1 현재 버전", "paras": ["현재 버전은 광고 SDK를 사용하지 않고, 앱 간 또는 사이트 간 추적을 수행하지 않으며, 사용자 데
