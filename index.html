이터를 판매하지 않으며, 사용자 답변, 보고서 또는 장치 동작을 광고 네트워크와 공유하지 않습니다. 또한 현재 버전은 타사 클라우드 서비스를 통한 사용자 질문, 옵션 또는 보고서를 처리하지 않습니다."]}, {"title": "10.2 애플 플랫폼 서비스", "paras": ["사용자가 다운로드, 설치, 구매, 환불, 구매 복원, App Store 페이지 보기, App Store 리뷰 제출 또는 Apple 관련 플랫폼 기능 사용 시 Apple은 자체 규칙에 따라 데이터를 처리할 수 있습니다. 이러한 처리는 당사의 통제 범위를 벗어납니다."]}, {"title": "10.3 향후 발생할 수 있는 변화", "paras": ["향후 버전에 통계 분석 SDK, 광고 SDK, 클라우드 동기화, AI 클라우드 분석, 계정 로그인, 푸시 알림, 고객 서비스 시스템 또는 기타 제3자 서비스가 도입되는 경우 당사는 해당 기능이 출시되기 전에 본 개인정보 보호정책을 업데이트하고 관련 법률 또는 플랫폼 규칙에서 요구하는 경우 사용자 승인을 얻거나 종료 옵션을 제공하거나 필요한 프롬프트를 제공합니다."]}]}, {"title": "11. 장치 권한 설명", "paras": ["현재 버전에서는 원칙적으로 연락처, 핀포인트, 사진 앨범, 카메라, 마이크, 달력, 건강 데이터, 파일 시스템 또는 친밀도 보고와 관련 없는 기타 민감한 권한에 대한 액세스가 필요하지 않습니다.", "향후 버전에서는 새로운 기능으로 인해 시스템 권한 신청이 필요한 경우, 권한 신청 전 그 목적을 설명한 후, 해당 기능 구현에 필요한 범위 내에서만 사용하도록 하겠습니다. 사용자는 iOS 설정에서 관련 권한을 관리하거나 철회할 수 있습니다. 권한을 철회하면 해당 기능을 사용할 수 없게 될 수 있지만, 권한이 필요하지 않은 다른 로컬 기능에는 영향을 미치지 않습니다."], "subsections": []}, {"title": "12. 문제 은행, 다국어 콘텐츠 및 AI 번역 지침", "paras": ["본 상품에는 대규모 문제은행, 옵션 설명, 분석 텍스트, 보고서 텍스트가 포함되어 있습니다. 문제 은행과 다국어 콘텐츠는 앱에 사전 제작 및 교정된 내장 콘텐츠 리소스입니다. 일부 비 중국어 버전은 콘텐츠 제작 단계에서 기계 번역, AI 번역 또는 현지화 도구를 사용하여 생성될 수 있으며 필요한 교정 후 출시됩니다.", "위의 번역 및 현지화 과정은 제품 콘텐츠 제작 단계에서 발생하며, 이는 사용자가 앱을 사용할 때 사용자의 답변 내용, 신고 내용 또는 개인정보를 번역 모델이나 AI 서비스로 전송한다는 의미는 아닙니다. 현재 버전에서는 사용자 보고서 생성과 텍스트 표시가 로컬에서 수행됩니다.", "향후 버전에 클라우드 AI 분석, 클라우드 번역, 온라인 고객 서비스 로봇 또는 사용자 입력 콘텐츠 업로드가 필요한 기타 기능이 도입되는 경우 해당 기능을 출시하기 전에 데이터 처리 방법을 별도로 설명하고 관련 법률 또는 플랫폼 규칙에서 요구하는 경우 사용자 동의를 얻습니다."], "subsections": []}, {"title": "13. 자동 채점, 프로파일링 및 보고서 생성을 위한 개인정보 보호정책", "paras": ["이 제품은 사용자가 완료한 질문과 옵션을 기반으로 종합 점수, 차원 점수, 관계 유형, 만화 초상화 및 분석 보고서를 로컬에서 계산합니다. 이 과정은 사용자에게 자기 이해, 정서적 지지, 관계 성찰 콘텐츠를 제공하는 앱 기능의 일부입니다.", "이러한 계산 결과는 기본적으로 당사에 업로드되지 않으며 광고, 신용 평가, 고용, 보험, 신용, 공공 서비스, 법적 자격 또는 사용자에게 중대한 외부 영향을 미치는 기타 결정에 사용되지 않습니다. 사용자가 보는 보고서는 앱 내에서 참조용으로만 사용됩니다.", "사용자는 로컬 기록을 지우거나 기록 보고서를 삭제하거나 앱을 제거하여 관련 결과 저장을 중지할 수 있습니다. 우리는 기본적으로 사용자의 로컬 보고서를 보관하지 않기 때문에 사용자는 장치의 전체 답변 데이터를 원격으로 내보내거나 복원하도록 요청할 수 없습니다."], "subsections": []}, {"title": "14. 데이터 보존, 삭제 및 복구", "paras": [], "subsections": [{"title": "14.1 로컬 데이터 보유 기간", "paras": ["사용자의 로컬 답변 기록, 보고서, 과거 점수 및 설정은 일반적으로 사용자가 앱 내에서 적극적으로 지우거나, 관련 기록을 삭제하거나, 앱을 제거하거나, 장치 데이터를 지우거나, 시스템 이유로 인해 데이터가 손실될 때까지 장치에 저장됩니다."]}, {"title": "14.2 로컬 데이터 삭제", "paras": ["사용자는 다음과 같은 방법으로 로컬 데이터를 삭제할 수 있습니다.", "앱에서 \"로컬 기록 지우기\", \"기록 보고서 삭제\" 또는 유사한 기능을 사용하십시오.", "iOS에서 앱을 제거합니다.", "장치 데이터를 지우거나 장치를 복원하십시오.", "시스템 설정을 통해 iCloud 백업 또는 기기 백업에서 앱 데이터를 관리하세요."]}, {"title": "14.3 삭제 후 복구 불가능", "paras": ["기본적으로 사용자 답변과 보고서를 서버에 저장하지 않기 때문에 사용자가 로컬 기록을 삭제한 후에는 일반적으로 사용자가 원격으로 복원하도록 도울 수 없습니다. 보고서를 삭제하기 전에 보고서를 계속 유지할 것인지 확인하세요."]}, {"title": "14.4 사용자 지원 기록 보유 기간", "paras": ["당사는 지원 목적을 달성하는 데 필요한 기간(법률, 분쟁 처리 또는 보안 규정 준수에 따라 더 긴 보존이 요구되지 않는 한 24개월 이하) 동안 사용자가 적극적으로 보낸 고객 서비스 이메일, 피드백 콘텐츠, 스크린샷 또는 관련 지원 기록만 보관합니다. 사용자는 본 정책에 나열된 연락처 정보를 통해 관련 지원 기록의 삭제를 요청할 수 있습니다."]}]}, {"title": "15. 이용자의 권리와 그 행사방법", "paras": ["관련 법률이 허용하는 한도 내에서 사용자는 개인정보에 대한 조회, 접근, 정정, 복사, 삭제, 동의 철회, 처리 제한, 처리 반대, 계정 취소, 불만 제기 등의 권리를 가질 수 있습니다. 현재 버전에서는 기본적으로 계정을 생성하거나 답변 및 보고서를 업로드하지 않기 때문에 일반적으로 사용자 장치의 로컬 데이터에 원격으로 액세스할 수 없습니다.", "사용자는 앱 내 기능을 통해 직접 로컬 데이터를 확인, 수정, 삭제할 수 있습니다. 사용자가 당사에 적극적으로 제공하는 고객 서비스 정보, 피드백 이메일 또는 스크린샷의 경우 사용자는 본 정책에 나열된 연락처 정보를 통해 당사에 액세스, 수정 또는 삭제를 요청할 수 있습니다.", "사용자 정보의 보안을 보호하기 위해 당사는 관련 요청을 처리하기 전에 요청자와 관련 정보 간의 관계를 확인해야 할 수 있습니다. 당사는 해당 법률에서 요구하는 기간 내에 합당한 요청에 응답할 것입니다. 당사가 요청을 이행할 수 없는 경우 그 이유가 명시됩니다."], "subsections": []}, {"title": "16. 미성년자 보호", "paras": ["이 제품은 주로 독립적인 이해가 있는 친밀한 관계 사용자를 대상으로 하며 특별히 어린이용으로 설계되지 않았습니다. 미성년자는 본 제품을 사용하기 전에 반드시 부모 등 보호자의 동의를 구하고, 보호자의 지도에 따라 신고 내용을 숙지하시기 바랍니다.", "당사는 미성년자로부터 신원 정보를 적극적으로 수집하지 않으며 사용자에게 연령, 학교, 학급, 보호자 정보 또는 기타 어린이의 개인 정보 제공을 요구하지 않습니다. 미성년자가 당사에 적극적으로 개인정보를 제공했다고 판단되거나 관련 지원 기록을 삭제하려는 경우, 보호자는 본 정책에 나열된 연락처 정보를 통해 당사에 연락할 수 있습니다.", "특정 국가나 지역의 법률에서 어린이나 미성년자의 디지털 서비스 이용에 대한 요구 사항이 더 엄격한 경우 당사는 해당 지역의 필수 법적 요구 사항에 따라 처리합니다."], "subsections": []}, {"title": "17. 데이터 보안", "paras": ["불필요한 데이터 처리를 최소화하기 위해 현지화된 제품의 특성에 맞는 보안 조치를 채택합니다. 사용자 답변 및 신고 내용은 기본적으로 당사 서버에 업로드되지 않으므로 서버측 데이터 유출 위험이 크게 줄어듭니다.", "그러나 사용자는 다음과 같은 위험에 여전히 주의를 기울여야 합니다.", "장치에 잠금 화면 암호가 없거나, 다른 사람이 빌리거나, 도난당하거나, 탈옥한 경우, 다른 사람이 로컬 데이터를 볼 수 있습니다.", "사용자가 스크린샷을 찍고, 보고서를 전달하고, 소셜 소프트웨어를 통해 콘텐츠를 공유한 후에도 수신자는 이를 계속해서 전파할 수 있습니다.", "사용자가 iCloud 또는 장치 백업을 켠 후 Apple은 시스템 백업과 함께 로컬 데이터를 처리할 수 있습니다.", "사용자가 적극적으로 스크린샷을 보내거나 고객 서비스에 콘텐츠를 신고하면 당사는 사용자가 보낸 콘텐츠를 볼 수 있습니다.", "어떤 소프트웨어도 절대적인 보안을 보장할 수 없으며 시스템 취약점, 장치 공격 또는 타사 서비스의 이상으로 인해 위험이 발생할 수 있습니다.", "사용자가 자발적으로 제공한 정보와 관련된 보안 사고를 인지하고 해당 법률에 따라 사용자 또는 규제 기관에 통보해야 하는 경우 당사는 법률에서 요구하는 대로 통보, 해결 및 위험 감소 조치를 취할 것입니다."], "subsections": []}, {"title": "18. 국경 간 및 국제 사용자를 위한 지침", "paras": ["현재 버전에서는 기본적으로 사용자 답변 및 보고서가 업로드되지 않으므로 당사는 일반적으로 앱 자체 사용으로 인한 개인 정보의 국가 간 전송을 시작하지 않습니다.", "그러나 다음과 같은 상황에서는 사용자 정보에 국경 간 처리가 포함될 수 있습니다.", "사용자는 국제 이메일 서비스, 고객 서비스 채널 또는 소셜 미디어를 통해 적극적으로 당사에 연락합니다.", "사용자는 Apple App Store를 통해 다운로드, 구매, 환불 또는 리뷰를 제출합니다.", "사용자의 iCloud, 기기 백업, 기기 마이그레이션 또는 Apple 플랫폼 서비스 사용", "사용자가 위치한 국가 또는 지역은 당사 개발자 및 이메일 서비스 제공업체가 위치한 국가 또는 지역과 다릅니다.", "당사는 이용자가 자발적으로 제공한 지원정보를 필요한 범위 내에서 처리하며, 합리적인 보호조치를 취하기 위해 최선을 다할 것입니다. 사용자가 위치한 국가 또는 지역에서는 사용자에게 추가 데이터 보호 권한을 부여할 수 있습니다. 사용자가 관련 권리를 행사하려는 경우 본 정책에 나열된 연락처 정보를 통해 당사에 문의할 수 있습니다."], "subsections": []}, {"title": "19. 정책 변경", "paras": ["당사는 제품 기능 변경, 법률 및 규정 변경, 플랫폼 규칙 변경 또는 운영상의 필요로 인해 본 개인정보 보호정책을 업데이트할 수 있습니다. 업데이트된 정책은 앱 내, App Store 페이지, 공식 웹사이트 또는 기타 적절한 위치에 게시되며 마지막 업데이트 날짜가 표시됩니다.", "업데이트에 \"답변 데이터 업로드 안 함\"에서 \"클라우드 동기화 또는 클라우드 AI 분석 지원\"으로 변경하는 등 개인 정보 처리 방식에 큰 변화가 포함되는 경우, 해당 기능이 출시되기 전에 사용자에게 눈에 띄게 알리고 해당 법률이나 플랫폼 규칙에서 요구하는 경우 사용자 동의를 얻습니다. 사용자가 관련 변경 사항에 동의하지 않는 경우 해당 기능의 사용을 중지하거나 로컬 데이터를 삭제하고 앱을 제거할 수 있습니다."], "subsections": []}, {"title": "20. 문의하기", "paras": ["사용자가 본 개인 정보 보호 정책, 개인 정보 처리, 로컬 데이터 삭제, 고객 서비스 기록 삭제, App Store 개인 정보 보호 라벨 또는 기타 개인 정보 보호 관련 문제에 대해 질문이 있는 경우 다음 방법을 통해 당사에 문의할 수 있습니다.", "연락처 이메일: thestein@foxmail.com", "개발자: Bao Jiachen", "사용자는 당사에 문의할 때 불필요하고 민감한 정보를 전송하지 않도록 노력해야 합니다. 문제를 찾기 위해 스크린샷을 보내야 하는 경우, 먼저 실명, 연락처, 파트너 정보, 채팅 기록 또는 보고 싶지 않은 기타 콘텐츠를 차단하는 것이 좋습니다."], "subsections": []}], "ui": {"page_title": "개인 정보 보호 정책", "policy_summary": "정책 개요", "table_of_contents": "목차", "effective_date": "발효일", "last_updated": "마지막 업데이트 날짜", "app_name": "앱 이름", "developer": "개발자", "contact_email": "연락처 이메일", "language": "언어", "language_note": "페이지에서는 귀하의 브라우저 언어에 우선순위를 부여합니다. 지원하지 않는 경우 기본적으로 영어가 표시됩니다.", "default_language": "기본 언어: 영어", "local_data_title": "로컬 데이터 유형", "local_data_usage": "사용", "local_data_uploaded": "기본적으로 당사에 업로드할지 여부"}}}</script>
  <script>
    const RAW = JSON.parse(document.getElementById('policy-data').textContent);
    const LANG_LABELS = {"zh-Hans": "中文（简体）", "zh-Hant": "繁體中文", "en": "English", "ja": "日本語", "de": "Deutsch", "fr": "Français", "es": "Español", "ko": "한국어"};
    const SUPPORTED = ["zh-Hans", "zh-Hant", "en", "ja", "de", "fr", "es", "ko"];

    const pageTitle = document.getElementById('page-title');
    const languageLabel = document.getElementById('language-label');
    const languageSelect = document.getElementById('language-select');
    const app = document.getElementById('app');

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function detectLanguage() {
      const saved = localStorage.getItem('einii-policy-lang');
      if (saved && SUPPORTED.includes(saved)) return saved;
      const prefs = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || 'en']);
      for (const pref of prefs) {
        const lang = String(pref || '').toLowerCase();
        if (lang.startsWith('zh-hant') || lang.startsWith('zh-tw') || lang.startsWith('zh-hk') || lang.startsWith('zh-mo')) return 'zh-Hant';
        if (lang.startsWith('zh')) return 'zh-Hans';
        if (lang.startsWith('ja')) return 'ja';
        if (lang.startsWith('de')) return 'de';
        if (lang.startsWith('fr')) return 'fr';
        if (lang.startsWith('es')) return 'es';
        if (lang.startsWith('ko')) return 'ko';
        if (lang.startsWith('en')) return 'en';
      }
      return 'en';
    }

    function setupLanguageOptions() {
      languageSelect.innerHTML = '';
      for (const code of SUPPORTED) {
        const option = document.createElement('option');
        option.value = code;
        option.textContent = LANG_LABELS[code] || code;
        languageSelect.appendChild(option);
      }
    }

    function tableHtml(rows) {
      const header = rows[0];
      const body = rows.slice(1);
      return `
        <div class="table-scroll">
          <table class="policy-table">
            <thead>
              <tr>${header.map(cell => `<th>${escapeHtml(cell)}</th>`).join('')}</tr>
            </thead>
            <tbody>
              ${body.map(row => `<tr>${row.map(cell => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function sectionHtml(section, index, lang) {
      const secId = `section-${index + 1}`;
      let out = `<section class="policy-section panel fade-in" id="${secId}">`;
      out += `<h2 class="section-title">${escapeHtml(section.title)}</h2>`;
      for (const paragraph of section.paras) {
        out += `<p>${escapeHtml(paragraph)}</p>`;
      }
      if (index === 4) {
        out += `<div class="table-panel">`;
        out += `<h3>${escapeHtml(RAW[lang].ui.local_data_title)}</h3>`;
        out += tableHtml(RAW[lang].localDataTable);
        out += `</div>`;
      }
      for (let subIndex = 0; subIndex < section.subsections.length; subIndex++) {
        const sub = section.subsections[subIndex];
        out += `<h3 class="subsection-title" id="${secId}-${subIndex + 1}">${escapeHtml(sub.title)}</h3>`;
        for (const paragraph of sub.paras) {
          out += `<p>${escapeHtml(paragraph)}</p>`;
        }
      }
      out += `</section>`;
      return out;
    }

    function render(lang) {
      const data = RAW[lang] || RAW['en'];
      document.documentElement.lang = lang;
      document.title = `${data.meta.title} · Einii`;
      pageTitle.textContent = data.meta.title;
      languageLabel.textContent = data.ui.language;
      languageSelect.value = lang;
      const tocTitle = data.ui.table_of_contents;
      const summaryTitle = data.ui.policy_summary;
      const note = data.ui.language_note;
      const defaultLanguage = data.ui.default_language;
      const metaTable = tableHtml(data.summaryTable);
      const toc = data.sections.map((section, index) => `<a href="#section-${index + 1}">${escapeHtml(section.title)}</a>`).join('');
      const sections = data.sections.map((section, index) => sectionHtml(section, index, lang)).join('');
      app.innerHTML = `
        <div class="hero">
          <section class="hero-copy panel fade-in">
            <span class="kicker">${escapeHtml(summaryTitle)}</span>
            <h2>${escapeHtml(data.meta.title)}</h2>
            <p>${escapeHtml(data.meta.policySummary)}</p>
            <div class="note">${escapeHtml(note)} ${escapeHtml(defaultLanguage)}</div>
          </section>
          <aside class="meta-grid panel fade-in" aria-label="${escapeHtml(summaryTitle)}">
            <div class="meta-card">
              <div class="label">${escapeHtml(data.ui.app_name)}</div>
              <div class="value">${escapeHtml(data.meta.appName)}</div>
            </div>
            <div class="meta-card">
              <div class="label">${escapeHtml(data.ui.developer)}</div>
              <div class="value">${escapeHtml(data.meta.developer)}</div>
            </div>
            <div class="meta-card">
              <div class="label">${escapeHtml(data.ui.contact_email)}</div>
              <div class="value">${escapeHtml(data.meta.contactEmail)}</div>
            </div>
            <div class="meta-card">
              <div class="label">${escapeHtml(data.ui.effective_date)} / ${escapeHtml(data.ui.last_updated)}</div>
              <div class="value">${escapeHtml(data.meta.effectiveDate)}<br>${escapeHtml(data.meta.lastUpdated)}</div>
            </div>
          </aside>
        </div>
        <div class="layout">
          <aside class="toc panel fade-in">
            <h3>${escapeHtml(tocTitle)}</h3>
            <nav>${toc}</nav>
          </aside>
          <div class="content">
            <section class="table-panel panel fade-in">
              <h3>${escapeHtml(summaryTitle)}</h3>
              ${metaTable}
            </section>
            ${sections}
          </div>
        </div>
      `;
    }

    setupLanguageOptions();
    const initial = detectLanguage();
    render(initial);
    languageSelect.addEventListener('change', () => {
      const lang = languageSelect.value;
      localStorage.setItem('einii-policy-lang', lang);
      render(lang);
      window.scrollTo({ top: 0, behavior: 'instant' });
    });
  </script>
</body>
</html>
